function renderCalendar() {
  const el = document.getElementById('tab-calendar');
  const nr = nextRace();
  const done = Object.keys(S.results).length;

  el.innerHTML = `
    <div class="sec-hdr">
      <h2 class="sec-title">2025 Season Calendar</h2>
      <span style="color:var(--muted);font-size:13px">${done} of 24 complete</span>
    </div>
    <div class="cal-grid">
      ${RACES.map(race => {
        const isDone = !!S.results[race.id] && !S.cancelled?.[race.id];
        const isCancelled = !!S.cancelled?.[race.id];
        const isNext = nr && nr.id === race.id;
        const winner = S.results[race.id]?.race?.p1 ? driverById(S.results[race.id].race.p1) : null;
        return `
          <div class="race-card ${isDone?'done':''} ${isNext?'nxt':''} ${isCancelled?'cancelled':''}"
               onclick="switchTab('predictions');renderPredictions(${race.id})">
            <div class="race-rnd">Round ${race.id}${race.sprint?' · <span style="color:var(--red)">Sprint</span>':''}</div>
            <div class="race-nm">${esc(race.name)}</div>
            <div style="font-size:11px;color:var(--muted);margin-bottom:8px">${race.circuit}</div>
            <div style="display:flex;justify-content:space-between;align-items:center">
              <span style="font-size:11px;color:var(--muted)">${fmtDate(race.date)}</span>
              <span class="badge ${isCancelled?'badge-cancelled':isDone?'badge-done':isNext?'badge-next':'badge-upcoming'}">
                ${isCancelled?'🚫 Cancelled':isDone?'✓ Done':isNext?'Next':'Upcoming'}
              </span>
            </div>
            ${!isCancelled && isDone && winner ? `
              <div style="margin-top:7px;padding-top:7px;border-top:1px solid var(--border);font-size:11px;color:var(--muted2)">
                🏆 ${esc(winner.name)}
              </div>
            ` : ''}
          </div>
        `;
      }).join('')}
    </div>
  `;
}

// MODAL: ADD / EDIT PARTICIPANT

function openAddParticipant()      { openParticipantModal(null); }
function openEditParticipant(pid)  { openParticipantModal(pid); }

function openParticipantModal(pid) {
  const p = pid ? S.participants.find(p => p.id === pid) : null;
  const PALETTE = ['#e10600','#00aaff','#ffd700','#00d856','#ff6b35','#b44fd9','#ff4d9e','#00ffcc','#88c0d0','#ebcb8b'];
  const defaultColor = p?.color || PALETTE[S.participants.length % PALETTE.length];
  openModal(`
    <div class="modal-hdr">
      <div class="modal-title">${p ? 'Edit Participant' : 'Add Participant'}</div>
      <button class="modal-close" onclick="closeModal()">✕</button>
    </div>
    <div class="modal-body">
      <div class="fg">
        <label class="fl">Name</label>
        <input class="fi" id="p-name" type="text" placeholder="Enter participant name…"
               value="${p ? esc(p.name) : ''}" maxlength="30"
               onkeydown="if(event.key==='Enter')saveParticipant('${pid||''}')">
      </div>
      <div class="fg" style="margin-top:12px">
        <label class="fl">Car Colour</label>
        <div style="display:flex;align-items:center;gap:10px">
          <input type="color" id="p-color" value="${defaultColor}"
                 style="width:44px;height:36px;border:none;background:none;cursor:pointer;border-radius:6px;padding:2px">
          <div style="display:flex;gap:6px;flex-wrap:wrap">
            ${PALETTE.map(c => `<button onclick="document.getElementById('p-color').value='${c}'"
              style="width:22px;height:22px;border-radius:50%;background:${c};border:2px solid rgba(255,255,255,.15);cursor:pointer;padding:0"
              title="${c}"></button>`).join('')}
          </div>
        </div>
      </div>
    </div>
    <div class="modal-foot">
      <div>${p ? `<button class="btn btn-danger" onclick="deleteParticipant('${p.id}')">Delete</button>` : ''}</div>
      <div class="modal-foot-right">
        <button class="btn btn-ghost" onclick="closeModal()">Cancel</button>
        <button class="btn btn-primary" onclick="saveParticipant('${pid||''}')">
          ${p ? 'Save' : 'Add Participant'}
        </button>
      </div>
    </div>
  `);
}

function saveParticipant(pid) {
  const name  = document.getElementById('p-name').value.trim();
  const color = document.getElementById('p-color')?.value || '#e10600';
  if (!name) { toast('Please enter a name', 'err'); return; }

  if (pid) {
    const idx = S.participants.findIndex(p => p.id === pid);
    if (idx >= 0) { S.participants[idx].name = name; S.participants[idx].color = color; }
    toast('Participant updated');
  } else {
    S.participants.push({ id: uid(), name, color });
    toast('Participant added!');
  }
  save(); closeModal(); renderParticipants(); updateIdentityUI();
}

function deleteParticipant(pid) {
  if (!confirm('Delete this participant and all their predictions?')) return;
  S.participants = S.participants.filter(p => p.id !== pid);
  // Clean up their predictions
  Object.keys(S.predictions).forEach(rid => {
    if (S.predictions[rid][pid]) delete S.predictions[rid][pid];
  });
  save(); closeModal(); renderParticipants();
  toast('Participant removed');
}

let _pred = { raceId: null, idx: 0, buf: {} };

function openPredictionsModal(raceId, startPid) {
  if (S.participants.length === 0) { toast('Add participants first', 'err'); return; }
  _pred.raceId = raceId;
  _pred.idx    = startPid != null
    ? Math.max(0, S.participants.findIndex(p => p.id === startPid))
    : (() => {
        const identity = getIdentity();
        const idx = identity ? S.participants.findIndex(p => p.id === identity.id) : -1;
        return idx >= 0 ? idx : 0;
      })();
  // Deep-copy existing predictions into buffer
  _pred.buf = {};
  S.participants.forEach(p => {
    const existing = S.predictions[raceId]?.[p.id] || {};
    _pred.buf[p.id] = {
      race:        Object.assign({}, existing.race        || {}),
      quali:       Object.assign({}, existing.quali       || {}),
      sprintquali: Object.assign({}, existing.sprintquali || {}),
      sprint:      Object.assign({}, existing.sprint      || {}),
      bonus:       Object.assign({}, existing.bonus       || {}),
    };
  });
  renderPredModal();
}

function renderPredModal() {
  const race = raceById(_pred.raceId);
  const p    = S.participants[_pred.idx];
  const buf  = _pred.buf[p.id];
  const raceLocked = !!S.locked[_pred.raceId] || isPastDeadline(_pred.raceId);
  const identityLocked = !isOwnPrediction(p.id);
  const locked = raceLocked || identityLocked || !!S.lockedP?.[_pred.raceId]?.[p.id];

  const sessions = race.sprint ? [
    { key: 'sprintquali', label: 'Sprint Quali', positions: PODIUM_POS, icon: '🕐', pts: S.scoring.sprintquali },
    { key: 'sprint',      label: 'Sprint Race',  positions: PODIUM_POS, icon: '🏁', pts: S.scoring.sprint      },
    { key: 'quali',       label: 'Qualifying',   positions: PODIUM_POS, icon: '🕐', pts: S.scoring.quali       },
    { key: 'race',        label: 'Race',         positions: RACE_POS,   icon: '🏁', pts: S.scoring.race        },
  ] : [
    { key: 'quali',       label: 'Qualifying',   positions: PODIUM_POS, icon: '🕐', pts: S.scoring.quali       },
    { key: 'race',        label: 'Race',         positions: RACE_POS,   icon: '🏁', pts: S.scoring.race        },
  ];

  const totalMaxPts = sessions.reduce((s, sess) =>
    s + sess.positions.reduce((s2, pos) => s2 + (sess.pts[pos] || 0), 0), 0)
    + (S.scoring.bonus?.fastestLap || 0) + (S.scoring.bonus?.dotd || 0);

  openModal(`
    <div class="modal-hdr">
      <div>
        <div class="modal-title">Predictions — ${esc(race.name)}</div>
        <div class="modal-title-sub">Round ${race.id} · ${fmtDate(race.date)} · Max ${totalMaxPts} pts${locked?' · 🔒 Locked':''}</div>
      </div>
      <div style="display:flex;align-items:center;gap:8px">
        ${!raceLocked && !identityLocked ? `
          <button class="btn btn-ghost btn-sm" onclick="toggleParticipantLock(${_pred.raceId},'${p.id}');renderPredModal()">
            ${locked ? '🔓 Unlock' : '🔒 Lock'}
          </button>
        ` : ''}
        <button class="modal-close" onclick="closeModal()">✕</button>
      </div>
    </div>
    <div class="pred-nav">
      <button class="btn btn-ghost btn-sm" onclick="predNav(-1)" ${_pred.idx === 0 ? 'disabled style="opacity:.4"' : ''}>← Prev</button>
      <div>
        <div class="pred-nav-name">${esc(p.name)}</div>
        <div class="pred-nav-count">${_pred.idx + 1} of ${S.participants.length} participants</div>
      </div>
      <button class="btn btn-ghost btn-sm" onclick="predNav(1)" ${_pred.idx === S.participants.length - 1 ? 'disabled style="opacity:.4"' : ''}>Next →</button>
    </div>
    <div class="modal-body">
      ${sessions.map(sess => `
        <div class="pred-form-section">
          <div class="pred-form-section-title">${sess.icon} ${sess.label}</div>
          ${sess.positions.map(pos => {
            const selDid = buf[sess.key]?.[pos] || null;
            return `
              <div class="pred-row">
                <span class="pred-pos-label">${POS_LABEL[pos]}</span>
                <span class="pred-pts-label" style="color:var(--muted)">${sess.pts[pos] || 0}pts</span>
                <select class="fs" id="pred-${sess.key}-${pos}" style="flex:1"
                        onchange="updatePredBuf('${sess.key}','${pos}',this.value)"
                        ${locked ? 'disabled' : ''}>
                  ${driverOptions(selDid)}
                </select>
              </div>
            `;
          }).join('')}
        </div>
      `).join('')}
      <!-- Bonus Predictions -->
      <div class="pred-form-section">
        <div class="pred-form-section-title">⭐ Bonus Predictions</div>
        <div class="pred-row">
          <span class="pred-pos-label" style="width:auto;font-size:11px;color:var(--muted2);min-width:110px">Fastest Lap</span>
          <span class="pred-pts-label" style="color:var(--muted)">${S.scoring.bonus?.fastestLap || 0}pts</span>
          <select class="fs" id="pred-bonus-fastestLap" style="flex:1"
                  onchange="updatePredBuf('bonus','fastestLap',this.value)"
                  ${locked ? 'disabled' : ''}>
            ${driverOptions(buf.bonus?.fastestLap || null)}
          </select>
        </div>
        <div class="pred-row">
          <span class="pred-pos-label" style="width:auto;font-size:11px;color:var(--muted2);min-width:110px">${esc(driverById(S.bonusDriverId)?.name || 'Driver')} Pos</span>
          <span class="pred-pts-label" style="color:var(--muted)">−1pt/pos</span>
          <input type="number" class="fi" id="pred-bonus-driverPlace" min="1" max="22"
                 placeholder="1–22" style="flex:1"
                 value="${buf.bonus?.driverPlace != null ? buf.bonus.driverPlace : ''}"
                 onchange="updatePredBuf('bonus','driverPlace',this.value)"
                 ${locked ? 'disabled' : ''}>
        </div>
        <div class="pred-row">
          <span class="pred-pos-label" style="width:auto;font-size:11px;color:var(--muted2);min-width:110px">Driver of Day</span>
          <span class="pred-pts-label" style="color:var(--muted)">${S.scoring.bonus?.dotd || 0}pts</span>
          <select class="fs" id="pred-bonus-dotd" style="flex:1"
                  onchange="updatePredBuf('bonus','dotd',this.value)"
                  ${locked ? 'disabled' : ''}>
            ${driverOptions(buf.bonus?.dotd || null)}
          </select>
        </div>
      </div>
    </div>
    <div class="modal-foot">
      <div style="font-size:12px;color:var(--muted)">
        ${identityLocked ? `🔒 View only — not your predictions` : locked ? '🔒 Predictions locked — view only' : '✓ Changes saved automatically'}
      </div>
      <div class="modal-foot-right">
        <button class="btn btn-ghost" onclick="closeModal();reRenderActive()">Cancel</button>
        ${!locked ? `
          <button class="btn btn-ghost btn-sm" onclick="copyFromPrevRace()" title="Copy predictions from the previous race">📋 Copy Previous</button>
          <button class="btn btn-danger btn-sm" onclick="clearCurrentPreds()" title="Clear all predictions for this participant">🗑 Clear</button>
          <button class="btn btn-primary" onclick="saveAllPreds()">✓ Done</button>
        ` : ''}
      </div>
    </div>
  `);
}

function updatePredBuf(session, pos, val) {
  const p = S.participants[_pred.idx];
  if (!_pred.buf[p.id]) _pred.buf[p.id] = { race:{}, quali:{}, sprintquali:{}, sprint:{}, bonus:{} };
  _pred.buf[p.id][session][pos] = val ? +val : null;
  // Auto-save immediately
  if (!S.predictions[_pred.raceId]) S.predictions[_pred.raceId] = {};
  S.predictions[_pred.raceId][p.id] = JSON.parse(JSON.stringify(_pred.buf[p.id]));
  save();
}

function collectCurrentForm() {
  const race = raceById(_pred.raceId);
  const p    = S.participants[_pred.idx];
  if (!p) return;

  const sessions = race.sprint ? [
    { key: 'sprintquali', positions: PODIUM_POS },
    { key: 'sprint',      positions: PODIUM_POS },
    { key: 'quali',       positions: PODIUM_POS },
    { key: 'race',        positions: RACE_POS   },
  ] : [
    { key: 'quali',       positions: PODIUM_POS },
    { key: 'race',        positions: RACE_POS   },
  ];

  const buf = { race:{}, quali:{}, sprintquali:{}, sprint:{}, bonus:{} };
  for (const { key, positions } of sessions) {
    for (const pos of positions) {
      const el = document.getElementById(`pred-${key}-${pos}`);
      buf[key][pos] = el?.value ? +el.value : null;
    }
  }
  // Bonus
  const flEl  = document.getElementById('pred-bonus-fastestLap');
  const dpEl  = document.getElementById('pred-bonus-driverPlace');
  const dotdEl= document.getElementById('pred-bonus-dotd');
  buf.bonus = {
    fastestLap:  flEl?.value   ? +flEl.value   : null,
    driverPlace: dpEl?.value   ? +dpEl.value   : null,
    dotd:        dotdEl?.value ? +dotdEl.value : null,
  };
  _pred.buf[p.id] = buf;
}

function clearCurrentPreds() {
  const p = S.participants[_pred.idx];
  const empty = { race:{}, quali:{}, sprintquali:{}, sprint:{}, bonus:{} };
  _pred.buf[p.id] = JSON.parse(JSON.stringify(empty));
  if (!S.predictions[_pred.raceId]) S.predictions[_pred.raceId] = {};
  S.predictions[_pred.raceId][p.id] = JSON.parse(JSON.stringify(empty));
  save();
  renderPredModal();
  toast(`Cleared predictions for ${p.name}`);
}

function copyFromPrevRace() {
  const p = S.participants[_pred.idx];
  collectCurrentForm();
  const prevRace = RACES.slice().reverse().find(r =>
    r.id < _pred.raceId && S.predictions[r.id]?.[p.id]?.race?.p1
  );
  if (!prevRace) { toast('No previous predictions found to copy', 'err'); return; }
  const prev = S.predictions[prevRace.id][p.id];
  _pred.buf[p.id] = {
    race:        Object.assign({}, prev.race        || {}),
    quali:       Object.assign({}, prev.quali       || {}),
    sprintquali: Object.assign({}, prev.sprintquali || {}),
    sprint:      Object.assign({}, prev.sprint      || {}),
    bonus:       Object.assign({}, prev.bonus       || {}),
  };
  renderPredModal();
  toast(`Copied from Rd ${prevRace.id}: ${prevRace.name}`);
}

function predNav(dir) {
  collectCurrentForm();
  // Save the current participant's state before navigating
  const p = S.participants[_pred.idx];
  if (p) {
    if (!S.predictions[_pred.raceId]) S.predictions[_pred.raceId] = {};
    S.predictions[_pred.raceId][p.id] = JSON.parse(JSON.stringify(_pred.buf[p.id]));
    save();
  }
  const newIdx = _pred.idx + dir;
  if (newIdx < 0 || newIdx >= S.participants.length) return;
  _pred.idx = newIdx;
  renderPredModal();
}

function saveAllPreds() {
  collectCurrentForm();

  // Validate: no duplicate drivers within same session for same participant
  for (const p of S.participants) {
    const buf = _pred.buf[p.id];
    if (!buf) continue;
    const race = raceById(_pred.raceId);
    const sessionsToCheck = [
      { key:'race',        positions:RACE_POS   },
      { key:'quali',       positions:PODIUM_POS },
      ...(race.sprint ? [
        { key:'sprintquali', positions:PODIUM_POS },
        { key:'sprint',      positions:PODIUM_POS },
      ] : []),
    ];
    for (const { key, positions } of sessionsToCheck) {
      const vals = positions.map(pos => buf[key]?.[pos]).filter(Boolean);
      if (new Set(vals).size !== vals.length) {
        toast(`${p.name}: duplicate driver in ${key} predictions`, 'err'); return;
      }
    }
  }

  // Final commit of all buffered participants
  if (!S.predictions[_pred.raceId]) S.predictions[_pred.raceId] = {};
  S.participants.forEach(p => {
    S.predictions[_pred.raceId][p.id] = _pred.buf[p.id] || { race:{}, quali:{}, sprintquali:{}, sprint:{}, bonus:{} };
  });

  save(); closeModal();
  reRenderActive();
}

          <span class="pred-pos-label" style="width:auto;font-size:11px;color:var(--muted2);min-width:110px">${esc(driverById(S.bonusDriverId)?.name || 'Driver')} Pos</span>
          <input type="number" class="fi" id="res-bonus-driverPlace" min="1" max="22"
                 placeholder="1–22" style="flex:1"
                 value="${existing.bonus?.driverPlace != null ? existing.bonus.driverPlace : ''}">
        </div>
        <div class="pred-row">

      <div class="modal-foot-right">
        <button class="btn btn-ghost" onclick="closeModal()">Cancel</button>
        <button class="btn btn-primary" onclick="saveResults(${raceId})">Save Results</button>
      </div>
    </div>
  `);
}

function saveResults(raceId) {
  const race = raceById(raceId);
  const sessions = race.sprint ? [
    { key: 'sprintquali', positions: PODIUM_POS },
    { key: 'sprint',      positions: PODIUM_POS },
    { key: 'quali',       positions: PODIUM_POS },
    { key: 'race',        positions: RACE_POS   },
  ] : [
    { key: 'quali',       positions: PODIUM_POS },
    { key: 'race',        positions: RACE_POS   },
  ];

  const results = {};
  let hasAny = false;
  let dupErr = null;

  for (const { key, positions } of sessions) {
    results[key] = {};
    const seen = {};
    for (const pos of positions) {
      const el  = document.getElementById(`res-${key}-${pos}`);
      const val = el?.value ? +el.value : null;
      if (val) {
        hasAny = true;
        if (seen[val] && !dupErr) {
          dupErr = `Duplicate driver in ${key.toUpperCase()}: ${driverById(val).abbr} appears twice`;
        }
        seen[val] = pos;
      }
      results[key][pos] = val;
    }
  }

  if (dupErr)   { toast(dupErr, 'err'); return; }
  if (!hasAny)  { toast('Enter at least one result', 'err'); return; }

  // Bonus results
  const flEl   = document.getElementById('res-bonus-fastestLap');
  const dpEl   = document.getElementById('res-bonus-driverPlace');
  const dotdEl = document.getElementById('res-bonus-dotd');
  results.bonus = {
    fastestLap:  flEl?.value   ? +flEl.value   : null,
    driverPlace: dpEl?.value   ? +dpEl.value   : null,
    dotd:        dotdEl?.value ? +dotdEl.value : null,
  };

  S.results[raceId] = results;
  save(); closeModal();
  toast(`Results saved for ${race.name}!`);
  reRenderActive();
}

function deleteResults(raceId) {
  if (!confirm('Clear all results for this race?')) return;
  delete S.results[raceId];
  save(); closeModal();
  toast('Results cleared');
  reRenderActive();
}

function requirePin(callback) {
  openModal(`
    <div class="modal-hdr">
      <div class="modal-title">🔐 Admin PIN Required</div>
      <button class="modal-close" onclick="closeModal()">✕</button>
    </div>
    <div class="modal-body">
      <div class="fg">
        <label class="fl">Enter PIN to continue</label>
        <input class="fi" id="pin-entry" type="password" maxlength="20"
               placeholder="PIN" autocomplete="current-password"
               onkeydown="if(event.key==='Enter')document.getElementById('pin-submit').click()">
      </div>
      <div id="pin-err" style="color:var(--red);font-size:12px;min-height:18px;margin-top:4px"></div>
    </div>
    <div class="modal-foot">
      <div></div>
      <div class="modal-foot-right">
        <button class="btn btn-ghost" onclick="closeModal()">Cancel</button>
        <button id="pin-submit" class="btn btn-primary" onclick="_checkPin()">Confirm</button>
      </div>
    </div>
  `);
  setTimeout(() => document.getElementById('pin-entry')?.focus(), 50);
  window._pinCallback = callback;
}

function _checkPin() {
  const entered = document.getElementById('pin-entry')?.value || '';
  if (entered === S.adminPin) {
    closeModal();
    window._pinCallback?.();
    window._pinCallback = null;
  } else {
    document.getElementById('pin-err').textContent = 'Incorrect PIN. Try again.';
    document.getElementById('pin-entry').value = '';
    document.getElementById('pin-entry').focus();
  }
}

function toggleParticipantLock(raceId, pid) {
  if (!S.lockedP) S.lockedP = {};
  if (!S.lockedP[raceId]) S.lockedP[raceId] = {};
  S.lockedP[raceId][pid] = !S.lockedP[raceId][pid];
  if (!S.lockedP[raceId][pid]) delete S.lockedP[raceId][pid];
  const p = S.participants.find(p => p.id === pid);
  save();
  toast(S.lockedP[raceId]?.[pid] ? `🔒 ${p?.name || 'Participant'} locked` : `🔓 ${p?.name || 'Participant'} unlocked`);
  renderPredictions(_predRaceId);
}

function toggleLock(raceId) {
  const doLock = () => {
    S.locked[raceId] = !S.locked[raceId];
    save();
    toast(S.locked[raceId] ? '🔒 Predictions locked' : '🔓 Predictions unlocked');
    renderPredictions(raceId);
  };
  if (S.adminPin) {
    requirePin(doLock);
  } else {
    doLock();
  }
}

          <div class="scoring-section-title">🏁 Race (P1–P5)</div>
          ${RACE_POS.map(pos => `
            <div class="scoring-row">
              <label>${POS_LABEL[pos]}</label>
              <input type="number" class="scoring-input" id="sc-race-${pos}"
                     value="${S.scoring.race[pos]}" min="0" max="999">
            </div>
          `).join('')}
          <div class="scoring-row">
            <label style="color:var(--gold)">Top-5 ~</label>
            <input type="number" class="scoring-input" id="sc-race-topN"
                   value="${S.scoring.race.topN ?? 5}" min="0" max="999">
          </div>
          <div class="scoring-row">
            <label style="color:#00aaff">Top-2 ~</label>
            <input type="number" class="scoring-input" id="sc-race-top2"
                   value="${S.scoring.race.top2 ?? 10}" min="0" max="999">
          </div>
        </div>
        <div class="scoring-section">
          <div class="scoring-section-title">🕐 Qualifying (P1–P3)</div>
          ${PODIUM_POS.map(pos => `
            <div class="scoring-row">
              <label>${POS_LABEL[pos]}</label>
              <input type="number" class="scoring-input" id="sc-quali-${pos}"
                     value="${S.scoring.quali[pos]}" min="0" max="999">
            </div>
          `).join('')}
        </div>
        <div class="scoring-section">
          <div class="scoring-section-title">⚡ Sprint (P1–P3)</div>
          ${PODIUM_POS.map(pos => `
            <div class="scoring-row">
              <label>${POS_LABEL[pos]}</label>
              <input type="number" class="scoring-input" id="sc-sprint-${pos}"
                     value="${S.scoring.sprint[pos]}" min="0" max="999">
            </div>
          `).join('')}
          <div class="scoring-row">
            <label style="color:var(--gold)">Top-3 ~</label>
            <input type="number" class="scoring-input" id="sc-sprint-topN"
                   value="${S.scoring.sprint.topN ?? 3}" min="0" max="999">
          </div>
        </div>
        <div class="scoring-section">
          <div class="scoring-section-title">🔫 Sprint Quali (P1–P3)</div>
          ${PODIUM_POS.map(pos => `
            <div class="scoring-row">
              <label>${POS_LABEL[pos]}</label>
              <input type="number" class="scoring-input" id="sc-sprintquali-${pos}"
                     value="${S.scoring.sprintquali[pos]}" min="0" max="999">
            </div>
          `).join('')}
        </div>
      </div>
    </div>

    <div class="card" style="margin-bottom:16px">
      <div class="card-title">Bonus Predictions</div>
      <div class="fg">
        <label class="fl">Specific Driver (for "Where will X finish?")</label>
        <select class="fs" id="s-bonus-driver">
          ${driverOptions(S.bonusDriverId)}
        </select>
      </div>
      <div class="scoring-grid" style="grid-template-columns:repeat(3,1fr)">
        <div class="scoring-section">
          <div class="scoring-section-title">⚡ Fastest Lap</div>
          <div class="scoring-row"><label>Correct</label>
            <input type="number" class="scoring-input" id="sc-bonus-fastestLap"
                   value="${S.scoring.bonus?.fastestLap || 0}" min="0" max="999">
          </div>
        </div>
        <div class="scoring-section">
          <div class="scoring-section-title">📍 Driver Finish</div>
          <div class="scoring-row"><label>Penalty/pos</label>
            <input type="number" class="scoring-input" id="sc-bonus-driverPlace"
                   value="${S.scoring.bonus?.driverPlace || 1}" min="0" max="999">
          </div>
          <div style="font-size:10px;color:var(--muted);padding:4px 0 0 0">Pts lost per position off (0 = exact)</div>
        </div>
        <div class="scoring-section">
          <div class="scoring-section-title">⭐ Driver of Day</div>
          <div class="scoring-row"><label>Correct</label>
            <input type="number" class="scoring-input" id="sc-bonus-dotd"
                   value="${S.scoring.bonus?.dotd || 0}" min="0" max="999">
          </div>
        </div>
      </div>
    </div>

    <div class="card" style="margin-bottom:16px">
      <div class="card-title">🖇 Clippy</div>
      <div class="fg" style="margin-bottom:8px">
        <label class="fl" style="display:flex;align-items:center;gap:8px;cursor:pointer">
          <input type="checkbox" id="s-clippy-enabled" ${S.clippyEnabled ? 'checked' : ''}>
          Enable Clippy (appears after 15s on Predictions)
        </label>
      </div>
      <div class="fg">
        <label class="fl">Clippy's extra phrase (leave blank to hide)</label>
        <input class="fi" id="s-clippy-phrase" type="text" value="${esc(S.clippyPhrase || '')}"
               maxlength="120" placeholder="e.g. I predict Stupid Stroll for P1">
      </div>
    </div>

    <div class="card" style="margin-bottom:16px">
      <div class="card-title">Admin PIN</div>
      <p style="font-size:12px;color:var(--muted);margin-bottom:10px">
        If set, this PIN is required to lock or unlock predictions. Leave blank to allow anyone to lock/unlock.
      </p>
      <div class="fg">
        <label class="fl">PIN (leave blank to disable)</label>
        <input class="fi" id="s-admin-pin" type="password" value="${esc(S.adminPin || '')}"
               maxlength="20" placeholder="No PIN set" autocomplete="new-password">
      </div>
    </div>

    <div class="card" style="margin-bottom:16px">
      <div class="card-title">Appearance</div>
      <div style="display:flex;align-items:center;gap:12px">
        <span style="font-size:13px;color:var(--muted)">Theme</span>
        <button class="btn btn-ghost btn-sm" onclick="toggleTheme();renderSettings()">
          ${document.body.classList.contains('light') ? '☀️ Light mode' : '🌙 Dark mode'}
        </button>
      </div>
    </div>

    <div class="card" style="margin-bottom:24px">
      <div class="card-title">Data Management</div>
      <div style="display:flex;gap:8px;flex-wrap:wrap;margin-bottom:10px">
        <button class="btn btn-ghost btn-sm" onclick="exportData()">⬇ Export JSON</button>
        <button class="btn btn-ghost btn-sm" onclick="document.getElementById('imp').click()">⬆ Import JSON</button>
        <input type="file" id="imp" accept=".json" style="display:none" onchange="importData(this)">
      </div>
      <button class="btn btn-danger btn-sm" onclick="resetAll()">⚠ Reset All Data</button>
    </div>

    <div style="display:flex;justify-content:flex-end;padding-bottom:16px">
      <button class="btn btn-primary" style="min-width:160px" onclick="saveSettings()">💾 Save Settings</button>
    </div>
  `;
}

function saveSettings() {
  const name = document.getElementById('s-name').value.trim();
  if (!name) { toast('League name cannot be empty', 'err'); return; }

  S.leagueName = name;

  const readScore = (session, positions) => {
    positions.forEach(pos => {
      const el = document.getElementById(`sc-${session}-${pos}`);
      if (el) S.scoring[session][pos] = Math.max(0, +el.value || 0);
    });
  };
  readScore('race',        RACE_POS);
  readScore('quali',       PODIUM_POS);
  readScore('sprint',      PODIUM_POS);
  readScore('sprintquali', PODIUM_POS);

  // Top-N bonus inputs
  ['race', 'sprint'].forEach(key => {
    const el = document.getElementById(`sc-${key}-topN`);
    if (el) S.scoring[key].topN = Math.max(0, +el.value || 0);
  });
  const top2El = document.getElementById('sc-race-top2');
  if (top2El) S.scoring.race.top2 = Math.max(0, +top2El.value || 0);

  // Bonus driver + scoring
  const bd = document.getElementById('s-bonus-driver');
  if (bd?.value) S.bonusDriverId = +bd.value;
  if (!S.scoring.bonus) S.scoring.bonus = {};
  ['fastestLap','driverPlace','dotd'].forEach(k => {
    const el = document.getElementById(`sc-bonus-${k}`);
    if (el) S.scoring.bonus[k] = Math.max(0, +el.value || 0);
  });

  // Clippy
  const clippyWasOff = !S.clippyEnabled;
  S.clippyEnabled = document.getElementById('s-clippy-enabled')?.checked ?? true;
  S.clippyPhrase  = document.getElementById('s-clippy-phrase')?.value.trim() ?? '';
  if (S.clippyEnabled && clippyWasOff) _clippyDismissed = false;

  // Admin PIN
  const pinEl = document.getElementById('s-admin-pin');
  if (pinEl) S.adminPin = pinEl.value.trim();

  // Deadline
  const dlEl = document.getElementById('s-deadline');
  if (dlEl) S.deadlineHours = Math.max(0, +dlEl.value || 0);

  save();
  { const _hn = document.getElementById('hdr-name'); if (_hn) _hn.textContent = S.leagueName; }
  toast('Settings saved');
}

function exportData() {
  const blob = new Blob([JSON.stringify(S, null, 2)], { type: 'application/json' });
  const url  = URL.createObjectURL(blob);
  const a    = document.createElement('a');
  a.href = url; a.download = 'f1-fantasy-2025.json'; a.click();
  URL.revokeObjectURL(url);
  toast('Data exported');
}

function importData(input) {
  const file = input.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = e => {
    try {
      const data = JSON.parse(e.target.result);
      Object.assign(S, data);
      save();
      { const _hn = document.getElementById('hdr-name'); if (_hn) _hn.textContent = S.leagueName; }
      renderTab('dashboard');
      toast('Data imported successfully');
    } catch(_) { toast('Invalid JSON file', 'err'); }
  };
  reader.readAsText(file);
}

function resetAll() {
  if (!confirm('Reset ALL data? Participants, predictions, and results will be permanently deleted.')) return;
  S = Object.assign({}, DEFAULTS, { participants:[], predictions:{}, results:{}, locked:{}, lockedP:{} });
  save();
  { const _hn = document.getElementById('hdr-name'); if (_hn) _hn.textContent = S.leagueName; }
  switchTab('dashboard');
  toast('All data reset');
}

// ═══════════════════════════════════════════════════════════════════
// IDENTITY
// ═══════════════════════════════════════════════════════════════════

const IDENTITY_KEY = 'f1fl26_identity';

function getIdentity() {
  const id = localStorage.getItem(IDENTITY_KEY);
  return id ? S.participants.find(p => p.id === id) || null : null;
}

function setIdentity(pid) {
  localStorage.setItem(IDENTITY_KEY, pid);
  updateIdentityUI();
  document.getElementById('identity-overlay')?.remove();
  reRenderActive();
}

function clearIdentity() {
  localStorage.removeItem(IDENTITY_KEY);
  updateIdentityUI();
  reRenderActive();
}

function updateIdentityUI() {
  const p = getIdentity();
  const btn = document.getElementById('identity-btn');
  if (!btn) return;
  if (S.participants.length === 0) {
    btn.textContent = '';
    btn.style.visibility = 'hidden';
    return;
  }
  btn.style.visibility = '';
  btn.textContent = p ? `👤 ${p.name}` : '👤 Who are you?';
  btn.style.color = p ? pColor(p) : '';
}

function showIdentityPicker(force = false) {
  document.getElementById('identity-overlay')?.remove();
  const overlay = document.createElement('div');
  overlay.id = 'identity-overlay';
  overlay.className = 'identity-overlay';
  const current = getIdentity();
  overlay.innerHTML = `
    <div class="identity-box">
      <div style="font-size:32px;margin-bottom:8px">👤</div>
      <div style="font-size:20px;font-weight:800;margin-bottom:6px">Who are you?</div>
      <div style="font-size:13px;color:var(--muted);margin-bottom:4px">Select your name to manage your own predictions.</div>
      <div class="identity-grid">
        ${S.participants.map(p => `
          <button class="identity-btn" style="${current?.id===p.id?`border-color:${pColor(p)};background:rgba(255,255,255,.05)`:''}color:${pColor(p)}"
                  onclick="setIdentity('${p.id}')">
            ${esc(p.name)}${current?.id===p.id?' ✓':''}
          </button>`).join('')}
      </div>
      ${!force ? `<button class="btn btn-ghost btn-sm" onclick="document.getElementById('identity-overlay').remove()"
              style="margin-top:4px;font-size:12px">Maybe later</button>` : ''}
      ${current ? `<button class="btn btn-ghost btn-sm" onclick="clearIdentity();document.getElementById('identity-overlay').remove()"
              style="margin-top:8px;font-size:12px;color:var(--muted)">Sign out</button>` : ''}
    </div>`;
  document.body.appendChild(overlay);
}

function isOwnPrediction(pid) {
  const identity = getIdentity();
  if (!identity) return true; // no identity set — full access
  return identity.id === pid;
}

// ═══════════════════════════════════════════════════════════════════
// INIT
// ═══════════════════════════════════════════════════════════════════

renderDashboard();
setTimeout(() => {
  updateIdentityUI();
  if (S.participants.length > 0 && !getIdentity()) showIdentityPicker();
}, 100);
</script>
