<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<title>FFIA Fantasy League 2026</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg:      #0a0a0a;
  --card:    #111111;
  --card2:   #161616;
  --border:  #1e1e1e;
  --border2: #2a2a2a;
  --red:     #e10600;
  --red2:    #ff2218;
  --text:    #f0f0f0;
  --muted:   #666;
  --muted2:  #999;
  --green:   #00d856;
  --gold:    #ffd700;
  --silver:  #c0c0c0;
  --bronze:  #cd7f32;
  --r: 8px; --rl: 12px;
}

body { background: var(--bg); color: var(--text); font-family: 'Segoe UI', system-ui, sans-serif; min-height: 100vh; line-height: 1.5; }

/* ── HEADER ── */
.header { background: #000; border-bottom: 3px solid var(--red); position: sticky; top: 0; z-index: 100; padding-top: env(safe-area-inset-top, 0px); }
.header-inner { max-width: 1280px; margin: 0 auto; padding: 0 20px; min-height: 62px; display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 6px; }
.header-brand { display: flex; align-items: center; gap: 14px; }
.logo { background: #fff; color: var(--red); font-weight: 900; font-size: 15px; font-style: italic; padding: 4px 10px; border-radius: 4px; letter-spacing: -.5px; border: 1.5px solid var(--red); }
.header-title { font-size: 19px; font-weight: 700; letter-spacing: -.3px; }
.header-sub { font-size: 11px; color: var(--muted); margin-top: 1px; }

/* ── NAV ── */
.nav { background: #0d0d0d; border-bottom: 1px solid var(--border); position: sticky; top: 62px; z-index: 99; }
.nav-inner { max-width: 1280px; margin: 0 auto; padding: 0 20px; display: flex; gap: 2px; }
.nav-tab { background: none; border: none; color: var(--muted); cursor: pointer; padding: 13px 18px; font-size: 17px; font-weight: 600; display: flex; align-items: center; gap: 8px; border-bottom: 2px solid transparent; transition: all .15s; white-space: nowrap; font-family: inherit; }
.nav-tab:hover { color: var(--text); background: rgba(255,255,255,.04); }
.nav-tab.active { color: var(--red); border-bottom-color: var(--red); }
.nav-tab .ni { font-size: 22px; }

/* ── LAYOUT ── */
.main { max-width: 1280px; margin: 0 auto; padding: 24px 20px; }
.tab-content { display: none; }
.tab-content.active { display: block; }

/* ── CARDS ── */
.card { background: var(--card); border: 1px solid var(--border); border-radius: var(--rl); padding: 20px; }
.card + .card { margin-top: 16px; }
.card-title { font-size: 14px; font-weight: 700; color: var(--muted); text-transform: uppercase; letter-spacing: .7px; margin-bottom: 14px; }

/* ── STATS ── */
.stats-row { display: grid; grid-template-columns: repeat(auto-fit, minmax(160px, 1fr)); gap: 14px; margin-bottom: 20px; }
.stat-card { background: var(--card); border: 1px solid var(--border); border-radius: var(--rl); padding: 7px 10px; }
.stat-label { font-size: 10px; font-weight: 700; color: var(--muted); text-transform: uppercase; letter-spacing: .7px; margin-bottom: 4px; }
.stat-value { font-size: 24px; font-weight: 800; line-height: 1; }
.stat-sub { font-size: 11px; color: var(--muted); margin-top: 3px; }

/* ── TABLE ── */
.tw { overflow-x: auto; }
table { width: 100%; border-collapse: collapse; font-size: 13px; }
th { text-align: left; padding: 9px 12px; font-size: 10px; font-weight: 700; color: var(--muted); text-transform: uppercase; letter-spacing: .6px; border-bottom: 1px solid var(--border); white-space: nowrap; }
td { padding: 10px 12px; border-bottom: 1px solid var(--border); }
tr:last-child td { border-bottom: none; }
tbody tr:hover td { background: rgba(255,255,255,.02); }

/* ── PREDICTION TABLE CELLS ── */
.pc { text-align: center !important; padding: 8px 10px !important; font-size: 12px; font-weight: 700; white-space: nowrap; }
.pc-ok      { background: rgba(0,216,86,.15); color: var(--green); }
.pc-partial { background: rgba(255,165,0,.15); color: #ffaa00; }
.pc-no      { background: rgba(225,6,0,.08); color: #ff7070; }
.pc-nil     { color: var(--muted); }
.pc-res     { background: rgba(255,215,0,.1); color: var(--gold) !important; }
.pc-pts     { background: rgba(255,255,255,.04); font-weight: 800 !important; }

/* ── CHART ANIMATIONS ── */
@keyframes drawLine {
  from { stroke-dashoffset: 1; }
  to   { stroke-dashoffset: 0; }
}
@keyframes fadeDot { to { opacity: 1; } }

/* ── RACE BAR ANIMATIONS ── */
@keyframes growBar { to { width: var(--pct); } }
@keyframes fadeInPts { from { opacity:0; } to { opacity:1; } }

.anim-chart { display:flex; flex-direction:column; gap:12px; padding:4px 0; }
.anim-row { display:flex; align-items:center; gap:10px; }
.anim-label { width:110px; min-width:110px; font-size:13px; font-weight:600;
              white-space:nowrap; overflow:hidden; text-overflow:ellipsis; text-align:right;
              color:var(--text); }
.anim-track-wrap { flex:1; padding-right:65px; overflow:visible; }
.anim-track { height:30px; background:rgba(255,255,255,.06); border-radius:6px;
              position:relative; overflow:visible; }
.anim-fill  { height:100%; width:0; border-radius:6px; position:relative;
              background:var(--clr);
              animation: growBar 7s cubic-bezier(.15,.8,.3,1) forwards; }
.anim-fill::after { content:''; position:absolute; inset:0; border-radius:6px;
                    background:linear-gradient(to right,rgba(0,0,0,.35),transparent); }
.anim-car-wrap { position:absolute; right:-62px; top:50%; transform:translateY(-50%);
                 pointer-events:none; z-index:2; }
.anim-pts { min-width:60px; font-size:13px; font-weight:700; text-align:left;
            opacity:0; animation: fadeInPts 1.5s ease forwards; }

/* ── SESSION HEADER ── */
.session-hdr {
  display: flex; align-items: center; gap: 12px;
  padding: 10px 14px; background: rgba(225,6,0,.07);
  border-left: 3px solid var(--red); border-radius: 0 var(--r) var(--r) 0;
  margin-bottom: 0;
}
.session-hdr-title { font-size: 12px; font-weight: 700; text-transform: uppercase; letter-spacing: .6px; color: var(--red); }
.session-hdr-sub { font-size: 11px; color: var(--muted); }

/* ── BUTTONS ── */
.btn { display: inline-flex; align-items: center; gap: 6px; padding: 8px 16px; border: none; border-radius: var(--r); font-size: 13px; font-weight: 600; cursor: pointer; transition: all .15s; font-family: inherit; }
.btn-primary { background: var(--red); color: #fff; }
.btn-primary:hover { background: var(--red2); }
.btn-ghost { background: rgba(255,255,255,.07); color: var(--text); border: 1px solid var(--border2); }
.btn-ghost:hover { background: rgba(255,255,255,.12); }
.btn-success { background: rgba(0,216,86,.15); color: var(--green); border: 1px solid rgba(0,216,86,.3); }
.btn-success:hover { background: rgba(0,216,86,.25); }
.btn-danger { background: rgba(225,6,0,.12); color: #ff7070; border: 1px solid rgba(225,6,0,.25); }
.btn-danger:hover { background: rgba(225,6,0,.22); }
.btn-sm { padding: 5px 11px; font-size: 12px; }
.btn-xs { padding: 3px 8px; font-size: 11px; }

/* ── BADGES ── */
.badge { display: inline-flex; align-items: center; padding: 2px 8px; border-radius: 4px; font-size: 10px; font-weight: 700; letter-spacing: .3px; }
.badge-done       { background: rgba(0,216,86,.13); color: var(--green); }
.badge-upcoming   { background: rgba(120,120,120,.15); color: var(--muted2); }
.badge-next       { background: rgba(225,6,0,.18); color: var(--red); }
.badge-locked     { background: rgba(255,215,0,.15); color: var(--gold); }
.badge-cancelled  { background: rgba(120,120,120,.2); color: var(--muted); text-decoration: line-through; }

/* ── PARTICIPANT QUICK-SELECT CARDS ── */
.pq-grid { display: flex; flex-wrap: wrap; gap: 10px; margin-bottom: 16px; }
.pq-card {
  flex: 1 1 140px; max-width: 200px;
  background: var(--surface2); border: 1px solid var(--border2);
  border-radius: var(--r); padding: 10px 12px;
  cursor: pointer; transition: all .15s; text-align: left;
  color: var(--text); font-family: inherit;
}
.pq-card:hover { background: rgba(255,255,255,.08); border-color: var(--red); }
.pq-card.pq-done { border-color: rgba(0,216,86,.3); }
.pq-card.pq-done:hover { border-color: var(--green); }
.pq-name { font-size: 13px; font-weight: 700; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; margin-bottom: 4px; }
.pq-count { font-size: 11px; color: var(--muted); margin-bottom: 6px; }
.pq-bar-bg { height: 3px; background: rgba(255,255,255,.1); border-radius: 2px; }
.pq-bar-fill { height: 3px; border-radius: 2px; transition: width .3s; }

/* ── SECTION HEADER ── */
.sec-hdr { display: flex; align-items: center; justify-content: space-between; margin-bottom: 20px; flex-wrap: wrap; gap: 10px; }
.sec-title { font-size: 20px; font-weight: 700; }
.sec-actions { display: flex; gap: 8px; flex-wrap: wrap; }

/* ── PARTICIPANT CARDS ── */
.p-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(240px, 1fr)); gap: 14px; }
.p-card { background: var(--card); border: 1px solid var(--border); border-radius: var(--rl); padding: 18px; cursor: pointer; transition: border-color .15s; }
.p-card:hover { border-color: var(--border2); }
.p-card-hdr { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 10px; }
.p-name { font-size: 15px; font-weight: 700; }
.p-pts { font-size: 24px; font-weight: 800; color: var(--red); }
.p-pts-lbl { font-size: 10px; color: var(--muted); text-align: right; }

.add-p-card { background: transparent; border: 2px dashed var(--border2); border-radius: var(--rl); padding: 18px; display: flex; align-items: center; justify-content: center; gap: 10px; cursor: pointer; color: var(--muted); font-size: 14px; font-weight: 600; transition: all .15s; min-height: 130px; }
.add-p-card:hover { border-color: var(--red); color: var(--red); background: rgba(225,6,0,.05); }

/* ── CALENDAR ── */
.cal-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 12px; }
.race-card { background: var(--card); border: 1px solid var(--border); border-left: 3px solid transparent; border-radius: var(--rl); padding: 14px; cursor: pointer; transition: all .15s; }
.race-card:hover { background: var(--card2); border-color: var(--border2); }
.race-card.done { border-left-color: var(--green); }
.race-card.nxt  { border-left-color: var(--red); }
.race-card.cancelled { border-left-color: var(--muted); opacity: .55; }
.race-rnd { font-size: 10px; color: var(--muted); font-weight: 700; text-transform: uppercase; letter-spacing: .5px; margin-bottom: 4px; }
.race-nm  { font-size: 13px; font-weight: 700; line-height: 1.3; margin-bottom: 3px; }

/* ── MODAL ── */
.overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,.8); z-index: 1000; align-items: flex-start; justify-content: center; overflow-y: auto; padding: 32px 16px; backdrop-filter: blur(3px); }
.overlay.open { display: flex; }
.modal { background: #131313; border: 1px solid var(--border2); border-radius: var(--rl); width: 100%; max-width: 680px; margin: auto; box-shadow: 0 24px 60px rgba(0,0,0,.7); }
.modal.wide { max-width: 860px; }
.modal-hdr { padding: 18px 22px; border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; }
.modal-title { font-size: 17px; font-weight: 700; }
.modal-title-sub { font-size: 11px; color: var(--muted); margin-top: 2px; }
.modal-close { background: none; border: none; color: var(--muted); font-size: 18px; cursor: pointer; padding: 4px; line-height: 1; }
.modal-close:hover { color: var(--text); }
.modal-body { padding: 20px 22px; max-height: 72vh; overflow-y: auto; }
.modal-foot { padding: 14px 22px; border-top: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 10px; }
.modal-foot-right { display: flex; gap: 8px; }

/* ── PRED NAV ── */
.pred-nav { display: flex; align-items: center; gap: 10px; padding: 12px 22px; background: var(--card2); border-bottom: 1px solid var(--border); }
.pred-nav-name { font-weight: 700; font-size: 15px; flex: 1; text-align: center; }
.pred-nav-count { font-size: 11px; color: var(--muted); text-align: center; }

/* ── FORM ── */
.fg { margin-bottom: 15px; }
.fl { display: block; font-size: 11px; font-weight: 700; color: var(--muted2); margin-bottom: 5px; text-transform: uppercase; letter-spacing: .4px; }
.fi, .fs { width: 100%; background: var(--card); border: 1px solid var(--border2); border-radius: var(--r); color: var(--text); padding: 9px 12px; font-size: 14px; outline: none; transition: border-color .15s; font-family: inherit; }
.fi:focus, .fs:focus { border-color: var(--red); }
.fs { cursor: pointer; }

/* ── PRED FORM GRID ── */
.pred-form-section { margin-bottom: 22px; }
.pred-form-section-title { font-size: 11px; font-weight: 700; color: var(--muted); text-transform: uppercase; letter-spacing: .7px; margin-bottom: 10px; display: flex; align-items: center; gap: 8px; }
.pred-form-section-title::after { content: ''; flex: 1; height: 1px; background: var(--border); }
.pred-row { display: flex; align-items: center; gap: 12px; margin-bottom: 8px; }
.pred-pos-label { font-size: 13px; font-weight: 800; color: var(--red); width: 30px; flex-shrink: 0; }
.pred-pts-label { font-size: 11px; color: var(--muted); width: 42px; flex-shrink: 0; }

/* ── SCORING TABLE ── */
.scoring-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 20px; }
@media (max-width: 600px) { .scoring-grid { grid-template-columns: 1fr 1fr; } }
.scoring-section { }
.scoring-section-title { font-size: 11px; font-weight: 700; color: var(--muted); text-transform: uppercase; letter-spacing: .6px; margin-bottom: 10px; }
.scoring-row { display: flex; align-items: center; justify-content: space-between; padding: 6px 0; border-bottom: 1px solid var(--border); gap: 12px; }
.scoring-row:last-child { border-bottom: none; }
.scoring-row label { font-size: 13px; font-weight: 600; color: var(--red); }
.scoring-input { width: 72px; background: var(--card); border: 1px solid var(--border2); border-radius: var(--r); color: var(--text); padding: 6px 8px; font-size: 14px; font-weight: 700; text-align: center; outline: none; font-family: inherit; }
.scoring-input:focus { border-color: var(--red); }

/* ── MISC ── */
.sep { height: 1px; background: var(--border); margin: 16px 0; }
.pill { display: inline-flex; align-items: center; gap: 4px; padding: 2px 8px; border-radius: 4px; font-size: 11px; font-weight: 700; background: rgba(255,255,255,.06); border: 1px solid rgba(255,255,255,.09); margin: 2px; }
.dot { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; }
.empty { text-align: center; padding: 52px 20px; color: var(--muted); }
.empty-icon { font-size: 42px; display: block; margin-bottom: 12px; }
.empty-title { font-size: 17px; font-weight: 600; color: var(--muted2); margin-bottom: 6px; }
.empty-sub { font-size: 13px; margin-bottom: 16px; }

/* ── TOAST ── */
.toast-wrap { position: fixed; bottom: 22px; right: 22px; z-index: 2000; display: flex; flex-direction: column; gap: 7px; pointer-events: none; }
@keyframes clippyIn { from { opacity:0; transform: translateY(30px) scale(.85); } to { opacity:1; transform: translateY(0) scale(1); } }
#clippy-wrap.visible { display: flex !important; animation: clippyIn .5s cubic-bezier(.17,.67,.35,1.3) forwards; }
.toast { background: #1c1c1c; border: 1px solid var(--border2); border-radius: var(--r); padding: 11px 16px; font-size: 13px; font-weight: 500; box-shadow: 0 8px 24px rgba(0,0,0,.5); animation: tIn .18s ease; display: flex; align-items: center; gap: 8px; }
.toast.ok  { border-left: 3px solid var(--green); }
.toast.err { border-left: 3px solid var(--red); }
@keyframes tIn { from { opacity:0; transform:translateY(8px); } to { opacity:1; transform:translateY(0); } }

::-webkit-scrollbar { width: 5px; height: 5px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 3px; }

/* ── PRED RACE NAV ── */
.pred-race-nav {
  display: flex; gap: 10px; background: var(--card);
  border-top: 1px solid var(--border); padding: 10px 20px;
  position: sticky; bottom: 0; z-index: 100;
  margin: 16px -20px -24px; border-radius: 0 0 12px 12px;
}
.pred-race-nav .btn { flex: 1; font-size: 15px; padding: 10px; }

/* ── PRED RACE TITLE ── */
.pred-race-title {
  position: sticky; top: 108px; z-index: 98;
  background: var(--card); border: 1px solid var(--border);
  border-radius: 10px; padding: 12px 16px; margin-bottom: 12px;
  font-size: 20px; font-weight: 800;
}

/* ── RESPONSIVE ── */
@media (max-width: 600px) {
  .nav { position: fixed !important; top: auto !important; bottom: 0; left: 0; right: 0;
         border-bottom: none; border-top: 1px solid var(--border); z-index: 200; }
  .nav-inner { justify-content: space-around; padding: 0; gap: 0; }
  .nav-tab { flex: 1; flex-direction: column; padding: 7px 2px 10px;
             gap: 2px; border-bottom: none; border-top: 3px solid transparent; }
  .nav-tab.active { border-top-color: var(--red); border-bottom-color: transparent; }
  .nav-tab .ni { font-size: 20px; }
  .nav-tab span:not(.ni) { display: block !important; white-space: nowrap; overflow: hidden; font-size: 9px; }
  .main { padding-bottom: 90px; }
  .pred-race-nav { position: fixed !important; bottom: calc(84px + env(safe-area-inset-bottom, 0px)) !important; left: 0; right: 0; z-index: 201; border-radius: 0 !important; }
  #tab-predictions { padding-bottom: 140px; }
  #tab-results { padding-bottom: 140px; }
  .pred-race-title { top: 62px; }
  .stats-row { grid-template-columns: repeat(2,1fr); }
  .header-title { font-size: 16px; }
  .scoring-grid { grid-template-columns: 1fr; }
}

/* ── LIGHT MODE ── */
body.light {
  --bg: #f3f3f3; --card: #ffffff; --card2: #f0eeee;
  --border: #e0e0e0; --border2: #cccccc;
  --text: #111111; --muted: #777777; --muted2: #444444;
}
body.light .header   { background: #cc0600; }
body.light .nav      { background: #ebebeb; border-bottom-color: #d8d8d8; }
body.light .nav-tab  { color: #666; }
body.light .nav-tab:hover { background: rgba(0,0,0,.06); color: #111; }
body.light .toast    { background: #fff; color: #111; }
body.light .overlay  { background: rgba(0,0,0,.45); }
body.light .modal    { background: #fff; color: #111; }
body.light .btn-ghost { background: rgba(0,0,0,.07); color: #111; border-color: #ccc; }
body.light .btn-ghost:hover { background: rgba(0,0,0,.12); }
body.light ::-webkit-scrollbar-thumb { background: #ccc; }

/* ── STICKY PRED COL ── */
.pred-sticky { position: sticky; left: 0; background: var(--card); z-index: 3;
               border-right: 1px solid var(--border2); }

/* ── COLLAPSIBLE SESSION ── */
.sess-toggle { background: none; border: none; cursor: pointer; color: var(--muted);
               font-size: 13px; margin-left: 8px; padding: 0 4px; line-height: 1;
               font-family: inherit; transition: transform .2s; }

/* ── PODIUM ── */
.podium-wrap  { display: flex; justify-content: center; align-items: flex-end;
                gap: 10px; padding: 4px 10px 0; }
.podium-col   { display: flex; flex-direction: column; align-items: center; gap: 5px;
                flex: 1; max-width: 160px; }
.podium-name  { font-size: 13px; font-weight: 700; text-align: center;
                max-width: 130px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.podium-pts   { font-size: 11px; color: var(--muted2); }
.podium-block { width: 100%; border-radius: 8px 8px 0 0; display: flex;
                align-items: center; justify-content: center; font-size: 28px; }
.podium-p1    { height: 90px; background: linear-gradient(to top,rgba(255,215,0,.2),rgba(255,215,0,.05)); border: 1px solid rgba(255,215,0,.4); }
.podium-p2    { height: 65px; background: linear-gradient(to top,rgba(192,192,192,.2),rgba(192,192,192,.05)); border: 1px solid rgba(192,192,192,.35); }
.podium-p3    { height: 48px; background: linear-gradient(to top,rgba(205,127,50,.2),rgba(205,127,50,.05)); border: 1px solid rgba(205,127,50,.35); }

/* ── PODIUM REVEAL ANIMATION ── */
@keyframes riseBlock { from { transform: scaleY(0); } to { transform: scaleY(1); } }
@keyframes fadeInUp  { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
.reveal-col   { display: flex; flex-direction: column; align-items: center; gap: 8px;
                flex: 1; max-width: 200px; }
.reveal-name  { font-size: 13px; font-weight: 700; text-align: center; opacity: 0; }
.reveal-pts   { font-size: 12px; color: var(--muted2); opacity: 0; }
.reveal-block { width: 100%; border-radius: 8px 8px 0 0; display: flex;
                align-items: center; justify-content: center; font-size: 56px;
                transform-origin: bottom; }
.reveal-wrap  { display: flex; justify-content: center; align-items: flex-end;
                gap: 12px; min-height: 180px; padding: 0 10px; }
.podium-platform { width: 100%; display: flex; align-items: center; justify-content: center;
                   background: #f5f5f5; border-radius: 0 0 8px 8px;
                   padding: 8px 24px; margin-bottom: 16px; font-size: 15px; font-weight: 800;

  const [text, color] = MAP[status] || MAP.offline;
  el.textContent = text;
  el.style.color  = color;
}

function fbMerge(remote) {

function isPastDeadline(raceId) {
  if (!S.deadlineHours) return false;
  const race = raceById(raceId);
  if (!race) return false;
  const deadline = new Date(race.date + 'T12:00:00').getTime() - S.deadlineHours * 3600000;
  return Date.now() >= deadline;
}

function deadlineLabel(raceId) {
  if (!S.deadlineHours) return null;
  const race = raceById(raceId);
  if (!race) return null;
  const deadline = new Date(race.date + 'T12:00:00').getTime() - S.deadlineHours * 3600000;
  const diff = deadline - Date.now();
  if (diff <= 0) return { passed: true, text: 'Deadline passed' };
  const h = Math.floor(diff / 3600000);
  const m = Math.floor((diff % 3600000) / 60000);
  return { passed: false, text: h > 0 ? `${h}h ${m}m until deadline` : `${m}m until deadline` };
}

// Points for one participant in one race
// Driver finish position prediction: 0 pts for exact, -1pt per position off
function driverPlacePts(predicted, actual) {
  if (predicted == null || actual == null) return 0;
  return -Math.abs(predicted - actual) * (S.scoring.bonus?.driverPlace || 1);
}

function calcRacePts(pid, raceId) {
  if (S.cancelled?.[raceId]) return 0;
  const race = raceById(raceId);
  const res  = S.results[raceId];
  const pred = S.predictions[raceId]?.[pid];
  if (!res || !pred) return 0;

  let pts = 0;
  const sessions = race.sprint ? [
    { key: 'sprintquali', positions: PODIUM_POS },
    { key: 'sprint',      positions: PODIUM_POS },
    { key: 'quali',       positions: PODIUM_POS },
    { key: 'race',        positions: RACE_POS   },
  ] : [
    { key: 'quali',       positions: PODIUM_POS },
    { key: 'race',        positions: RACE_POS   },
  ];

  for (const { key, positions } of sessions) {
    for (const pos of positions) {
      const pDid = pred[key]?.[pos];
      const rDid = res[key]?.[pos];
      if (pDid && rDid && pDid === rDid) {
        pts += S.scoring[key]?.[pos] || 0;
      }
    }
    // Top-N bonus: driver predicted in this session appears anywhere in the
    // actual top-N results (stacks with exact-match pts)
    const topNPts = S.scoring[key]?.topN;
    if (topNPts && res[key] && pred[key]) {
      const resultSet = new Set(positions.map(p => res[key][p]).filter(Boolean));
      for (const pos of positions) {
        const pDid = pred[key]?.[pos];
        if (pDid && resultSet.has(pDid)) {
          pts += topNPts;
        }
      }
    }
    // Top-2 bonus: participant's P1 or P2 prediction appears in actual top 2 (race only)
    const top2Pts = S.scoring[key]?.top2;
    if (top2Pts && key === 'race' && res[key] && pred[key]) {
      const top2Set = new Set(['p1','p2'].map(p => res[key][p]).filter(Boolean));
      for (const pos of ['p1','p2']) {
        const pDid = pred[key]?.[pos];
        if (pDid && top2Set.has(pDid)) {
          pts += top2Pts;
        }
      }
    }
  }

  // Bonus predictions
  const pb = pred.bonus || {};
  const rb = res.bonus  || {};
  if (pb.fastestLap  && rb.fastestLap  && pb.fastestLap  === rb.fastestLap)  pts += S.scoring.bonus?.fastestLap  || 0;
  if (pb.driverPlace != null && rb.driverPlace != null) pts += driverPlacePts(pb.driverPlace, rb.driverPlace);
  if (pb.dotd        && rb.dotd        && pb.dotd        === rb.dotd)        pts += S.scoring.bonus?.dotd        || 0;

  return pts;
}

// Total season points for a participant
function calcTotal(pid) {
  return Object.keys(S.results).reduce((s, rid) => s + calcRacePts(pid, +rid), 0);
}

// How many predictions a participant submitted vs how many were correct for a race
function predStats(pid, raceId) {
  const race = raceById(raceId);
  const res  = S.results[raceId];
  const pred = S.predictions[raceId]?.[pid];
  const sessions = race.sprint ? [
    { key: 'sprintquali', positions: PODIUM_POS },
    { key: 'sprint',      positions: PODIUM_POS },
    { key: 'quali',       positions: PODIUM_POS },
    { key: 'race',        positions: RACE_POS   },
  ] : [
    { key: 'quali',       positions: PODIUM_POS },
    { key: 'race',        positions: RACE_POS   },
  ];

  if (!pred) return { made: 0, correct: 0, possible: 0 };

  let made = 0, correct = 0, possible = 0;
  for (const { key, positions } of sessions) {
    for (const pos of positions) {
      possible++;
      const pDid = pred[key]?.[pos];
      if (pDid) {
        made++;
        if (res && res[key]?.[pos] && pDid === res[key][pos]) correct++;
      }
    }
  }
  // Bonus
  const pb = pred.bonus || {};
  const rb = (res || {}).bonus || {};
  possible += 3;
  if (pb.fastestLap)  { made++; if (rb.fastestLap  && pb.fastestLap  === rb.fastestLap)  correct++; }
  if (pb.driverPlace != null && pb.driverPlace !== 0) { made++; if (rb.driverPlace != null && pb.driverPlace === rb.driverPlace) correct++; }
  if (pb.dotd)        { made++; if (rb.dotd        && pb.dotd        === rb.dotd)        correct++; }
  return { made, correct, possible };
}

// Total correct predictions across all races
function totalCorrect(pid) {
  return Object.keys(S.results).reduce((s, rid) => {
    const { correct } = predStats(pid, +rid);
    return s + correct;
  }, 0);
}

function leaderboard() {
  return S.participants
    .map(p => ({ ...p, total: calcTotal(p.id), correct: totalCorrect(p.id) }))
    .sort((a, b) => b.total - a.total || b.correct - a.correct);
}

// ── SPARKLINE ──────────────────────────────────────────────────────
function sparklineSvg(p, completedRaceIds) {
  if (completedRaceIds.length < 2) return '';
  const pts = completedRaceIds.map(id => calcRacePts(p.id, id));
  const minV = Math.min(...pts), maxV = Math.max(...pts);
  const range = maxV - minV || 1;
  const W = 52, H = 18;
  const points = pts.map((v, i) => {
    const x = (i / (pts.length - 1)) * W;
    const y = H - ((v - minV) / range) * H;
    return `${x.toFixed(1)},${y.toFixed(1)}`;
  }).join(' ');
  const color = pColor(p);
  return `<svg class="sparkline" width="${W}" height="${H}" viewBox="0 0 ${W} ${H}">
    <polyline points="${points}" fill="none" stroke="${color}" stroke-width="1.8"
              stroke-linecap="round" stroke-linejoin="round" opacity=".9"/>
    <circle cx="${(W).toFixed(1)}" cy="${(H - ((pts[pts.length-1]-minV)/range)*H).toFixed(1)}"
            r="2.5" fill="${color}"/>
  </svg>`;
}

// ── ACHIEVEMENTS ───────────────────────────────────────────────────
function computeAchievements(lb, completedRaceIds) {
  const result = {};
  lb.forEach(p => { result[p.id] = []; });
  if (completedRaceIds.length === 0) return result;

  const lastId = completedRaceIds[completedRaceIds.length - 1];

  // 🏆 Pole Position: highest points in most recent race
  const lastPts = lb.map(p => ({ id: p.id, pts: calcRacePts(p.id, lastId) }));
  const maxLastPts = Math.max(...lastPts.map(x => x.pts));
  if (maxLastPts > 0) lastPts.filter(x => x.pts === maxLastPts).forEach(x => result[x.id].push('pole'));

  // 🚀 Comeback King: biggest positive rank change in last race
  if (completedRaceIds.length >= 2) {
    const prevIds = completedRaceIds.slice(0, -1);
    const prevLb = [...lb].map(p => ({ id: p.id, total: prevIds.reduce((s, id) => s + calcRacePts(p.id, id), 0) }))
      .sort((a, b) => b.total - a.total);
    const prevRank = {};
    prevLb.forEach((p, i) => { prevRank[p.id] = i + 1; });
    let bestGain = 0;
    lb.forEach((p, i) => {
      const gain = (prevRank[p.id] || lb.length) - (i + 1);
      if (gain > bestGain) bestGain = gain;
    });
    if (bestGain > 0) {
      lb.forEach((p, i) => {
        if ((prevRank[p.id] || lb.length) - (i + 1) === bestGain) result[p.id].push('comeback');
      });
    }
  }

  // 🎯 Hat Trick: ≥ 3 correct predictions in each of the last 3 races
  if (completedRaceIds.length >= 3) {
    const last3 = completedRaceIds.slice(-3);
    lb.forEach(p => {
      const allHot = last3.every(id => predStats(p.id, id).correct >= 3);
      if (allHot) result[p.id].push('hatrick');
    });
  }

  return result;
}

function renderReplayChart(lb, upToRaceIds) {
  if (upToRaceIds.length === 0) return '<div style="color:var(--muted);padding:12px 0">No races completed yet.</div>';
  const data = lb.map(p => ({ ...p, pts: upToRaceIds.reduce((s, id) => s + calcRacePts(p.id, id), 0) }))
    .sort((a, b) => b.pts - a.pts);
  const maxPts = Math.max(...data.map(d => d.pts), 1);
  return `<div class="anim-chart" id="anim-chart-replay">
    ${data.map((p, i) => {
      const color = pColor(p);
      const pct   = (Math.max(0, p.pts) / maxPts * 100).toFixed(1);
      return `
        <div class="anim-row" data-replay-pid="${p.id}" data-replay-rank="${i}">
          <div class="anim-label">${esc(p.name)}</div>
          <div class="anim-track-wrap">

              <div class="anim-fill" style="--pct:${pct}%;--clr:${color};width:${pct}%;animation:none;transition:width .6s cubic-bezier(.4,0,.2,1)">
                <div class="anim-car-wrap">${carSvg(color)}</div>
              </div>
            </div>

}

function stepReplay(dir, lb) {
  const completedRaceIds = RACES.filter(r => S.results[r.id] && !S.cancelled?.[r.id]).map(r => r.id);
  const prevRanks = {};
  if (_replayStep > 0) {
    const prevData = lb.map(p => ({ id: p.id, pts: completedRaceIds.slice(0, _replayStep).reduce((s, id) => s + calcRacePts(p.id, id), 0) }))
      .sort((a, b) => b.pts - a.pts);
    prevData.forEach((p, i) => { prevRanks[p.id] = i; });
  }

  _replayStep = Math.max(0, Math.min(completedRaceIds.length, _replayStep + dir));
  const upTo = completedRaceIds.slice(0, _replayStep);
  const data  = lb.map(p => ({ ...p, pts: upTo.reduce((s, id) => s + calcRacePts(p.id, id), 0) }))
    .sort((a, b) => b.pts - a.pts);
  const maxPts = Math.max(...data.map(d => d.pts), 1);

  const chart = document.getElementById('anim-chart-replay');
  if (!chart) return;

  // Update bars + detect overtakes
  data.forEach((p, newRank) => {
    const row = chart.querySelector(`[data-replay-pid="${p.id}"]`);
    if (!row) return;
    const fill = row.querySelector('.anim-fill');
    const ptsEl = row.querySelector('.anim-pts');
    const pct   = (Math.max(0, p.pts) / maxPts * 100).toFixed(1);
    if (fill) { fill.style.setProperty('--pct', pct + '%'); fill.style.width = pct + '%'; }
    if (ptsEl) ptsEl.textContent = p.pts + ' pts';
    const wasRank = prevRanks[p.id];
    if (wasRank != null && wasRank > newRank && _replayStep > 0) {
      row.classList.remove('overtake-flash');
      void row.offsetWidth;
      row.classList.add('overtake-flash');
      row.addEventListener('animationend', () => row.classList.remove('overtake-flash'), { once: true });
    }
  });

  const lbl = document.getElementById('replay-race-label');
  if (lbl) lbl.textContent = _replayStep === 0 ? 'Start — no races yet'
    : `After Round ${completedRaceIds[_replayStep-1]}: ${raceById(completedRaceIds[_replayStep-1]).name}`;

  const prevBtn = document.getElementById('replay-prev');
  const nextBtn = document.getElementById('replay-next');
  if (prevBtn) prevBtn.disabled = _replayStep === 0;
  if (nextBtn) nextBtn.disabled = _replayStep >= completedRaceIds.length;

  if (_replayStep === completedRaceIds.length && completedRaceIds.length > 0) fireConfetti();
}

function playReplayAuto(lb) {
  clearInterval(_replayTimer);
  const completedRaceIds = RACES.filter(r => S.results[r.id] && !S.cancelled?.[r.id]).map(r => r.id);
  _replayStep = 0;
  stepReplay(0, lb);
  _replayTimer = setInterval(() => {
    if (_replayStep >= completedRaceIds.length) { clearInterval(_replayTimer); return; }
    stepReplay(1, lb);
  }, 1400);
}

function renderRaceReplay(lb) {
  const completedRaceIds = RACES.filter(r => S.results[r.id] && !S.cancelled?.[r.id]).map(r => r.id);
  if (completedRaceIds.length === 0) return '';
  const upTo = completedRaceIds.slice(0, _replayStep);
  return `
    <div class="card">
      <div style="display:flex;align-items:center;gap:12px;margin-bottom:16px;flex-wrap:wrap">
        <div class="card-title" style="margin:0;flex:1">Race-by-Race Replay</div>
        <button class="btn btn-ghost btn-sm" onclick="playReplayAuto(window._replayLb)">▶ Play All</button>
      </div>
      <div id="replay-race-label" class="replay-race-label">
        ${_replayStep === 0 ? 'Press ▶ Play All or use arrows' : `After Round ${completedRaceIds[_replayStep-1]}: ${raceById(completedRaceIds[_replayStep-1]).name}`}
      </div>
      ${renderReplayChart(lb, upTo)}
      <div style="display:flex;gap:8px;justify-content:center;margin-top:16px">
        <button id="replay-prev" class="btn btn-ghost" onclick="stepReplay(-1,window._replayLb)" ${_replayStep===0?'disabled':''}>◀ Prev Race</button>
        <button id="replay-next" class="btn btn-ghost" onclick="stepReplay(1,window._replayLb)" ${_replayStep>=completedRaceIds.length?'disabled':''}>Next Race ▶</button>
      </div>
    </div>`;
}

// ── CHAMPAGNE ─────────────────────────────────────────────────────
function fireChampagne() {
  const colors = ['#ffd700','#ffe566','#fff8dc','#fffacd','#f5e642','#ffffff','#c8f5c0'];
  const count = 70;

  // P3 fires first, then P2, then P1 (matching reveal order)
  const sources = [
    { id: 'p3-reveal-block', delay: 0 },
    { id: 'p2-reveal-block', delay: 600 },
    { id: 'p1-reveal-block', delay: 1200 },
  ];

  sources.forEach(({ id, delay: sourceDelay }) => {
    const block = document.getElementById(id);
    if (!block) return;
    const rect = block.getBoundingClientRect();
    const cx = rect.left + rect.width / 2;
    const cy = rect.top + 10;

    for (let i = 0; i < count; i++) {
      setTimeout(() => {
        const el = document.createElement('div');
        el.className = 'champ-drop';
        const size = 4 + Math.random() * 7;
        const angleDeg = (Math.random() * 160 - 80);
        const angleRad = angleDeg * Math.PI / 180;
        const speed = 60 + Math.random() * 130;
        const dx = Math.sin(angleRad) * speed;
        const dy = -(Math.cos(angleRad) * speed) - Math.random() * 30;
        const dur = (1.2 + Math.random() * 1.2).toFixed(2);

        el.style.cssText = `
          left:${cx - size/2}px; top:${cy - size/2}px;
          width:${size}px; height:${size}px;
          background:${colors[Math.floor(Math.random() * colors.length)]};
          --cdx0:0px; --cdy0:0px;
          --cdx1:${dx.toFixed(1)}px; --cdy1:${dy.toFixed(1)}px;
          --cdur:${dur}s; --cdelay:0s;
        `;
        document.body.appendChild(el);
        setTimeout(() => el.remove(), (+dur + 0.1) * 1000);
      }, sourceDelay + i * 18);
    }
  });

  // After all particles from all sources have finished
  const lastParticleEnd = 1200 + (count - 1) * 18 + 2500;
  setTimeout(() => { _standingsRevealed = true; reRenderActive(); }, lastParticleEnd);

  // Helicopter special: flies in if Kelly wins
  const p1winner = leaderboard().map(p => ({ ...p, rpts: calcRacePts(p.id, _revealRaceId) }))
    .sort((a, b) => b.rpts - a.rpts)[0];
  if (p1winner && p1winner.name.toLowerCase().includes('kelly')) {
    setTimeout(fireHelicopter, 800);
  }
}


function fireHelicopter() {
  const p1block = document.getElementById('p1-reveal-block');
  if (!p1block) return;
  const rect = p1block.getBoundingClientRect();
  const cx = rect.right - 60; // land on right side of block so winner name stays visible
  const cy = rect.top - 115; // bottom of emoji sits just at top of block

  const el = document.createElement('div');
  el.className = 'heli-el';
  el.textContent = '🚁';
  el.style.cssText = `left:${cx}px; top:${cy}px; animation: heliFlyin 2.2s cubic-bezier(.22,.8,.22,1) forwards;`;
  document.body.appendChild(el);

  // Switch to bobbing hover after fly-in
  setTimeout(() => {
    el.style.animation = 'heliBob 1.6s ease-in-out infinite';
    // Fly out left after hovering for a bit
    setTimeout(() => {
      el.style.animation = 'heliFlyout 1.4s ease-in forwards';
      setTimeout(() => el.remove(), 1500);
    }, 5000);
  }, 2200);
}

function fireConfetti() {
  const colors = ['#e10600','#ffd700','#00d856','#00aaff','#ff6b35','#b44fd9','#ff4d9e','#ffffff'];
  for (let i = 0; i < 80; i++) {
    setTimeout(() => {
      const el = document.createElement('div');
      el.className = 'confetti-piece';
      el.style.left = Math.random() * 100 + 'vw';
      el.style.background = colors[Math.floor(Math.random() * colors.length)];
      el.style.animationDuration = (1.5 + Math.random() * 2) + 's';
      el.style.animationDelay = '0s';
      el.style.transform = `rotate(${Math.random()*360}deg)`;
      el.style.width  = (6 + Math.random() * 8) + 'px';
      el.style.height = (10 + Math.random() * 10) + 'px';
      document.body.appendChild(el);
      setTimeout(() => el.remove(), 4000);
    }, i * 30);
  }
}

// Builds <option> list grouped by team for driver selects
function driverOptions(selectedId) {
  // Build last-race position hints
  const doneIds = RACES.filter(r => S.results[r.id] && !S.cancelled?.[r.id]).map(r => r.id);
  const lastRes = doneIds.length > 0 ? S.results[doneIds[doneIds.length - 1]] : null;
  const lastPos = {};
  if (lastRes?.race) {
    RACE_POS.forEach(pos => { const did = lastRes.race[pos]; if (did) lastPos[did] = pos.toUpperCase(); });
  }
  const teams = [...new Set(DRIVERS.map(d => d.team))];
  return `<option value="">— Select Driver —</option>` +
    teams.map(team => {
      const drv = DRIVERS.filter(d => d.team === team);
      return `<optgroup label="${esc(team)}">${drv.map(d => {
        const hint = lastPos[d.id] ? ` · ${lastPos[d.id]} last` : '';
        return `<option value="${d.id}" ${d.id === selectedId ? 'selected' : ''}>${d.num ? d.num + '. ' : ''}${esc(d.name)}${hint}</option>`;
      }).join('')}</optgroup>`;
    }).join('');
}

function renderBarChart(mode, lb) {
  const completedRaceIds = RACES.filter(r => S.results[r.id] && !S.cancelled?.[r.id]).map(r => r.id);

  if (mode === 'race' && !_animRaceId) return '<div style="color:var(--muted);padding:16px 0">No race results yet — enter results first.</div>';
  if (lb.length === 0) return '<div style="color:var(--muted);padding:16px 0">No participants yet.</div>';

  const data = lb.map(p => ({
    ...p,
    pts: mode === 'race' ? calcRacePts(p.id, _animRaceId) : p.total
  })).sort((a, b) => a.name.localeCompare(b.name));

  const maxAbs = Math.max(...data.map(d => Math.abs(d.pts)), 1);

  return `<div class="anim-chart" id="anim-chart-${mode}">
    ${data.map((p, i) => {
      const color   = pColor(p);
      const pct     = (Math.max(0, p.pts) / maxAbs * 100).toFixed(1);
      const delay     = (i * 0.65).toFixed(2);
      const ptsDelay  = (i * 0.65 + 6).toFixed(2);
      const ptsColor = p.pts < 0 ? '#ff7070' : p.pts === 0 ? 'var(--muted)' : color;
      return `
        <div class="anim-row">
          <div class="anim-label">${esc(p.name)}</div>
          <div class="anim-track-wrap">
            <div class="anim-track">
              <div class="anim-fill" style="--pct:${pct}%;--clr:${color};animation-delay:${delay}s">
                <div class="anim-car-wrap">${carSvg(color)}</div>
              </div>
            </div>
          </div>
          <div class="anim-pts" style="color:${ptsColor};animation-delay:${ptsDelay}s">${p.pts} pts</div>
        </div>`;
    }).join('')}
  </div>`;
}

function renderProgressionChart(lb) {
  const completedRaces = RACES.filter(r => S.results[r.id] && !S.cancelled?.[r.id]);
  if (completedRaces.length === 0 || lb.length === 0) return '';

  const W = 900, H = 320;
  const padL = 42, padR = 110, padT = 24, padB = 38;
  const chartW = W - padL - padR;
  const chartH = H - padT - padB;
  const n = completedRaces.length;

  // Cumulative points per participant at each completed race
  const series = lb.map(p => {
    let cum = 0;
    return { ...p, pts: completedRaces.map(r => { cum += calcRacePts(p.id, r.id); return cum; }) };
  });

  const maxPts = Math.max(...series.flatMap(s => s.pts), 10);

  const xOf = i => padL + (n > 1 ? (i / (n - 1)) : 0.5) * chartW;
  const yOf = v => padT + chartH - (v / maxPts) * chartH;

  // Y-axis grid lines + labels (5 ticks)
  const grid = Array.from({length: 6}, (_, i) => {
    const v = Math.round(maxPts * i / 5 / 5) * 5;
    const y = yOf(v);
    return `<line x1="${padL}" y1="${y}" x2="${padL + chartW}" y2="${y}" stroke="rgba(255,255,255,.07)" stroke-width="1"/>
            <text x="${padL - 6}" y="${y + 4}" text-anchor="end" font-size="10" fill="rgba(255,255,255,.3)">${v}</text>`;
  }).join('');

  // X-axis race labels
  const xLabels = completedRaces.map((r, i) => {
    const lbl = r.loc.length > 10 ? r.loc.slice(0, 9) + '…' : r.loc;
    return `<text x="${xOf(i)}" y="${padT + chartH + 20}" text-anchor="middle" font-size="10" fill="rgba(255,255,255,.4)">${lbl}</text>`;
  }).join('');

  // Vertical tick marks on x-axis
  const xTicks = completedRaces.map((_, i) =>
    `<line x1="${xOf(i)}" y1="${padT + chartH}" x2="${xOf(i)}" y2="${padT + chartH + 5}" stroke="rgba(255,255,255,.2)" stroke-width="1"/>`
  ).join('');

  // Sort final y positions to offset overlapping name labels
  const labelSlots = series.map((s, si) => ({
    si, y: yOf(s.pts[n - 1]), color: pColor(lb[si]), name: s.name
  })).sort((a, b) => a.y - b.y);
  const MIN_GAP = 14;
  for (let i = 1; i < labelSlots.length; i++) {
    if (labelSlots[i].y - labelSlots[i-1].y < MIN_GAP)
      labelSlots[i].y = labelSlots[i-1].y + MIN_GAP;
  }
  const labelY = {};
  labelSlots.forEach(s => { labelY[s.si] = s.y; });

  // Lines, dots, name labels
  const lines = series.map((s, si) => {
    const color = pColor(lb[si]);
    const animDelay = (si * 0.07).toFixed(2);

    if (n === 1) {
      return `<circle cx="${xOf(0)}" cy="${yOf(s.pts[0])}" r="5" fill="${color}"/>
              <text x="${xOf(0) + 10}" y="${yOf(s.pts[0]) + 4}" font-size="11" fill="${color}" font-weight="700">${esc(s.name)}</text>`;
    }

    const d = s.pts.map((v, i) => `${i === 0 ? 'M' : 'L'}${xOf(i).toFixed(1)} ${yOf(v).toFixed(1)}`).join(' ');

    const dots = s.pts.map((v, i) => {
      const dotDelay = (parseFloat(animDelay) + (i / (n - 1)) * 1.2).toFixed(2);
      return `<circle cx="${xOf(i).toFixed(1)}" cy="${yOf(v).toFixed(1)}" r="3.5" fill="${color}"
                opacity="0" style="animation:fadeDot .2s ${dotDelay}s ease forwards"/>`;
    }).join('');

    const lx = xOf(n - 1);
    const ly = labelY[si];
    const labelDelay = (parseFloat(animDelay) + 1.3).toFixed(2);

    // Connector line from path end to label if offset
    const actualLy = yOf(s.pts[n - 1]);
    const connector = Math.abs(ly - actualLy) > 2
      ? `<line x1="${(lx + 5).toFixed(1)}" y1="${actualLy.toFixed(1)}" x2="${(lx + 7).toFixed(1)}" y2="${ly.toFixed(1)}"
               stroke="${color}" stroke-width="1" opacity=".5"
               style="opacity:0;animation:fadeDot .2s ${labelDelay}s ease forwards"/>`
      : '';

    return `
      <path pathLength="1" d="${d}" fill="none" stroke="${color}" stroke-width="2.5" stroke-linejoin="round" stroke-linecap="round"
            style="stroke-dasharray:1;stroke-dashoffset:1;animation:drawLine 1.4s ${animDelay}s cubic-bezier(.4,0,.2,1) forwards"/>
      ${dots}
      ${connector}
      <text x="${(lx + 10).toFixed(1)}" y="${(ly + 4).toFixed(1)}" font-size="11" fill="${color}" font-weight="700"
            style="opacity:0;animation:fadeDot .3s ${labelDelay}s ease forwards">${esc(s.name)}</text>
    `;
  }).join('');

  return `
    <div class="card">
      <div class="card-title">Championship Progression</div>
      <div style="overflow-x:auto;-webkit-overflow-scrolling:touch">
        <svg viewBox="0 0 ${W} ${H}" style="width:100%;min-width:480px;display:block;font-family:inherit">
          <!-- axis lines -->
          <line x1="${padL}" y1="${padT}" x2="${padL}" y2="${padT + chartH}" stroke="rgba(255,255,255,.15)" stroke-width="1"/>
          <line x1="${padL}" y1="${padT + chartH}" x2="${padL + chartW}" y2="${padT + chartH}" stroke="rgba(255,255,255,.15)" stroke-width="1"/>
          ${grid}
          ${xTicks}
          ${xLabels}
          ${lines}
        </svg>
      </div>
    </div>
  `;
}

function renderHeadToHead(lb) {
  if (lb.length < 2) return '';
  const completedRaceIds = RACES.filter(r => S.results[r.id] && !S.cancelled?.[r.id]).map(r => r.id);
  if (completedRaceIds.length === 0) return '';

  const parts = [...lb].sort((a, b) => a.name.localeCompare(b.name));
  const n = parts.length;
  const wins = Array.from({length: n}, () => Array(n).fill(0));
  completedRaceIds.forEach(rid => {
    const pts = parts.map(p => calcRacePts(p.id, rid));
    for (let i = 0; i < n; i++)
      for (let j = 0; j < n; j++)
        if (i !== j && pts[i] > pts[j]) wins[i][j]++;
  });

  const initials = p => p.name.split(' ').map(w => w[0]).join('');
  return `
    <div class="card">
      <div class="card-title">Head to Head</div>
      <p style="font-size:11px;color:var(--muted);margin:-6px 0 12px">Wins–Losses per race across ${completedRaceIds.length} completed race${completedRaceIds.length===1?'':'s'}</p>
      <div class="tw">
        <table>
          <thead><tr>
            <th></th>
            ${parts.map(p => `<th style="text-align:center;font-size:11px;white-space:nowrap">${esc(p.name)}</th>`).join('')}
          </tr></thead>
          <tbody>
            ${parts.map((pi, i) => `
              <tr>
                <td style="font-size:12px;white-space:nowrap"><strong>${esc(pi.name)}</strong></td>
                ${parts.map((pj, j) => {
                  if (i === j) return `<td style="background:rgba(255,255,255,.03);text-align:center;color:var(--muted)">·</td>`;
                  const w = wins[i][j], l = wins[j][i];
                  const clr = w > l ? 'var(--green)' : w < l ? '#ff7070' : 'var(--muted)';
                  return `<td style="text-align:center;color:${clr};font-weight:700;font-size:13px">${w}–${l}</td>`;
                }).join('')}
              </tr>
            `).join('')}
          </tbody>
        </table>
      </div>
    </div>
  `;
}

function renderDashboard() {
  const el = document.getElementById('tab-dashboard');
  const lb = leaderboard();
  const done = Object.keys(S.results).length;
  const nr = nextRace();

  // Trend arrows: rank now vs rank before last race
  const completedRaceIds = Object.keys(S.results).map(Number).sort((a,b) => a-b);
  const prevRanks = {};
  if (completedRaceIds.length >= 2) {
    const prevIds = completedRaceIds.slice(0, -1);
    [...S.participants]
      .map(p => ({ id: p.id, total: prevIds.reduce((s, id) => s + calcRacePts(p.id, id), 0) }))
      .sort((a, b) => b.total - a.total)
      .forEach((p, i) => { prevRanks[p.id] = i + 1; });
  }
  const trendHtml = p => {
    const prev = prevRanks[p.id];
    if (prev == null) return '';
    const curr = lb.findIndex(x => x.id === p.id) + 1;
    const diff = prev - curr;
    if (diff > 0) return `<span style="color:var(--green);font-size:11px;font-weight:700;margin-left:4px">▲${diff}</span>`;
    if (diff < 0) return `<span style="color:#ff7070;font-size:11px;font-weight:700;margin-left:4px">▼${Math.abs(diff)}</span>`;
    return `<span style="color:var(--muted);font-size:11px;margin-left:4px">—</span>`;
  };

  // Achievement badges
  const achievements = computeAchievements(lb, completedRaceIds);
  // Expose lb for replay callbacks
  window._replayLb = lb;

  el.innerHTML = `

          <div class="stat-value" style="font-size:20px;line-height:1.1">🔒</div>
          <div class="stat-sub">Reveal podium first</div>

      </div>
      <div class="stat-card">
        <div class="stat-label">Next Race</div>
        <div class="stat-value" style="font-size:16px;line-height:1.2">${nr ? nr.name.replace(' Grand Prix',' GP') : 'Season Complete'}</div>
        <div class="stat-sub">${nr ? fmtDate(nr.date) : ''}</div>
      </div>
    </div>

    ${lb.length > 0 ? renderPodiumReveal(lb) : ''}

    ${(!_podiumRevealed || !_standingsRevealed) && completedRaceIds.length > 0 ? `
      <div class="card" style="text-align:center;padding:32px 20px;opacity:.55">
        <div style="font-size:28px;margin-bottom:8px">🏆</div>
        <div style="color:var(--muted);font-size:13px">Season standings will appear after the podium reveal</div>
      </div>
    ` : `
    <div class="card">
      <div class="card-title">Season Standings</div>
      ${lb.length === 0 ? `
        <div class="empty">
          <span class="empty-icon">🏆</span>
          <div class="empty-title">No participants yet</div>
          <div class="empty-sub">Add participants, then enter their predictions before each race</div>
          <button class="btn btn-primary" onclick="switchTab('participants')">Add Participants</button>

      ` : `
        ${renderPodium(lb)}
        <div class="tw">

            <thead><tr>
              <th>Rank</th><th>Participant</th>
              <th style="text-align:right">Total Points</th>
              <th style="text-align:center">Correct Preds</th>
              <th style="text-align:right">Last Race</th>
            </tr></thead>
            <tbody>
              ${lb.map((p, i) => {
                const icon = i===0?'🥇':i===1?'🥈':i===2?'🥉':`<span style="color:var(--muted);font-weight:700">#${i+1}</span>`;
                const lastRaceId = completedRaceIds[completedRaceIds.length - 1];
                const lastPts = lastRaceId ? calcRacePts(p.id, lastRaceId) : null;
                const achs = achievements[p.id] || [];
                const achHtml = achs.map(a => ({
                  pole:     `<span class="ach-badge ach-pole"     title="Top scorer last race">🏆 Pole</span>`,
                  comeback: `<span class="ach-badge ach-comeback" title="Biggest rank gain last race">🚀 Comeback</span>`,
                  hatrick:  `<span class="ach-badge ach-hatrick"  title="≥3 correct preds in last 3 races">🎯 Hat Trick</span>`,
                }[a] || '')).join('');
                return `<tr>
                  <td style="font-size:17px">${icon}</td>
                  <td>
                    <strong>${esc(p.name)}</strong>${trendHtml(p)}${achHtml}
                    ${sparklineSvg(p, completedRaceIds)}
                  </td>
                  <td style="text-align:right"><strong style="font-size:16px;color:var(--red)">${p.total}</strong></td>
                  <td style="text-align:center">
                    <span style="color:var(--green);font-weight:700">${p.correct}</span>

    </div>

    ${_standingsRevealed ? `
    ${done > 0 ? (() => {
      const completedRaces = RACES.filter(r => S.results[r.id] && !S.cancelled?.[r.id]).slice(-8);

        <div class="card">

            </table>

    })() : ''}

    ${lb.length > 0 ? renderAnimations(lb) : ''}

    ${renderProgressionChart(lb)}

    ${lb.length > 0 ? renderRaceReplay(lb) : ''}

  `;
}

function renderParticipantCards(raceId) {
  const race   = raceById(raceId);
  const locked = !!S.locked[raceId];

  // Work out how many positions are preditable per participant
  const sessions = race.sprint ? [
    { key: 'sprintquali', positions: PODIUM_POS },
    { key: 'sprint',      positions: PODIUM_POS },
    { key: 'quali',       positions: PODIUM_POS },
    { key: 'race',        positions: RACE_POS   },
  ] : [
    { key: 'quali',       positions: PODIUM_POS },
    { key: 'race',        positions: RACE_POS   },
  ];
  const totalSlots = sessions.reduce((s, sess) => s + sess.positions.length, 0);

  const filledSlots = pid => sessions.reduce((s, sess) => {
    const pred = S.predictions[raceId]?.[pid] || {};
    return s + sess.positions.filter(pos => pred[sess.key]?.[pos]).length;
  }, 0);

  const cards = S.participants.map(p => {
    const filled  = filledSlots(p.id);
    const pct     = totalSlots ? Math.round(filled / totalSlots * 100) : 0;
    const isDone  = filled === totalSlots;
    const barClr  = isDone ? 'var(--green)' : pct > 0 ? 'var(--red)' : 'rgba(255,255,255,.2)';
    const pLocked = !!S.lockedP?.[raceId]?.[p.id];
    const anyLocked = locked || pLocked;
    return `
      <button class="pq-card${isDone ? ' pq-done' : ''}" onclick="openPredictionsModal(${raceId}, '${p.id}')">
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:4px">
          <div class="pq-name" style="margin:0">${esc(p.name)}</div>
          <span style="font-size:13px">${isDone ? '✅' : filled > 0 ? '⚠️' : '○'}</span>
        </div>
        <div class="pq-count">${filled} / ${totalSlots} positions${anyLocked ? ' 🔒' : ' ✏'}</div>
        <div class="pq-bar-bg">
          <div class="pq-bar-fill" style="width:${pct}%;background:${barClr}"></div>
        </div>
      </button>`;
  }).join('');

  return `<div class="pq-grid">${cards}</div>`;
}

function renderPredTable(raceId) {
  const race = raceById(raceId);
  const res  = S.results[raceId];
  const lb   = leaderboard().sort((a, b) => a.name.localeCompare(b.name));

  const sessions = race.sprint ? [
    { key: 'sprintquali', label: 'Sprint Quali Predictions',  positions: PODIUM_POS, icon: '🕐' },
    { key: 'sprint',      label: 'Sprint Race Predictions',   positions: PODIUM_POS, icon: '🏁' },
    { key: 'quali',       label: 'Qualifying Predictions',    positions: PODIUM_POS, icon: '🕐' },
    { key: 'race',        label: 'Race Predictions',          positions: RACE_POS,   icon: '🏁' },
  ] : [
    { key: 'quali',       label: 'Qualifying Predictions',    positions: PODIUM_POS, icon: '🕐' },
    { key: 'race',        label: 'Race Predictions',          positions: RACE_POS,   icon: '🏁' },
  ];

  const getPred = (pid, session, pos) => S.predictions[raceId]?.[pid]?.[session]?.[pos] || null;
  const getRes  = (session, pos)      => res?.[session]?.[pos] || null;

  const cellHtml = (pid, session, pos, topNSet) => {
    const pDid = getPred(pid, session, pos);
    const rDid = getRes(session, pos);
    const d = pDid ? driverById(pDid) : null;

    if (!d) return `<td class="pc pc-nil">—</td>`;

    let cls = 'pc';
    let icon = '';
    if (rDid !== null) {
      if (pDid === rDid)                          { cls += ' pc-ok';      icon = ' ✓'; }
      else if (topNSet && topNSet.has(pDid))      { cls += ' pc-partial'; icon = ' ~'; }
      else                                        { cls += ' pc-no';      icon = ' ✗'; }
    }
    return `<td class="${cls}">
      <span style="display:inline-flex;align-items:center;gap:3px">
        <span class="dot" style="background:${tc(d.team)}"></span>${d.abbr}${icon}
      </span>
    </td>`;
  };

  // ── Bonus helpers ────────────────────────────────────────────────
  const bonusDrv    = driverById(S.bonusDriverId);
  const bonusMaxPts = (S.scoring.bonus?.fastestLap || 0) + (S.scoring.bonus?.dotd || 0);

  const bonusDriverCell = (pid, field) => {
    const pDid = S.predictions[raceId]?.[pid]?.bonus?.[field] || null;
    const rDid = res?.bonus?.[field] || null;
    const d = pDid ? driverById(pDid) : null;
    if (!d) return `<td class="pc pc-nil">—</td>`;
    let cls = 'pc', icon = '';
    if (rDid != null) { cls += pDid === rDid ? ' pc-ok' : ' pc-no'; icon = pDid === rDid ? ' ✓' : ' ✗'; }
    return `<td class="${cls}"><span style="display:inline-flex;align-items:center;gap:3px"><span class="dot" style="background:${tc(d.team)}"></span>${d.abbr}${icon}</span></td>`;
  };
  const resDrvCell = field => {
    const did = res?.bonus?.[field];
    const d = did ? driverById(did) : null;
    return `<td class="pc pc-res">${d ? `<span style="display:inline-flex;align-items:center;gap:3px"><span class="dot" style="background:${tc(d.team)}"></span>${d.abbr}</span>` : '<span style="color:var(--muted)">—</span>'}</td>`;
  };

  // Collapsible session state (global per page load)
  if (!window._collSess) window._collSess = {};
  window.toggleSess = function(key) {
    window._collSess[key] = !window._collSess[key];
    const collapsed = window._collSess[key];
    document.querySelectorAll(`[data-sess="${key}"]`).forEach(r => r.style.display = collapsed ? 'none' : '');
    const arrow = document.getElementById(`sarrow-${key}`);
    if (arrow) arrow.textContent = collapsed ? '▶' : '▼';
  };

  // Section-header row spanning all columns
  const secHdr = (icon, label, maxPts, sessKey) => {
    const cols = 2 + lb.length;
    const collapsed = sessKey && window._collSess[sessKey];
    const arrow = sessKey ? `<button class="sess-toggle" id="sarrow-${sessKey}" onclick="toggleSess('${sessKey}')">${collapsed ? '▶' : '▼'}</button>` : '';
    return `<tr style="background:rgba(225,6,0,.06)">
      <td colspan="${cols}" class="pred-sticky" style="padding:6px 10px;border-left:3px solid var(--red)">
        <span style="font-size:14px">${icon}</span>
        <strong style="color:var(--red);text-transform:uppercase;letter-spacing:.5px;font-size:11px;margin-left:6px">${label}</strong>
        <span style="font-size:10px;color:var(--muted);margin-left:8px">Max ${maxPts} pts</span>
        ${arrow}
      </td>
    </tr>`;
  };

  // Build session rows
  const sessionRows = sessions.map(sess => {
    const maxPts = sess.positions.reduce((s, pos) => s + (S.scoring[sess.key]?.[pos] || 0), 0);
    const topNPts = S.scoring[sess.key]?.topN || 0;
    const topNSet = res?.[sess.key]
      ? new Set(sess.positions.map(p => res[sess.key][p]).filter(Boolean))
      : null;

    const exactPts = pid => sess.positions.reduce((acc, pos) => {
      const pDid = getPred(pid, sess.key, pos);
      const rDid = getRes(sess.key, pos);
      return (pDid && rDid && pDid === rDid) ? acc + (S.scoring[sess.key]?.[pos] || 0) : acc;
    }, 0);

    const topNBonus = pid => {
      if (!topNPts || !topNSet) return 0;
      return sess.positions.reduce((acc, pos) => {
        const pDid = getPred(pid, sess.key, pos);
        return (pDid && topNSet.has(pDid)) ? acc + topNPts : acc;
      }, 0);
    };

    const top2Pts = sess.key === 'race' ? (S.scoring.race?.top2 || 0) : 0;
    const top2Set = top2Pts && res?.race
      ? new Set(['p1','p2'].map(p => res.race[p]).filter(Boolean))
      : null;
    const top2Bonus = pid => {
      if (!top2Pts || !top2Set) return 0;
      return ['p1','p2'].reduce((acc, pos) => {
        const pDid = getPred(pid, sess.key, pos);
        return (pDid && top2Set.has(pDid)) ? acc + top2Pts : acc;
      }, 0);
    };

    return secHdr(sess.icon, sess.label, maxPts, sess.key) +
      sess.positions.map(pos => {
        const rDid = getRes(sess.key, pos);
        const rDrv = rDid ? driverById(rDid) : null;
        const pts  = S.scoring[sess.key]?.[pos] || 0;
        const hidden = window._collSess?.[sess.key] ? 'display:none' : '';
        return `<tr data-sess="${sess.key}" style="${hidden}">
          <td class="pred-sticky">
            <strong style="color:var(--red)">${POS_LABEL[pos]}</strong>
            <span style="font-size:10px;color:var(--muted);margin-left:5px">(${pts}pts)</span>
          </td>
          <td class="pc pc-res">
            ${rDrv
              ? `<span style="display:inline-flex;align-items:center;gap:3px"><span class="dot" style="background:${tc(rDrv.team)}"></span>${rDrv.abbr}</span>`
              : `<span style="color:var(--muted)">—</span>`}
          </td>
          ${lb.map(p => cellHtml(p.id, sess.key, pos, topNSet)).join('')}
        </tr>`;
      }).join('') +
      (res?.[sess.key] ? `
        <tr data-sess="${sess.key}" style="${window._collSess?.[sess.key]?'display:none':''}background:rgba(255,255,255,.02)">
          <td class="pred-sticky" style="font-size:10px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;padding-left:16px">Position Pts</td>
          <td></td>
          ${lb.map(p => {
            const pts = exactPts(p.id);
            return `<td class="pc pc-pts" style="text-align:center;color:${pts > 0 ? 'var(--green)' : 'var(--muted)'}">${pts}</td>`;
          }).join('')}
        </tr>
        ${topNPts ? `
        <tr data-sess="${sess.key}" style="${window._collSess?.[sess.key]?'display:none':''}background:rgba(255,165,0,.04)">
          <td class="pred-sticky" style="font-size:10px;font-weight:700;color:#ffaa00;text-transform:uppercase;letter-spacing:.5px;padding-left:16px">Top-${sess.positions.length} ~ Bonus <span style="font-size:9px;color:var(--muted)">(${topNPts}pts each)</span></td>
          <td></td>
          ${lb.map(p => {
            const pts = topNBonus(p.id);
            return `<td class="pc pc-pts" style="text-align:center;color:${pts > 0 ? '#ffaa00' : 'var(--muted)'}">${pts}</td>`;
          }).join('')}
        </tr>
        ` : ''}
        ${top2Pts ? `
        <tr data-sess="${sess.key}" style="${window._collSess?.[sess.key]?'display:none':''}background:rgba(0,180,255,.04)">
          <td class="pred-sticky" style="font-size:10px;font-weight:700;color:#00aaff;text-transform:uppercase;letter-spacing:.5px;padding-left:16px">Top-2 ~ Bonus <span style="font-size:9px;color:var(--muted)">(${top2Pts}pts each)</span></td>
          <td></td>
          ${lb.map(p => {
            const pts = top2Bonus(p.id);
            return `<td class="pc pc-pts" style="text-align:center;color:${pts > 0 ? '#00aaff' : 'var(--muted)'}">${pts}</td>`;
          }).join('')}
        </tr>
        ` : ''}
      ` : '');
  }).join('');

  // Build bonus rows
  const bonusRows = secHdr('⭐', 'Bonus Predictions', bonusMaxPts, 'bonus') + `
    <tr data-sess="bonus" style="${window._collSess?.bonus?'display:none':''}">
      <td class="pred-sticky"><strong style="color:var(--red)">Fastest Lap</strong> <span style="font-size:10px;color:var(--muted);margin-left:5px">(${S.scoring.bonus?.fastestLap || 0}pts)</span></td>
      ${resDrvCell('fastestLap')}
      ${lb.map(p => bonusDriverCell(p.id, 'fastestLap')).join('')}
    </tr>
    <tr data-sess="bonus" style="${window._collSess?.bonus?'display:none':''}">
      <td class="pred-sticky">
        <strong style="color:var(--red)">${bonusDrv ? esc(bonusDrv.name) : 'Driver'} Finishes</strong>
        <span style="font-size:10px;color:var(--muted);margin-left:5px">(−1pt/pos off)</span>
      </td>
      <td class="pc pc-res">${res?.bonus?.driverPlace != null ? `P${res.bonus.driverPlace}` : '<span style="color:var(--muted)">—</span>'}</td>
      ${lb.map(p => {
        const pPos = S.predictions[raceId]?.[p.id]?.bonus?.driverPlace;
        const rPos = res?.bonus?.driverPlace;
        if (pPos == null || pPos === 0) return `<td class="pc pc-nil">—</td>`;
        if (rPos == null) return `<td class="pc">P${pPos}</td>`;
        const diff = Math.abs(pPos - rPos);
        const penalty = -diff * (S.scoring.bonus?.driverPlace || 1);
        const cls = diff === 0 ? 'pc pc-ok' : 'pc pc-no';
        const label = diff === 0 ? `P${pPos} ✓` : `P${pPos} (${penalty})`;
        return `<td class="${cls}">${label}</td>`;
      }).join('')}
    </tr>
    <tr data-sess="bonus" style="${window._collSess?.bonus?'display:none':''}">
      <td class="pred-sticky"><strong style="color:var(--red)">Driver of the Day</strong> <span style="font-size:10px;color:var(--muted);margin-left:5px">(${S.scoring.bonus?.dotd || 0}pts)</span></td>
      ${resDrvCell('dotd')}
      ${lb.map(p => bonusDriverCell(p.id, 'dotd')).join('')}
    </tr>
    ${res?.bonus ? `
      <tr data-sess="bonus" style="${window._collSess?.bonus?'display:none':''}">
        <td class="pred-sticky" style="font-size:10px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.5px">Points</td>
        <td></td>
        ${lb.map(p => {
          const pb = S.predictions[raceId]?.[p.id]?.bonus || {};
          const rb = res.bonus;
          let bpts = 0;
          if (pb.fastestLap  && rb.fastestLap  && pb.fastestLap  === rb.fastestLap)  bpts += S.scoring.bonus?.fastestLap  || 0;
          if (pb.driverPlace != null && rb.driverPlace != null) bpts += driverPlacePts(pb.driverPlace, rb.driverPlace);
          if (pb.dotd        && rb.dotd        && pb.dotd        === rb.dotd)        bpts += S.scoring.bonus?.dotd        || 0;
          return `<td class="pc pc-pts" style="text-align:center;color:${bpts>0?'var(--green)':bpts<0?'#ff7070':'var(--muted)'}">${bpts}</td>`;
        }).join('')}
      </tr>
    ` : ''}
  `;

  const totalRow = res ? `
    <tr style="background:rgba(225,6,0,.08);border-bottom:2px solid var(--border)">
      <td class="pred-sticky" style="font-size:10px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.5px">Total Points</td>
      <td></td>
      ${lb.map(p => {
        const pts = calcRacePts(p.id, raceId);
        return `<td class="pc pc-pts" style="text-align:center;font-size:15px;font-weight:800;color:${pts > 0 ? 'var(--green)' : pts < 0 ? '#ff7070' : 'var(--muted)'}">${pts}</td>`;
      }).join('')}
    </tr>
  ` : '';

  return `
    <div class="card" style="margin-bottom:14px">
      <div class="tw">
        <table>
          <thead><tr>
            <th class="pred-sticky">Prediction</th>
            <th style="text-align:center;min-width:90px;color:var(--gold)">★ Result</th>
            ${lb.map(p => `<th style="text-align:center;min-width:80px">${esc(p.name)}</th>`).join('')}
          </tr></thead>
          <tbody>
            ${totalRow}
            ${sessionRows}
            ${bonusRows}
          </tbody>
        </table>
      </div>
    </div>
  ` + (res && lb.length > 0 ? `
    <div class="card">
      <div class="card-title">Race Points Summary</div>
      <div class="tw">
        <table>
          <thead><tr>
            <th>Participant</th>
            <th style="text-align:center">Race Pos</th>
            <th style="text-align:center;color:#ffaa00">Race ~</th>
            <th style="text-align:center">Quali</th>
            ${race.sprint ? `
              <th style="text-align:center">Sp.Quali</th>
              <th style="text-align:center">Sprint Pos</th>
              <th style="text-align:center;color:#ffaa00">Sprint ~</th>
            ` : ''}
            <th style="text-align:center">Bonus</th>
            <th style="text-align:center">Correct</th>
            <th style="text-align:right">Total</th>
          </tr></thead>
          <tbody>
            ${lb.map(p => {
              const calcSession = key => {
                const positions = key === 'race' ? RACE_POS : PODIUM_POS;
                const exact = positions.reduce((s, pos) => {
                  const pDid = getPred(p.id, key, pos);
                  const rDid = getRes(key, pos);
                  return (pDid && rDid && pDid === rDid) ? s + (S.scoring[key]?.[pos] || 0) : s;
                }, 0);
                const topN = S.scoring[key]?.topN || 0;
                let bonus = 0;
                if (topN && res[key]) {
                  const rSet = new Set(positions.map(pos => res[key][pos]).filter(Boolean));
                  bonus = positions.reduce((s, pos) => {
                    const pDid = getPred(p.id, key, pos);
                    return (pDid && rSet.has(pDid)) ? s + topN : s;
                  }, 0);
                }
                return { exact, bonus };
              };
              const race_   = calcSession('race');
              const quali_  = (() => {
                const positions = PODIUM_POS;
                return positions.reduce((s, pos) => {
                  const pDid = getPred(p.id, 'quali', pos);
                  const rDid = getRes('quali', pos);
                  return (pDid && rDid && pDid === rDid) ? s + (S.scoring.quali?.[pos] || 0) : s;
                }, 0);
              })();
              const sprintquali_ = race.sprint ? (() => {
                const positions = PODIUM_POS;
                return positions.reduce((s, pos) => {
                  const pDid = getPred(p.id, 'sprintquali', pos);
                  const rDid = getRes('sprintquali', pos);
                  return (pDid && rDid && pDid === rDid) ? s + (S.scoring.sprintquali?.[pos] || 0) : s;
                }, 0);
              })() : null;
              const sprint_  = race.sprint ? calcSession('sprint') : null;
              const { correct } = predStats(p.id, raceId);
              const total = calcRacePts(p.id, raceId);
              const bpred = S.predictions[raceId]?.[p.id]?.bonus || {};
              const bres  = res?.bonus || {};
              let bpts = 0;
              if (bpred.fastestLap  && bres.fastestLap  && bpred.fastestLap  === bres.fastestLap)  bpts += S.scoring.bonus?.fastestLap  || 0;
              if (bpred.driverPlace != null && bres.driverPlace != null) bpts += driverPlacePts(bpred.driverPlace, bres.driverPlace);
              if (bpred.dotd        && bres.dotd        && bpred.dotd        === bres.dotd)        bpts += S.scoring.bonus?.dotd        || 0;
              const cell = (v, color) => `<td style="text-align:center;font-weight:700;color:${v>0?color:'var(--muted)'};">${v}</td>`;
              return `<tr>
                <td><strong>${esc(p.name)}</strong></td>
                ${cell(race_.exact, 'var(--green)')}
                ${cell(race_.bonus, '#ffaa00')}
                ${cell(quali_, 'var(--green)')}
                ${race.sprint ? `${cell(sprintquali_, 'var(--green)')}${cell(sprint_.exact, 'var(--green)')}${cell(sprint_.bonus, '#ffaa00')}` : ''}
                ${cell(bpts, 'var(--green)')}
                <td style="text-align:center;color:var(--muted2)">${correct}</td>
                <td style="text-align:right"><strong style="font-size:15px;color:var(--red)">${total}</strong></td>
              </tr>`;
            }).join('')}
          </tbody>
        </table>
      </div>
    </div>
  ` : '');
}

let _resRaceId = null;

function renderResults(raceId) {
  if (raceId != null) _resRaceId = raceId;
  if (!_resRaceId) { const nr = nextRace(); _resRaceId = nr ? nr.id : RACES[0].id; }

  const el   = document.getElementById('tab-results');
  const race = raceById(_resRaceId);
  const res  = S.results[_resRaceId];
  const done = RACES.filter(r => S.results[r.id] && !S.cancelled?.[r.id]);
  const isCancelled = !!S.cancelled?.[_resRaceId];
  const prid = prevRaceId(_resRaceId);
  const nrid = nextRaceId(_resRaceId);

  el.innerHTML = `
    <!-- Race title (sticky) -->
    <div class="pred-race-title">Race ${_resRaceId}: ${race.name}${isCancelled ? ' <span class="badge badge-cancelled" style="font-size:12px;vertical-align:middle">Cancelled</span>' : ''}</div>

    <div class="sec-hdr">
      <h2 class="sec-title">Race Results</h2>
      <div class="sec-actions">
        ${isCancelled
          ? `<span class="badge badge-cancelled">🚫 Cancelled</span>
             <button class="btn btn-ghost btn-sm" onclick="toggleCancelled(${_resRaceId})">↩ Reinstate</button>`
          : `<button class="btn btn-ghost btn-sm" onclick="toggleCancelled(${_resRaceId})">🚫 Cancel Race</button>
             <button class="btn btn-primary" onclick="openResultsModal(${_resRaceId})">${res ? '✏ Edit Results' : '+ Enter Results'}</button>`}
      </div>
    </div>

    <!-- Race selector -->
    <div class="card" style="margin-bottom:16px">
      <label class="fl">Select Race</label>
      <select class="fs" onchange="renderResults(+this.value)">
        ${RACES.map(r => `<option value="${r.id}" ${r.id===_resRaceId?'selected':''}>${S.cancelled?.[r.id]?'🚫 ':''}Round ${r.id}: ${r.name}${S.results[r.id]?' ✓':''}</option>`).join('')}
      </select>
    </div>

    ${isCancelled ? `
      <div class="empty">
        <span class="empty-icon">🚫</span>
        <div class="empty-title">${esc(race.name)} has been cancelled</div>
        <div class="empty-sub">This race does not count towards the standings. No points will be awarded.</div>
        <button class="btn btn-ghost btn-sm" onclick="toggleCancelled(${_resRaceId})">↩ Reinstate Race</button>
      </div>
    ` : res ? `
      <!-- Show entered results -->
      ${buildResultsDisplay(_resRaceId)}
    ` : `
      <div class="empty">
        <span class="empty-icon">🏁</span>
        <div class="empty-title">No results for ${esc(race.name)}</div>
        <div class="empty-sub">Enter the top finishing positions to calculate fantasy points</div>
        <button class="btn btn-primary" onclick="openResultsModal(${_resRaceId})">Enter Results</button>
      </div>
    `}

    ${done.length > 0 ? `
      <div class="card" style="margin-top:16px">
        <div class="card-title">All Completed Races</div>
        <div class="tw">
          <table>
            <thead><tr>
              <th>Round</th><th>Grand Prix</th><th>Date</th>
              <th>Race Winner</th><th>Pole</th><th>Sprint Pole</th><th>Sprint Winner</th><th></th>
            </tr></thead>
            <tbody>
              ${done.map(r => {
                const rr = S.results[r.id];
                const winner      = rr?.race?.p1        ? driverById(rr.race.p1)        : null;
                const pole        = rr?.quali?.p1       ? driverById(rr.quali.p1)       : null;
                const sprintPole  = rr?.sprintquali?.p1 ? driverById(rr.sprintquali.p1) : null;
                const sprint      = rr?.sprint?.p1      ? driverById(rr.sprint.p1)      : null;
                return `<tr>
                  <td style="color:var(--muted);font-weight:700">R${r.id}</td>
                  <td><strong>${esc(r.name)}</strong>${r.sprint?` <span style="font-size:10px;color:var(--red);font-weight:700">SPRINT</span>`:''}</td>
                  <td style="color:var(--muted)">${fmtDate(r.date)}</td>
                  <td>${winner     ? chipHtml(winner)     : '—'}</td>
                  <td>${pole       ? chipHtml(pole)       : '—'}</td>
                  <td>${sprintPole ? chipHtml(sprintPole) : '—'}</td>
                  <td>${sprint     ? chipHtml(sprint)     : '—'}</td>
                  <td>
                    <button class="btn btn-ghost btn-xs" onclick="renderResults(${r.id});switchTab('results')">View</button>
                  </td>
                </tr>`;
              }).join('')}
            </tbody>
          </table>
        </div>
      </div>
    ` : ''}

    <div class="pred-race-nav">
      <button class="btn btn-ghost" onclick="renderResults(${prid})"
        ${!prid ? 'disabled style="opacity:.3"' : ''}>◀ Prev Race</button>
      <button class="btn btn-ghost" onclick="renderResults(${nrid})"
        ${!nrid ? 'disabled style="opacity:.3"' : ''}>Next Race ▶</button>
    </div>
  `;
}

function buildResultsDisplay(raceId) {
  const race = raceById(raceId);
  const res  = S.results[raceId];

  const sessionsToShow = [
    { key: 'race',        label: 'Race Result',          positions: RACE_POS,   icon: '🏁' },
    { key: 'quali',       label: 'Qualifying Result',    positions: PODIUM_POS, icon: '🕐' },
    ...(race.sprint ? [
      { key: 'sprintquali', label: 'Sprint Quali Result', positions: PODIUM_POS, icon: '🕐' },
      { key: 'sprint',      label: 'Sprint Race Result',  positions: PODIUM_POS, icon: '🏁' },
    ] : []),
  ];

  return `<div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:14px">
    ${sessionsToShow.map(sess => `
      <div class="card">
        <div class="session-hdr" style="margin:-20px -20px 14px">
          <span style="font-size:16px">${sess.icon}</span>
          <span class="session-hdr-title">${sess.label}</span>
        </div>
        ${sess.positions.map((pos, i) => {
          const did = res[sess.key]?.[pos];
          const d   = did ? driverById(did) : null;
          const medals = ['🥇','🥈','🥉','4th','5th'];
          return `<div style="display:flex;align-items:center;gap:10px;padding:8px 0;border-bottom:${i<sess.positions.length-1?'1px solid var(--border)':'none'}">
            <span style="font-size:${i<3?'18px':'13px'};width:24px;text-align:center">${medals[i]}</span>
            ${d ? `
              <span class="dot" style="background:${tc(d.team)}"></span>
              <div>
                <div style="font-weight:700;font-size:13px">${esc(d.name)}</div>
                <div style="font-size:11px;color:var(--muted)">${esc(d.team)}</div>
              </div>
            ` : `<span style="color:var(--muted)">—</span>`}
          </div>`;
        }).join('')}
      </div>
    `).join('')}
    <!-- Bonus Results Card -->
    <div class="card">
      <div class="session-hdr" style="margin:-20px -20px 14px">
        <span style="font-size:16px">⭐</span>
        <span class="session-hdr-title">Bonus Results</span>
      </div>
      ${[
        { label: 'Fastest Lap',                                                    val: res.bonus?.fastestLap,  type: 'driver' },
        { label: `${esc(driverById(S.bonusDriverId)?.name||'Driver')} Finishes`,  val: res.bonus?.driverPlace, type: 'pos'    },
        { label: 'Driver of the Day',                                              val: res.bonus?.dotd,        type: 'driver' },
      ].map((row, i) => {
        const d = row.type === 'driver' && row.val ? driverById(row.val) : null;
        const display = row.type === 'driver'
          ? (d ? `<span style="display:flex;align-items:center;gap:6px"><span class="dot" style="background:${tc(d.team)}"></span><div><div style="font-weight:700;font-size:13px">${esc(d.name)}</div><div style="font-size:11px;color:var(--muted)">${esc(d.team)}</div></div></span>` : '<span style="color:var(--muted)">—</span>')
          : (row.val != null ? `<span style="font-weight:700;font-size:16px">P${row.val}</span>` : '<span style="color:var(--muted)">—</span>');
        return `<div style="display:flex;align-items:center;gap:10px;padding:8px 0;border-bottom:${i<2?'1px solid var(--border)':'none'}">
          <div style="font-size:11px;color:var(--muted);width:100px;flex-shrink:0">${row.label}</div>
          ${display}
        </div>`;
      }).join('')}
    </div>
  </div>`;
}

function chipHtml(d) {
  if (!d) return '—';
  return `<span style="display:inline-flex;align-items:center;gap:5px">
    <span class="dot" style="background:${tc(d.team)}"></span>${esc(d.name)}
  </span>`;
}
