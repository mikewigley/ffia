function renderTimingBoard(lb) {
  if (lb.length === 0) return '';
  const leader = lb[0];
  const maxPts = leader.total || 1;
  const rows = lb.map((p, i) => {
    const gap = i === 0
      ? '<span style="color:#e10600;font-weight:800">LEAD</span>'
      : `<span style="color:#aaa">+${leader.total - p.total}</span>`;
    const abbr = p.abbr || p.name.slice(0,4).toUpperCase();
    const barW = maxPts > 0 ? Math.round(p.total / maxPts * 100) : 0;
    const posIcon = i===0 ? '🥇' : i===1 ? '🥈' : i===2 ? '🥉' : '';
    return `
      <div class="timing-row">
        <div class="timing-pos">${posIcon || `<span style="color:#666">${i+1}</span>`}</div>
        <div class="timing-abbr" style="color:${pColor(p)}">
          ${esc(abbr)}
          <div class="timing-bar-bg" style="margin-top:3px">
            <div class="timing-bar-fill" style="width:${barW}%;background:${pColor(p)}"></div>
          </div>
        </div>
        <div class="timing-pts">${gap}</div>
      </div>`;
  }).join('');

  return `
    <div class="timing-board">
      <div class="timing-hdr">
        <div style="text-align:center">Pos</div>
        <div style="text-align:center">DRV</div>
        <div style="text-align:right">Gap</div>
      </div>
      ${rows}
    </div>`;
}

let _predRaceId = null;

function renderPredictions(raceId) {
  if (raceId != null) _predRaceId = raceId;
  if (!_predRaceId) {
    const incomplete = RACES.find(r => !S.cancelled?.[r.id] && !S.results[r.id]?.race?.p1);

  }

  const el   = document.getElementById('tab-predictions');
  const race = raceById(_predRaceId);
  const res  = S.results[_predRaceId];
  const locked = !!S.locked[_predRaceId];
  const isCancelled = !!S.cancelled?.[_predRaceId];
  const deadlinePassed = isPastDeadline(_predRaceId);
  const effectiveLocked = locked || deadlinePassed || isCancelled;
  const dl = deadlineLabel(_predRaceId);
  const hasParticipants = S.participants.length > 0;

  const countWithPreds = S.participants.filter(p => {
    const pred = S.predictions[_predRaceId]?.[p.id];
    return pred?.race?.p1;
  }).length;

  const prid = prevRaceId(_predRaceId);
  const nrid = nextRaceId(_predRaceId);

  el.innerHTML = `
    <!-- Race title (sticky) -->
    <div class="pred-race-title">Race ${_predRaceId}: ${race.name}${isCancelled ? ' <span class="badge badge-cancelled" style="font-size:12px;vertical-align:middle">Cancelled</span>' : ''}</div>

    <div class="sec-hdr">
      <h2 class="sec-title">Predictions</h2>
      <div class="sec-actions">
        ${isCancelled
          ? `<span class="badge badge-cancelled">🚫 Cancelled</span>`
          : effectiveLocked
          ? `${deadlinePassed && !locked ? '<span class="badge badge-locked">⏰ Deadline Passed</span>' : '<span class="badge badge-locked">🔒 Locked</span>'}
             <button class="btn btn-ghost btn-sm" onclick="toggleLock(${_predRaceId})">${locked ? '🔓 Unlock' : '🔒 Lock'}</button>`
          : `<button class="btn btn-ghost btn-sm" onclick="toggleLock(${_predRaceId})">🔒 Lock Predictions</button>`}
        ${!isCancelled && hasParticipants && effectiveLocked
          ? `<button class="btn btn-ghost btn-sm" onclick="openPredictionsModal(${_predRaceId})">👁 View Predictions</button>`
          : ''}
      </div>
    </div>

    <!-- Race selector -->
    <div class="card" style="margin-bottom:16px">
      <div style="display:flex;align-items:center;gap:16px;flex-wrap:wrap">
        <div style="flex:1;min-width:200px">
          <label class="fl">Select Race</label>
          <select class="fs" onchange="renderPredictions(+this.value)">
            ${RACES.map(r => `<option value="${r.id}" ${r.id===_predRaceId?'selected':''}>${S.cancelled?.[r.id]?'🚫 ':''}Round ${r.id}: ${r.name}</option>`).join('')}
          </select>
        </div>
        <div style="display:flex;gap:10px;flex-wrap:wrap;align-items:flex-end">
          <div style="text-align:center">
            <div class="stat-label">Date</div>
            <div style="font-size:14px;font-weight:600">${fmtDate(race.date)}</div>
          </div>
          <div style="text-align:center">
            <div class="stat-label">Sprint</div>
            <div style="font-size:14px;font-weight:600">${race.sprint ? '<span style="color:var(--red)">Yes</span>' : 'No'}</div>
          </div>
          <div style="text-align:center">
            <div class="stat-label">Predicted</div>
            <div style="font-size:14px;font-weight:600">${countWithPreds} / ${S.participants.length}</div>
          </div>
          <div style="text-align:center">
            <div class="stat-label">Results</div>
            <div style="font-size:14px;font-weight:600">${res ? '<span style="color:var(--green)">In</span>' : '<span style="color:var(--muted)">Pending</span>'}</div>
          </div>
          ${dl ? `
          <div style="text-align:center">
            <div class="stat-label">Deadline</div>
            <div style="font-size:14px;font-weight:600;color:${dl.passed ? '#ff7070' : 'var(--gold)'}">${dl.text}</div>
          </div>` : ''}
        </div>
      </div>
    </div>

    ${isCancelled ? `
      <div class="empty">
        <span class="empty-icon">🚫</span>
        <div class="empty-title">${esc(race.name)} has been cancelled</div>

      </div>
    ` : !hasParticipants ? `
      <div class="empty">
        <span class="empty-icon">🔮</span>
        <div class="empty-title">No participants yet</div>

        <button class="btn btn-primary" onclick="switchTab('participants')">Add Participants</button>
      </div>
    ` : `
      ${dl && !dl.passed && (raceDeadlineMs(_predRaceId) - Date.now()) < 7200000 ? `
        <div id="deadline-banner" style="background:linear-gradient(135deg,#b45309,#92400e);color:#fff;border-radius:8px;padding:10px 16px;margin-bottom:12px;display:flex;align-items:center;gap:10px;font-weight:700;font-size:14px">
          <span style="font-size:20px">⏰</span>
          <span>Predictions close in <span id="deadline-countdown" style="font-family:monospace;font-size:15px">${dl.text.replace(' until deadline','')}</span> — submit yours!</span>

function renderScoringReference(raceId) {
  const race = raceById(raceId);
  const sc = S.scoring;
  const bonusDrv = driverById(S.bonusDriverId);

  const sessionRows = (key, positions, labels) =>
    positions.map((pos, i) => {
      const pts = sc[key]?.[pos];
      return pts ? `<tr><td>${labels[i]}</td><td style="text-align:right;font-weight:700;color:var(--red)">${pts}</td></tr>` : '';
    }).join('');

  const raceLabels  = ['P1','P2','P3','P4','P5'];
  const podiumLabels = ['P1','P2','P3'];

  const sections = [];

  sections.push({ title: '🏁 Race', rows: [
    ...raceLabels.map((lbl, i) => { const pts = sc.race?.[RACE_POS[i]]; return pts ? `<tr><td>${lbl}</td><td style="text-align:right;font-weight:700;color:var(--red)">${pts}</td></tr>` : ''; }),
    sc.race?.topN  ? `<tr><td style="color:var(--muted)">Any top-5</td><td style="text-align:right;font-weight:600;color:var(--muted)">${sc.race.topN}</td></tr>` : '',
    sc.race?.top2  ? `<tr><td style="color:var(--muted)">P1/P2 each-way</td><td style="text-align:right;font-weight:600;color:var(--muted)">${sc.race.top2}</td></tr>` : '',
  ].filter(Boolean).join('') });

  sections.push({ title: '🕐 Qualifying', rows: [
    ...podiumLabels.map((lbl, i) => { const pts = sc.quali?.[PODIUM_POS[i]]; return pts ? `<tr><td>${lbl}</td><td style="text-align:right;font-weight:700;color:var(--red)">${pts}</td></tr>` : ''; }),
  ].filter(Boolean).join('') });

  if (race.sprint) {
    sections.push({ title: '🏎 Sprint Race', rows: [
      ...podiumLabels.map((lbl, i) => { const pts = sc.sprint?.[PODIUM_POS[i]]; return pts ? `<tr><td>${lbl}</td><td style="text-align:right;font-weight:700;color:var(--red)">${pts}</td></tr>` : ''; }),
      sc.sprint?.topN ? `<tr><td style="color:var(--muted)">Any top-3</td><td style="text-align:right;font-weight:600;color:var(--muted)">${sc.sprint.topN}</td></tr>` : '',
    ].filter(Boolean).join('') });

    sections.push({ title: '🕐 Sprint Quali', rows: [
      ...podiumLabels.map((lbl, i) => { const pts = sc.sprintquali?.[PODIUM_POS[i]]; return pts ? `<tr><td>${lbl}</td><td style="text-align:right;font-weight:700;color:var(--red)">${pts}</td></tr>` : ''; }),
    ].filter(Boolean).join('') });
  }

  const bonusRows = [
    sc.bonus?.fastestLap ? `<tr><td>Fastest Lap</td><td style="text-align:right;font-weight:700;color:var(--red)">${sc.bonus.fastestLap}</td></tr>` : '',
    sc.bonus?.dotd       ? `<tr><td>Driver of the Day</td><td style="text-align:right;font-weight:700;color:var(--red)">${sc.bonus.dotd}</td></tr>` : '',
    bonusDrv && sc.bonus?.driverPlace ? `<tr><td>${esc(bonusDrv.name)} position</td><td style="text-align:right;font-weight:600;color:var(--muted)">${sc.bonus.driverPlace} pt/pos off</td></tr>` : '',
  ].filter(Boolean).join('');
  if (bonusRows) sections.push({ title: '⭐ Bonus', rows: bonusRows });

  return `
    <div class="card" style="margin-top:12px">
      <div class="card-title" style="display:flex;align-items:center;gap:8px"><span>📊</span> Points Reference</div>
      <div style="display:flex;flex-wrap:wrap;gap:16px">
        ${sections.map(s => `
          <div style="flex:1;min-width:130px">
            <div style="font-size:11px;font-weight:800;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;margin-bottom:6px">${s.title}</div>
            <table style="width:100%;font-size:13px;border-collapse:collapse">
              <tbody>${s.rows}</tbody>
            </table>
          </div>
        `).join('')}
      </div>
    </div>
  `;
}

function renderParticipantCards(raceId) {
  const race   = raceById(raceId);
  const locked = !!S.locked[raceId];

  // Work out how many positions are preditable per participant
  const sessions = race.sprint ? [
    { key: 'sprintquali', positions: PODIUM_POS },
    { key: 'sprint',      positions: PODIUM_POS },
    { key: 'quali',       positions: PODIUM_POS },
    { key: 'race',        positions: RACE_POS   },
  ] : [
    { key: 'quali',       positions: PODIUM_POS },
    { key: 'race',        positions: RACE_POS   },
  ];
  const totalSlots = sessions.reduce((s, sess) => s + sess.positions.length, 0);

  const filledSlots = pid => sessions.reduce((s, sess) => {
    const pred = S.predictions[raceId]?.[pid] || {};
    return s + sess.positions.filter(pos => pred[sess.key]?.[pos]).length;
  }, 0);

  const cards = S.participants.map(p => {
    const filled  = filledSlots(p.id);
    const pct     = totalSlots ? Math.round(filled / totalSlots * 100) : 0;
    const isDone  = filled === totalSlots;
    const barClr  = isDone ? 'var(--green)' : pct > 0 ? 'var(--red)' : 'rgba(255,255,255,.2)';
    const pLocked = !!S.lockedP?.[raceId]?.[p.id];
    const anyLocked = locked || pLocked;

    // First-to-submit indicator — only shown if one person has a uniquely earliest timestamp
    const submitTimes = S.predSubmitTime?.[raceId] || {};
    const submitTs = submitTimes[p.id];
    const allTimes = Object.values(submitTimes).filter(Boolean);
    const firstTime = allTimes.length > 0 ? Math.min(...allTimes) : null;
    const isFirst = submitTs && firstTime !== null && submitTs === firstTime && allTimes.filter(t => t === firstTime).length === 1;
    const firstBadge = isFirst ? `<span title="First to submit!" style="font-size:11px;background:var(--gold);color:#000;border-radius:3px;padding:1px 5px;font-weight:800;margin-left:4px">⚡ 1st</span>` : '';

    return `
      <button class="pq-card${isDone ? ' pq-done' : ''}" onclick="openPredictionsModal(${raceId}, '${p.id}')">
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:4px">
          <div class="pq-name" style="margin:0">${esc(p.name)}${firstBadge}</div>
          <span style="font-size:13px">${isDone ? '✅' : filled > 0 ? '⚠️' : '○'}</span>
        </div>
        <div class="pq-count">${filled} / ${totalSlots} positions${anyLocked ? ' 🔒' : ' ✏'}</div>
        <div class="pq-bar-bg">
          <div class="pq-bar-fill" style="width:${pct}%;background:${barClr}"></div>
        </div>
      </button>`;
  }).join('');

  return `<div class="pq-grid">${cards}</div>`;
}

function renderPredTable(raceId) {
  const race = raceById(raceId);
  const res  = S.results[raceId];
  const lb   = leaderboard().sort((a, b) => a.name.localeCompare(b.name));

  const sessions = race.sprint ? [
    { key: 'sprintquali', label: 'Sprint Quali Predictions',  positions: PODIUM_POS, icon: '🕐' },
    { key: 'sprint',      label: 'Sprint Race Predictions',   positions: PODIUM_POS, icon: '🏁' },
    { key: 'quali',       label: 'Qualifying Predictions',    positions: PODIUM_POS, icon: '🕐' },
    { key: 'race',        label: 'Race Predictions',          positions: RACE_POS,   icon: '🏁' },
  ] : [
    { key: 'quali',       label: 'Qualifying Predictions',    positions: PODIUM_POS, icon: '🕐' },
    { key: 'race',        label: 'Race Predictions',          positions: RACE_POS,   icon: '🏁' },
  ];

  const getPred = (pid, session, pos) => S.predictions[raceId]?.[pid]?.[session]?.[pos] || null;
  const getRes  = (session, pos)      => res?.[session]?.[pos] || null;

  const cellHtml = (pid, session, pos, topNSet) => {
    const pDid = getPred(pid, session, pos);
    const rDid = getRes(session, pos);
    const d = pDid ? driverById(pDid) : null;

    if (!d) return `<td class="pc pc-nil">—</td>`;

    let cls = 'pc';
    let icon = '';
    if (rDid !== null) {
      if (pDid === rDid)                          { cls += ' pc-ok';      icon = ' ✓'; }
      else if (topNSet && topNSet.has(pDid))      { cls += ' pc-partial'; icon = ' ~'; }
      else                                        { cls += ' pc-no';      icon = ' ✗'; }
    }
    return `<td class="${cls}">
      <span style="display:inline-flex;align-items:center;gap:3px">
        <span class="dot" style="background:${tc(d.team)}"></span>${d.abbr}${icon}
      </span>
    </td>`;
  };

  // ── Bonus helpers ────────────────────────────────────────────────
  const bonusDrv    = driverById(S.bonusDriverId);
  const bonusMaxPts = (S.scoring.bonus?.fastestLap || 0) + (S.scoring.bonus?.dotd || 0);

  const bonusDriverCell = (pid, field) => {
    const pDid = S.predictions[raceId]?.[pid]?.bonus?.[field] || null;
    const rDid = res?.bonus?.[field] || null;
    const d = pDid ? driverById(pDid) : null;
    if (!d) return `<td class="pc pc-nil">—</td>`;
    let cls = 'pc', icon = '';
    if (rDid != null) { cls += pDid === rDid ? ' pc-ok' : ' pc-no'; icon = pDid === rDid ? ' ✓' : ' ✗'; }
    return `<td class="${cls}"><span style="display:inline-flex;align-items:center;gap:3px"><span class="dot" style="background:${tc(d.team)}"></span>${d.abbr}${icon}</span></td>`;
  };
  const resDrvCell = field => {
    const did = res?.bonus?.[field];
    const d = did ? driverById(did) : null;
    return `<td class="pc pc-res">${d ? `<span style="display:inline-flex;align-items:center;gap:3px"><span class="dot" style="background:${tc(d.team)}"></span>${d.abbr}</span>` : '<span style="color:var(--muted)">—</span>'}</td>`;
  };

  // Collapsible session state (global per page load)
  if (!window._collSess) window._collSess = {};
  window.toggleSess = function(key) {
    window._collSess[key] = !window._collSess[key];
    const collapsed = window._collSess[key];
    document.querySelectorAll(`[data-sess="${key}"]`).forEach(r => r.style.display = collapsed ? 'none' : '');
    const arrow = document.getElementById(`sarrow-${key}`);
    if (arrow) arrow.textContent = collapsed ? '▶' : '▼';
  };

  // Section-header row spanning all columns
  const secHdr = (icon, label, maxPts, sessKey) => {
    const cols = 2 + lb.length;
    const collapsed = sessKey && window._collSess[sessKey];
    const arrow = sessKey ? `<button class="sess-toggle" id="sarrow-${sessKey}" onclick="toggleSess('${sessKey}')">${collapsed ? '▶' : '▼'}</button>` : '';
    return `<tr style="background:rgba(225,6,0,.06)">
      <td colspan="${cols}" class="pred-sticky" style="padding:6px 10px;border-left:3px solid var(--red)">
        <span style="font-size:14px">${icon}</span>
        <strong style="color:var(--red);text-transform:uppercase;letter-spacing:.5px;font-size:11px;margin-left:6px">${label}</strong>
        <span style="font-size:10px;color:var(--muted);margin-left:8px">Max ${maxPts} pts</span>
        ${arrow}
      </td>
    </tr>`;
  };

  // Build session rows
  const sessionRows = sessions.map(sess => {
    const maxPts = sess.positions.reduce((s, pos) => s + (S.scoring[sess.key]?.[pos] || 0), 0);
    const topNPts = S.scoring[sess.key]?.topN || 0;
    const topNSet = res?.[sess.key]
      ? new Set(sess.positions.map(p => res[sess.key][p]).filter(Boolean))
      : null;

    const exactPts = pid => sess.positions.reduce((acc, pos) => {
      const pDid = getPred(pid, sess.key, pos);
      const rDid = getRes(sess.key, pos);
      return (pDid && rDid && pDid === rDid) ? acc + (S.scoring[sess.key]?.[pos] || 0) : acc;
    }, 0);

    const topNBonus = pid => {
      if (!topNPts || !topNSet) return 0;
      return sess.positions.reduce((acc, pos) => {
        const pDid = getPred(pid, sess.key, pos);
        return (pDid && topNSet.has(pDid)) ? acc + topNPts : acc;
      }, 0);
    };

    const top2Pts = sess.key === 'race' ? (S.scoring.race?.top2 || 0) : 0;
    const top2Set = top2Pts && res?.race
      ? new Set(['p1','p2'].map(p => res.race[p]).filter(Boolean))
      : null;
    const top2Bonus = pid => {
      if (!top2Pts || !top2Set) return 0;
      return ['p1','p2'].reduce((acc, pos) => {
        const pDid = getPred(pid, sess.key, pos);
        return (pDid && top2Set.has(pDid)) ? acc + top2Pts : acc;
      }, 0);
    };

    return secHdr(sess.icon, sess.label, maxPts, sess.key) +
      sess.positions.map(pos => {
        const rDid = getRes(sess.key, pos);
        const rDrv = rDid ? driverById(rDid) : null;
        const pts  = S.scoring[sess.key]?.[pos] || 0;
        const hidden = window._collSess?.[sess.key] ? 'display:none' : '';
        return `<tr data-sess="${sess.key}" style="${hidden}">
          <td class="pred-sticky">
            <strong style="color:var(--red)">${POS_LABEL[pos]}</strong>
            <span style="font-size:10px;color:var(--muted);margin-left:5px">(${pts}pts)</span>
          </td>
          <td class="pc pc-res">
            ${rDrv
              ? `<span style="display:inline-flex;align-items:center;gap:3px"><span class="dot" style="background:${tc(rDrv.team)}"></span>${rDrv.abbr}</span>`
              : `<span style="color:var(--muted)">—</span>`}
          </td>
          ${lb.map(p => cellHtml(p.id, sess.key, pos, topNSet)).join('')}
        </tr>`;
      }).join('') +
      (res?.[sess.key] ? `
        <tr data-sess="${sess.key}" style="${window._collSess?.[sess.key]?'display:none':''}background:rgba(255,255,255,.02)">
          <td class="pred-sticky" style="font-size:10px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;padding-left:16px">Position Pts</td>
          <td></td>
          ${lb.map(p => {
            const pts = exactPts(p.id);
            return `<td class="pc pc-pts" style="text-align:center;color:${pts > 0 ? 'var(--green)' : 'var(--muted)'}">${pts}</td>`;
          }).join('')}
        </tr>
        ${topNPts ? `
        <tr data-sess="${sess.key}" style="${window._collSess?.[sess.key]?'display:none':''}background:rgba(255,165,0,.04)">
          <td class="pred-sticky" style="font-size:10px;font-weight:700;color:#ffaa00;text-transform:uppercase;letter-spacing:.5px;padding-left:16px">Top-${sess.positions.length} ~ Bonus <span style="font-size:9px;color:var(--muted)">(${topNPts}pts each)</span></td>
          <td></td>
          ${lb.map(p => {
            const pts = topNBonus(p.id);
            return `<td class="pc pc-pts" style="text-align:center;color:${pts > 0 ? '#ffaa00' : 'var(--muted)'}">${pts}</td>`;
          }).join('')}
        </tr>
        ` : ''}
        ${top2Pts ? `
        <tr data-sess="${sess.key}" style="${window._collSess?.[sess.key]?'display:none':''}background:rgba(0,180,255,.04)">
          <td class="pred-sticky" style="font-size:10px;font-weight:700;color:#00aaff;text-transform:uppercase;letter-spacing:.5px;padding-left:16px">Top-2 ~ Bonus <span style="font-size:9px;color:var(--muted)">(${top2Pts}pts each)</span></td>
          <td></td>
          ${lb.map(p => {
            const pts = top2Bonus(p.id);
            return `<td class="pc pc-pts" style="text-align:center;color:${pts > 0 ? '#00aaff' : 'var(--muted)'}">${pts}</td>`;
          }).join('')}
        </tr>
        ` : ''}
      ` : '');
  }).join('');

  // Build bonus rows
  const bonusRows = secHdr('⭐', 'Bonus Predictions', bonusMaxPts, 'bonus') + `
    <tr data-sess="bonus" style="${window._collSess?.bonus?'display:none':''}">
      <td class="pred-sticky"><strong style="color:var(--red)">Fastest Lap</strong> <span style="font-size:10px;color:var(--muted);margin-left:5px">(${S.scoring.bonus?.fastestLap || 0}pts)</span></td>
      ${resDrvCell('fastestLap')}
      ${lb.map(p => bonusDriverCell(p.id, 'fastestLap')).join('')}
    </tr>
    <tr data-sess="bonus" style="${window._collSess?.bonus?'display:none':''}">
      <td class="pred-sticky">
        <strong style="color:var(--red)">${bonusDrv ? esc(bonusDrv.name) : 'Driver'} Finishes</strong>
        <span style="font-size:10px;color:var(--muted);margin-left:5px">(−1pt/pos off)</span>
      </td>
      <td class="pc pc-res">${res?.bonus?.driverPlace != null ? `P${res.bonus.driverPlace}` : '<span style="color:var(--muted)">—</span>'}</td>
      ${lb.map(p => {
        const pPos = S.predictions[raceId]?.[p.id]?.bonus?.driverPlace;
        const rPos = res?.bonus?.driverPlace;
        if (pPos == null || pPos === 0) return `<td class="pc pc-nil">—</td>`;
        if (rPos == null) return `<td class="pc">P${pPos}</td>`;
        const diff = Math.abs(pPos - rPos);
        const penalty = -diff * (S.scoring.bonus?.driverPlace || 1);
        const cls = diff === 0 ? 'pc pc-ok' : 'pc pc-no';
        const label = diff === 0 ? `P${pPos} ✓` : `P${pPos} (${penalty})`;
        return `<td class="${cls}">${label}</td>`;
      }).join('')}
    </tr>
    <tr data-sess="bonus" style="${window._collSess?.bonus?'display:none':''}">
      <td class="pred-sticky"><strong style="color:var(--red)">Driver of the Day</strong> <span style="font-size:10px;color:var(--muted);margin-left:5px">(${S.scoring.bonus?.dotd || 0}pts)</span></td>
      ${resDrvCell('dotd')}
      ${lb.map(p => bonusDriverCell(p.id, 'dotd')).join('')}
    </tr>
    ${res?.bonus ? `
      <tr data-sess="bonus" style="${window._collSess?.bonus?'display:none':''}">
        <td class="pred-sticky" style="font-size:10px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.5px">Points</td>
        <td></td>
        ${lb.map(p => {
          const pb = S.predictions[raceId]?.[p.id]?.bonus || {};
          const rb = res.bonus;
          let bpts = 0;
          if (pb.fastestLap  && rb.fastestLap  && pb.fastestLap  === rb.fastestLap)  bpts += S.scoring.bonus?.fastestLap  || 0;
          if (pb.driverPlace != null && rb.driverPlace != null) bpts += driverPlacePts(pb.driverPlace, rb.driverPlace);
          if (pb.dotd        && rb.dotd        && pb.dotd        === rb.dotd)        bpts += S.scoring.bonus?.dotd        || 0;
          return `<td class="pc pc-pts" style="text-align:center;color:${bpts>0?'var(--green)':bpts<0?'#ff7070':'var(--muted)'}">${bpts}</td>`;
        }).join('')}
      </tr>
    ` : ''}
  `;

  const totalRow = res ? `
    <tr style="background:rgba(225,6,0,.08);border-bottom:2px solid var(--border)">
      <td class="pred-sticky" style="font-size:10px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.5px">Total Points</td>
      <td></td>
      ${lb.map(p => {
        const pts = calcRacePts(p.id, raceId);
        return `<td class="pc pc-pts" style="text-align:center;font-size:15px;font-weight:800;color:${pts > 0 ? 'var(--green)' : pts < 0 ? '#ff7070' : 'var(--muted)'}">${pts}</td>`;
      }).join('')}
    </tr>
  ` : '';

  return `
    <div class="card" style="margin-bottom:14px">
      <div class="tw">
        <table>
          <thead><tr>
            <th class="pred-sticky">Prediction</th>
            <th style="text-align:center;min-width:90px;color:var(--gold)">★ Result</th>
            ${lb.map(p => `<th style="text-align:center;min-width:80px">${esc(p.name)}</th>`).join('')}
          </tr></thead>
          <tbody>
            ${totalRow}
            ${sessionRows}
            ${bonusRows}
          </tbody>
        </table>
      </div>
    </div>
  ` + (res && lb.length > 0 ? `
    <div class="card">
      <div class="card-title">Race Points Summary</div>
      <div class="tw">
        <table>
          <thead><tr>
            <th>Participant</th>
            <th style="text-align:center">Race Pos</th>
            <th style="text-align:center;color:#ffaa00">Race ~</th>
            <th style="text-align:center">Quali</th>
            ${race.sprint ? `
              <th style="text-align:center">Sp.Quali</th>
              <th style="text-align:center">Sprint Pos</th>
              <th style="text-align:center;color:#ffaa00">Sprint ~</th>
            ` : ''}
            <th style="text-align:center">Bonus</th>
            <th style="text-align:center">Correct</th>
            <th style="text-align:right">Total</th>
          </tr></thead>
          <tbody>
            ${lb.map(p => {
              const calcSession = key => {
                const positions = key === 'race' ? RACE_POS : PODIUM_POS;
                const exact = positions.reduce((s, pos) => {
                  const pDid = getPred(p.id, key, pos);
                  const rDid = getRes(key, pos);
                  return (pDid && rDid && pDid === rDid) ? s + (S.scoring[key]?.[pos] || 0) : s;
                }, 0);
                const topN = S.scoring[key]?.topN || 0;
                let bonus = 0;
                if (topN && res[key]) {
                  const rSet = new Set(positions.map(pos => res[key][pos]).filter(Boolean));
                  bonus = positions.reduce((s, pos) => {
                    const pDid = getPred(p.id, key, pos);
                    return (pDid && rSet.has(pDid)) ? s + topN : s;
                  }, 0);
                }
                return { exact, bonus };
              };
              const race_   = calcSession('race');
              const quali_  = (() => {
                const positions = PODIUM_POS;
                return positions.reduce((s, pos) => {
                  const pDid = getPred(p.id, 'quali', pos);
                  const rDid = getRes('quali', pos);
                  return (pDid && rDid && pDid === rDid) ? s + (S.scoring.quali?.[pos] || 0) : s;
                }, 0);
              })();
              const sprintquali_ = race.sprint ? (() => {
                const positions = PODIUM_POS;
                return positions.reduce((s, pos) => {
                  const pDid = getPred(p.id, 'sprintquali', pos);
                  const rDid = getRes('sprintquali', pos);
                  return (pDid && rDid && pDid === rDid) ? s + (S.scoring.sprintquali?.[pos] || 0) : s;
                }, 0);
              })() : null;
              const sprint_  = race.sprint ? calcSession('sprint') : null;
              const { correct } = predStats(p.id, raceId);
              const total = calcRacePts(p.id, raceId);
              const bpred = S.predictions[raceId]?.[p.id]?.bonus || {};
              const bres  = res?.bonus || {};
              let bpts = 0;
              if (bpred.fastestLap  && bres.fastestLap  && bpred.fastestLap  === bres.fastestLap)  bpts += S.scoring.bonus?.fastestLap  || 0;
              if (bpred.driverPlace != null && bres.driverPlace != null) bpts += driverPlacePts(bpred.driverPlace, bres.driverPlace);
              if (bpred.dotd        && bres.dotd        && bpred.dotd        === bres.dotd)        bpts += S.scoring.bonus?.dotd        || 0;
              const cell = (v, color) => `<td style="text-align:center;font-weight:700;color:${v>0?color:'var(--muted)'};">${v}</td>`;
              return `<tr>
                <td><strong>${esc(p.name)}</strong></td>
                ${cell(race_.exact, 'var(--green)')}
                ${cell(race_.bonus, '#ffaa00')}
                ${cell(quali_, 'var(--green)')}
                ${race.sprint ? `${cell(sprintquali_, 'var(--green)')}${cell(sprint_.exact, 'var(--green)')}${cell(sprint_.bonus, '#ffaa00')}` : ''}
                ${cell(bpts, 'var(--green)')}
                <td style="text-align:center;color:var(--muted2)">${correct}</td>
                <td style="text-align:right"><strong style="font-size:15px;color:var(--red)">${total}</strong></td>
              </tr>`;
            }).join('')}
          </tbody>
        </table>
      </div>
    </div>
  ` : '');
}

let _resRaceId = null;

function renderResults(raceId) {
  if (raceId != null) _resRaceId = raceId;
  if (!_resRaceId) {
    // Default to the first race without a complete race result (race P1 filled)
    // Partial results (e.g. quali only) don't count as complete
    const incomplete = RACES.find(r => !S.cancelled?.[r.id] && !S.results[r.id]?.race?.p1);
    _resRaceId = incomplete ? incomplete.id : RACES[RACES.length - 1].id;
  }

  const el   = document.getElementById('tab-results');
  const race = raceById(_resRaceId);
  const res  = S.results[_resRaceId];
  const done = RACES.filter(r => S.results[r.id] && !S.cancelled?.[r.id]);
  const isCancelled = !!S.cancelled?.[_resRaceId];
  const prid = prevRaceId(_resRaceId);
  const nrid = nextRaceId(_resRaceId);

  el.innerHTML = `
    <!-- Race title (sticky) -->
    <div class="pred-race-title">Race ${_resRaceId}: ${race.name}${isCancelled ? ' <span class="badge badge-cancelled" style="font-size:12px;vertical-align:middle">Cancelled</span>' : ''}</div>

    <div class="sec-hdr">
      <h2 class="sec-title">Race Results</h2>
      <div class="sec-actions">
        ${isCancelled
          ? `<span class="badge badge-cancelled">🚫 Cancelled</span>`
          : `<button class="btn btn-primary" onclick="openResultsModal(${_resRaceId})">${res ? '✏ Edit Results' : '+ Enter Results'}</button>`}
      </div>
    </div>

    <!-- Race selector -->
    <div class="card" style="margin-bottom:16px">
      <label class="fl">Select Race</label>
      <select class="fs" onchange="renderResults(+this.value)">
        ${RACES.map(r => `<option value="${r.id}" ${r.id===_resRaceId?'selected':''}>${S.cancelled?.[r.id]?'🚫 ':''}Round ${r.id}: ${r.name}${S.results[r.id]?.race?.p1?' ✓':S.results[r.id]?' ~':''}</option>`).join('')}
      </select>
    </div>

    ${isCancelled ? `
      <div class="empty">
        <span class="empty-icon">🚫</span>
        <div class="empty-title">${esc(race.name)} has been cancelled</div>
        <div class="empty-sub">This race does not count towards the standings. No points will be awarded.</div>
      </div>
    ` : res ? `
      <!-- Show entered results -->
      ${buildResultsDisplay(_resRaceId)}
    ` : `
      <div class="empty">
        <span class="empty-icon">🏁</span>
        <div class="empty-title">No results for ${esc(race.name)}</div>
        <div class="empty-sub">Enter the top finishing positions to calculate fantasy points</div>
        <button class="btn btn-primary" onclick="openResultsModal(${_resRaceId})">Enter Results</button>
      </div>
    `}

    ${done.length > 0 ? `
      <div class="card" style="margin-top:16px">
        <div class="card-title">All Completed Races</div>
        <div class="tw">
          <table>
            <thead><tr>
              <th>Round</th><th>Grand Prix</th><th>Date</th>
              <th>Race Winner</th><th>Pole</th><th>Sprint Pole</th><th>Sprint Winner</th><th></th>
            </tr></thead>
            <tbody>
              ${done.map(r => {
                const rr = S.results[r.id];
                const winner      = rr?.race?.p1        ? driverById(rr.race.p1)        : null;
                const pole        = rr?.quali?.p1       ? driverById(rr.quali.p1)       : null;
                const sprintPole  = rr?.sprintquali?.p1 ? driverById(rr.sprintquali.p1) : null;
                const sprint      = rr?.sprint?.p1      ? driverById(rr.sprint.p1)      : null;
                return `<tr>
                  <td style="color:var(--muted);font-weight:700">R${r.id}</td>
                  <td><strong>${esc(r.name)}</strong>${r.sprint?` <span style="font-size:10px;color:var(--red);font-weight:700">SPRINT</span>`:''}</td>
                  <td style="color:var(--muted)">${fmtDate(r.date)}</td>
                  <td>${winner     ? chipHtml(winner)     : '—'}</td>
                  <td>${pole       ? chipHtml(pole)       : '—'}</td>
                  <td>${sprintPole ? chipHtml(sprintPole) : '—'}</td>
                  <td>${sprint     ? chipHtml(sprint)     : '—'}</td>
                  <td>
                    <button class="btn btn-ghost btn-xs" onclick="renderResults(${r.id});switchTab('results')">View</button>
                  </td>
                </tr>`;
              }).join('')}
            </tbody>
          </table>
        </div>
      </div>
    ` : ''}

    <div class="pred-race-nav">
      <button class="btn btn-ghost" onclick="renderResults(${prid})"
        ${!prid ? 'disabled style="opacity:.3"' : ''}>◀ Prev Race</button>
      <button class="btn btn-ghost" onclick="renderResults(${nrid})"
        ${!nrid ? 'disabled style="opacity:.3"' : ''}>Next Race ▶</button>
    </div>
  `;
}

function buildResultsDisplay(raceId) {
  const race = raceById(raceId);
  const res  = S.results[raceId];

  const sessionsToShow = [
    { key: 'race',        label: 'Race Result',          positions: RACE_POS,   icon: '🏁' },
    { key: 'quali',       label: 'Qualifying Result',    positions: PODIUM_POS, icon: '🕐' },
    ...(race.sprint ? [
      { key: 'sprintquali', label: 'Sprint Quali Result', positions: PODIUM_POS, icon: '🕐' },
      { key: 'sprint',      label: 'Sprint Race Result',  positions: PODIUM_POS, icon: '🏁' },
    ] : []),
  ];

  return `<div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:14px">
    ${sessionsToShow.map(sess => `
      <div class="card">
        <div class="session-hdr" style="margin:-20px -20px 14px">
          <span style="font-size:16px">${sess.icon}</span>
          <span class="session-hdr-title">${sess.label}</span>
        </div>
        ${sess.positions.map((pos, i) => {
          const did = res[sess.key]?.[pos];
          const d   = did ? driverById(did) : null;
          const medals = ['🥇','🥈','🥉','4th','5th'];
          return `<div style="display:flex;align-items:center;gap:10px;padding:8px 0;border-bottom:${i<sess.positions.length-1?'1px solid var(--border)':'none'}">
            <span style="font-size:${i<3?'18px':'13px'};width:24px;text-align:center">${medals[i]}</span>
            ${d ? `
              <span class="dot" style="background:${tc(d.team)}"></span>
              <div>
                <div style="font-weight:700;font-size:13px">${esc(d.name)}</div>
                <div style="font-size:11px;color:var(--muted)">${esc(d.team)}</div>
              </div>
            ` : `<span style="color:var(--muted)">—</span>`}
          </div>`;
        }).join('')}
      </div>
    `).join('')}
    <!-- Bonus Results Card -->
    <div class="card">
      <div class="session-hdr" style="margin:-20px -20px 14px">
        <span style="font-size:16px">⭐</span>
        <span class="session-hdr-title">Bonus Results</span>
      </div>
      ${[
        { label: 'Fastest Lap',                                                    val: res.bonus?.fastestLap,  type: 'driver' },
        { label: `${esc(driverById(S.bonusDriverId)?.name||'Driver')} Finishes`,  val: res.bonus?.driverPlace, type: 'pos'    },
        { label: 'Driver of the Day',                                              val: res.bonus?.dotd,        type: 'driver' },
      ].map((row, i) => {
        const d = row.type === 'driver' && row.val ? driverById(row.val) : null;
        const display = row.type === 'driver'
          ? (d ? `<span style="display:flex;align-items:center;gap:6px"><span class="dot" style="background:${tc(d.team)}"></span><div><div style="font-weight:700;font-size:13px">${esc(d.name)}</div><div style="font-size:11px;color:var(--muted)">${esc(d.team)}</div></div></span>` : '<span style="color:var(--muted)">—</span>')
          : (row.val != null ? `<span style="font-weight:700;font-size:16px">P${row.val}</span>` : '<span style="color:var(--muted)">—</span>');
        return `<div style="display:flex;align-items:center;gap:10px;padding:8px 0;border-bottom:${i<2?'1px solid var(--border)':'none'}">
          <div style="font-size:11px;color:var(--muted);width:100px;flex-shrink:0">${row.label}</div>
          ${display}
        </div>`;
      }).join('')}
    </div>
  </div>`;
}

function chipHtml(d) {
  if (!d) return '—';
  return `<span style="display:inline-flex;align-items:center;gap:5px">
    <span class="dot" style="background:${tc(d.team)}"></span>${esc(d.name)}
  </span>`;
}

// ═══════════════════════════════════════════════════════════════════
// CALENDAR SYNC — OpenF1
// ═══════════════════════════════════════════════════════════════════

async function syncCalendarFromOpenF1() {
  const btn = document.getElementById('sync-calendar-btn');
  if (btn) { btn.disabled = true; btn.textContent = '⟳ Syncing…'; }

  let sessions;
  try {
    const res = await fetch('https://api.openf1.org/v1/sessions?year=' + (S.seasonYear ?? SEASON_YEAR));
    sessions = await res.json();
  } catch {
    toast('Could not reach OpenF1 API', 'err');
    if (btn) { btn.disabled = false; btn.textContent = '🔄 Sync Times'; }
    return;
  }

  if (!Array.isArray(sessions) || sessions.length === 0) {
    toast('No session data available yet for ' + (S.seasonYear ?? SEASON_YEAR), 'err');
    if (btn) { btn.disabled = false; btn.textContent = '🔄 Sync Times'; }
    return;
  }

  // Group sessions by meeting_key
  const byMeeting = {};
  sessions.forEach(s => {
    if (!byMeeting[s.meeting_key]) byMeeting[s.meeting_key] = [];
    byMeeting[s.meeting_key].push(s);
  });

  if (!S.raceTimes) S.raceTimes = {};
  let updated = 0;

  Object.values(byMeeting).forEach(mtg => {
    const raceSession = mtg.find(s => s.session_name === 'Race');
    if (!raceSession?.date_start) return;

    // Match to our RACES by race date (try UTC date, then ±1 day for edge cases)
    const utcDate = raceSession.date_start.slice(0, 10);
    let race = RACES.find(r => r.date === utcDate);
    if (!race) {
      // Try next/prev day (e.g. Las Vegas race starts after midnight UTC)
      const d = new Date(utcDate);
      const prev = new Date(d - 86400000).toISOString().slice(0, 10);
      const next = new Date(d.getTime() + 86400000).toISOString().slice(0, 10);
      race = RACES.find(r => r.date === prev || r.date === next);
    }
    if (!race) return;

    if (!S.raceTimes[race.id]) S.raceTimes[race.id] = {};

    // Store as local YYYY-MM-DDTHH:MM (converted from UTC)
    const toLocal = iso => {
      const d = new Date(iso);
      const pad = n => String(n).padStart(2, '0');
      return `${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}T${pad(d.getHours())}:${pad(d.getMinutes())}`;
    };

    const sessionMap = {
      'Practice 1':        'p1',
      'Practice 2':        'p2',
      'Practice 3':        'p3',
      'Sprint Qualifying': race.sprint ? 'q' : null,
      'Sprint Shootout':   race.sprint ? 'q' : null,  // OpenF1 legacy name
      'Sprint':            's',
      'Qualifying':        race.sprint ? 'ql' : 'q',
      'Race':              'r',
    };

    let raceUpdated = false;
    mtg.forEach(s => {
      const key = sessionMap[s.session_name];
      if (!key || !s.date_start) return;
      S.raceTimes[race.id][key] = toLocal(s.date_start);
      if (key === 'q') raceUpdated = true;
    });
    if (raceUpdated) updated++;
  });

  save();
  renderCalendar();
  if (btn) { btn.disabled = false; btn.textContent = '🔄 Sync Times'; }
  toast(updated > 0 ? `Synced ${updated} race weekends from OpenF1` : 'No new data — check back closer to race weekend');
}

function toggleCalendarLock() {
  S.calendarLocked = !S.calendarLocked;
  save();
  renderCalendar();
}

function saveRaceTime(raceId, field, value) {
  if (!S.raceTimes) S.raceTimes = {};
  if (!S.raceTimes[raceId]) S.raceTimes[raceId] = {};
  if (value) {
    // If existing stored value has a full datetime, preserve the date portion
    const existing = S.raceTimes[raceId][field];
    if (existing && existing.length > 5 && value.length <= 5) {
      S.raceTimes[raceId][field] = existing.slice(0, 11) + value;
    } else {
      S.raceTimes[raceId][field] = value;
    }
  } else {
    delete S.raceTimes[raceId][field];
  }
  if (!Object.keys(S.raceTimes[raceId]).length) delete S.raceTimes[raceId];
  save();
  renderCalendar();
}

function buildCalendarSessionRows(race) {
  const times = S.raceTimes?.[race.id] || {};
  const toHHMM = v => v ? (v.length > 5 ? v.slice(11, 16) : v) : '';
  const toDayLabel = v => {
    if (!v || v.length <= 5) return '';
    const d = new Date(v.length === 16 ? v + ':00' : v);
    return d.toLocaleDateString('en-GB', { weekday:'short' }) + ' ' + d.toLocaleTimeString('en-GB', { hour:'2-digit', minute:'2-digit' });
  };
  const synced = Object.values(times).some(v => v?.length > 5);
  const lockMs = raceDeadlineMs(race.id);
  const lockStr = lockMs ? (function() { const d = new Date(lockMs); return (d.getHours()<10?'0':'')+d.getHours()+':'+(d.getMinutes()<10?'0':'')+d.getMinutes(); })() : null;

  const sessionRows = race.sprint ? [
    { key:'p1', label:'Practice 1'              },
    { key:'q',  label:'Sprint Quali', isLock:true },
    { key:'s',  label:'Sprint Race'              },
    { key:'ql', label:'Qualifying'               },
    { key:'r',  label:'Race'                     },
  ] : [
    { key:'p1', label:'Practice 1' },
    { key:'p2', label:'Practice 2' },
    { key:'p3', label:'Practice 3' },
    { key:'q',  label:'Qualifying', isLock:true },
    { key:'r',  label:'Race'       },
  ];

  let html = synced ? '<div style="font-size:10px;color:var(--green);margin-bottom:4px">⚡ Synced from OpenF1</div>' : '';

  for (const row of sessionRows) {
    const val = times[row.key];
    const dayLabel = toDayLabel(val);
    const timeStr = toHHMM(val);

    html += '<div style="display:flex;flex-direction:column;gap:1px;margin-bottom:2px">';

    if (S.calendarLocked) {
      // Read-only display: label + day + time clearly formatted
      html += '<div style="display:flex;align-items:baseline;gap:8px">';
      html += '<span style="font-size:11px;color:var(--muted);min-width:82px;flex-shrink:0">' + row.label + '</span>';
      if (dayLabel) {
        html += '<span style="font-size:12px;color:var(--text);font-weight:600">' + dayLabel + '</span>';
      } else if (timeStr) {
        html += '<span style="font-size:12px;color:var(--text);font-weight:600">' + timeStr + '</span>';
      } else {
        html += '<span style="font-size:12px;color:var(--muted2)">—</span>';
      }
      if (row.isLock && lockStr) {
        html += '<span style="font-size:10px;color:var(--red);margin-left:4px">🔒 locks ' + lockStr + '</span>';
      }
      html += '</div>';
    } else {
      // Edit mode: time input row
      html += '<div style="display:flex;align-items:center;gap:6px;min-height:22px">';
      html += '<span style="font-size:11px;color:var(--muted);min-width:82px">' + row.label + '</span>';
      html += '<input type="time" value="' + timeStr + '"'
            + ' style="flex:1;background:var(--surface2);border:1px solid var(--border2);border-radius:6px;padding:3px 6px;color:var(--text);font-size:12px;font-family:inherit"'
            + ' onchange="saveRaceTime(' + race.id + ',\'' + row.key + '\',this.value)">';
      if (!row.isLock && dayLabel) {
        html += '<span style="font-size:10px;color:var(--muted);white-space:nowrap">' + dayLabel + '</span>';
      }
      html += '</div>';
      if (row.isLock && (dayLabel || lockStr)) {
        html += '<div style="display:flex;align-items:center;gap:8px;padding-left:88px">';
        if (dayLabel) html += '<span style="font-size:10px;color:var(--muted)">' + dayLabel + '</span>';
        if (lockStr)  html += '<span style="font-size:10px;color:var(--red)">🔒 locks ' + lockStr + '</span>';
        html += '</div>';
      }
    }

    html += '</div>';
  }

  return html;
}

function renderCalendar() {
  const el = document.getElementById('tab-calendar');
  const nr = nextRace();
  const done = Object.keys(S.results).length;

  el.innerHTML = `
    <div class="sec-hdr">
      <h2 class="sec-title">2025 Season Calendar</h2>
      <div style="display:flex;align-items:center;gap:8px">
        <span style="color:var(--muted);font-size:13px">${done} of 24 complete</span>
        <button id="sync-calendar-btn" class="btn btn-ghost btn-sm" onclick="syncCalendarFromOpenF1()" ${S.calendarLocked ? 'disabled title="Unlock calendar to sync"' : ''}>🔄 Sync Times</button>
        <button class="btn btn-sm ${S.calendarLocked ? 'btn-primary' : 'btn-ghost'}" onclick="toggleCalendarLock()" title="${S.calendarLocked ? 'Unlock calendar times' : 'Lock calendar times'}">${S.calendarLocked ? '🔒 Locked' : '🔓 Lock'}</button>
      </div>
    </div>
    <div class="cal-grid">
      ${RACES.map(race => {
        const isDone = !!S.results[race.id] && !S.cancelled?.[race.id];
        const isCancelled = !!S.cancelled?.[race.id];
        const isNext = nr && nr.id === race.id;
        const winner = S.results[race.id]?.race?.p1 ? driverById(S.results[race.id].race.p1) : null;
        return `
          <div class="race-card ${isDone?'done':''} ${isNext?'nxt':''} ${isCancelled?'cancelled':''}"
               onclick="switchTab('predictions');renderPredictions(${race.id})">
            <div class="race-rnd">Round ${race.id}${race.sprint?' · <span style="color:var(--red)">Sprint</span>':''}</div>
            <div class="race-nm">${esc(race.name)}</div>
            <div style="font-size:11px;color:var(--muted);margin-bottom:8px">${race.circuit}</div>
            <div style="display:flex;justify-content:space-between;align-items:center">
              <span style="font-size:11px;color:var(--muted)">${fmtDate(race.date)}</span>
              <span class="badge ${isCancelled?'badge-cancelled':isDone?'badge-done':isNext?'badge-next':'badge-upcoming'}">
                ${isCancelled?'🚫 Cancelled':isDone?'✓ Done':isNext?'Next':'Upcoming'}
              </span>
            </div>
            <div style="margin-top:8px;padding-top:8px;border-top:1px solid var(--border);display:flex;flex-direction:column;gap:5px" onclick="event.stopPropagation()">
              ${buildCalendarSessionRows(race)}
            </div>
            ${!isCancelled && isDone && winner ? `
              <div style="margin-top:7px;padding-top:7px;border-top:1px solid var(--border);font-size:11px;color:var(--muted2)">
                🏆 ${esc(winner.name)}
              </div>
            ` : ''}
            <div style="margin-top:6px;padding-top:6px;border-top:1px solid var(--border)" onclick="event.stopPropagation()">
              <button class="btn btn-ghost btn-sm" style="font-size:11px;width:100%"
                      onclick="toggleCancelled(${race.id})">
                ${isCancelled ? '↩ Reinstate Race' : '🚫 Cancel Race'}
              </button>
            </div>
          </div>
        `;
      }).join('')}
    </div>
  `;
}

function openParticipantModal(pid) {
  const p = pid ? S.participants.find(p => p.id === pid) : null;
  const PALETTE = ['#e10600','#00aaff','#ffd700','#00d856','#ff6b35','#b44fd9','#ff4d9e','#00ffcc','#88c0d0','#ebcb8b'];
  const defaultColor = p?.color || PALETTE[S.participants.length % PALETTE.length];
  openModal(`
    <div class="modal-hdr">
      <div class="modal-title">${p ? 'Edit Participant' : 'Add Participant'}</div>
      <button class="modal-close" onclick="closeModal()">✕</button>
    </div>
    <div class="modal-body">
      <div class="fg">
        <label class="fl">Name</label>
        <input class="fi" id="p-name" type="text" placeholder="Enter participant name…"
               value="${p ? esc(p.name) : ''}" maxlength="30"
               onkeydown="if(event.key==='Enter')saveParticipant('${pid||''}')">
      </div>
      <div class="fg" style="margin-top:12px">
        <label class="fl">Nickname <span style="color:var(--muted);font-weight:400">(up to 4 characters, e.g. WIGm)</span></label>
        <input class="fi" id="p-abbr" type="text" placeholder="ABCD" maxlength="4"
               value="${p ? esc(p.abbr || '') : ''}"
               style="max-width:100px"
               onkeydown="if(event.key==='Enter')saveParticipant('${pid||''}')">
      </div>
      <div class="fg" style="margin-top:12px">
        <label class="fl">Car Colour</label>
        <div style="display:flex;align-items:center;gap:10px">
          <input type="color" id="p-color" value="${defaultColor}"
                 style="width:44px;height:36px;border:none;background:none;cursor:pointer;border-radius:6px;padding:2px">
          <div style="display:flex;gap:6px;flex-wrap:wrap">
            ${PALETTE.map(c => `<button onclick="document.getElementById('p-color').value='${c}'"
              style="width:22px;height:22px;border-radius:50%;background:${c};border:2px solid rgba(255,255,255,.15);cursor:pointer;padding:0"
              title="${c}"></button>`).join('')}
          </div>
        </div>
      </div>
    </div>
    <div class="modal-foot">
      <div>${p ? `<button class="btn btn-danger" onclick="deleteParticipant('${p.id}')">Delete</button>` : ''}</div>
      <div class="modal-foot-right">
        <button class="btn btn-ghost" onclick="closeModal()">Cancel</button>
        <button class="btn btn-primary" onclick="saveParticipant('${pid||''}')">
          ${p ? 'Save' : 'Add Participant'}
        </button>
      </div>
    </div>
  `);
}

function saveParticipant(pid) {
  const name  = document.getElementById('p-name').value.trim();
  const color = document.getElementById('p-color')?.value || '#e10600';
  const abbr  = (document.getElementById('p-abbr')?.value || '').trim().slice(0, 4);
  if (!name) { toast('Please enter a name', 'err'); return; }

  if (pid) {
    const idx = S.participants.findIndex(p => p.id === pid);
    if (idx >= 0) { S.participants[idx].name = name; S.participants[idx].color = color; S.participants[idx].abbr = abbr || undefined; }
    toast('Participant updated');
  } else {
    S.participants.push({ id: uid(), name, color, abbr: abbr || undefined });
    toast('Participant added!');
  }
  save(); closeModal(); renderParticipants(); updateIdentityUI();
}

function deleteParticipant(pid) {
  if (!confirm('Delete this participant and all their predictions?')) return;
  S.participants = S.participants.filter(p => p.id !== pid);
  // Clean up their predictions
  Object.keys(S.predictions).forEach(rid => {
    if (S.predictions[rid][pid]) delete S.predictions[rid][pid];
  });
  save(); closeModal(); renderParticipants();
  toast('Participant removed');
}

let _pred = { raceId: null, idx: 0, buf: {} };

function openPredictionsModal(raceId, startPid) {
  if (S.participants.length === 0) { toast('Add participants first', 'err'); return; }
  _pred.raceId = raceId;
  _pred.idx    = startPid != null
    ? Math.max(0, S.participants.findIndex(p => p.id === startPid))
    : (() => {
        const identity = getIdentity();
        const idx = identity ? S.participants.findIndex(p => p.id === identity.id) : -1;
        return idx >= 0 ? idx : 0;
      })();
  // Deep-copy existing predictions into buffer
  _pred.buf = {};
  S.participants.forEach(p => {
    const existing = S.predictions[raceId]?.[p.id] || {};
    _pred.buf[p.id] = {
      race:        Object.assign({}, existing.race        || {}),
      quali:       Object.assign({}, existing.quali       || {}),
      sprintquali: Object.assign({}, existing.sprintquali || {}),
      sprint:      Object.assign({}, existing.sprint      || {}),
      bonus:       Object.assign({}, existing.bonus       || {}),
    };
  });
  renderPredModal();
}

function renderPredModal() {
  const race = raceById(_pred.raceId);
  const p    = S.participants[_pred.idx];
  const buf  = _pred.buf[p.id];
  const raceLocked = !!S.locked[_pred.raceId] || isPastDeadline(_pred.raceId);
  const identityLocked = !isOwnPrediction(p.id);
  const locked = raceLocked || identityLocked || !!S.lockedP?.[_pred.raceId]?.[p.id];

  const sessions = race.sprint ? [
    { key: 'sprintquali', label: 'Sprint Quali', positions: PODIUM_POS, icon: '🕐', pts: S.scoring.sprintquali },
    { key: 'sprint',      label: 'Sprint Race',  positions: PODIUM_POS, icon: '🏁', pts: S.scoring.sprint      },
    { key: 'quali',       label: 'Qualifying',   positions: PODIUM_POS, icon: '🕐', pts: S.scoring.quali       },
    { key: 'race',        label: 'Race',         positions: RACE_POS,   icon: '🏁', pts: S.scoring.race        },
  ] : [
    { key: 'quali',       label: 'Qualifying',   positions: PODIUM_POS, icon: '🕐', pts: S.scoring.quali       },
    { key: 'race',        label: 'Race',         positions: RACE_POS,   icon: '🏁', pts: S.scoring.race        },
  ];

  const totalMaxPts = sessions.reduce((s, sess) =>
    s + sess.positions.reduce((s2, pos) => s2 + (sess.pts[pos] || 0), 0), 0)
    + (S.scoring.bonus?.fastestLap || 0) + (S.scoring.bonus?.dotd || 0);

  openModal(`
    <div class="modal-hdr">
      <div>
        <div class="modal-title">Predictions — ${esc(race.name)}</div>
        <div class="modal-title-sub">Round ${race.id} · ${fmtDate(race.date)} · Max ${totalMaxPts} pts${locked?' · 🔒 Locked':''}</div>
      </div>
      <div style="display:flex;align-items:center;gap:8px">
        ${!raceLocked && !identityLocked ? `
          <button class="btn btn-ghost btn-sm" onclick="toggleParticipantLock(${_pred.raceId},'${p.id}');renderPredModal()">
            ${locked ? '🔓 Unlock' : '🔒 Lock'}
          </button>
        ` : ''}
        <button class="modal-close" onclick="closeModal()">✕</button>
      </div>
    </div>
    <div class="pred-nav">
      <button class="btn btn-ghost btn-sm" onclick="predNav(-1)" ${_pred.idx === 0 ? 'disabled style="opacity:.4"' : ''}>← Prev</button>
      <div>
        <div class="pred-nav-name">${esc(p.name)}</div>
        <div class="pred-nav-count">${_pred.idx + 1} of ${S.participants.length} participants</div>
      </div>
      <button class="btn btn-ghost btn-sm" onclick="predNav(1)" ${_pred.idx === S.participants.length - 1 ? 'disabled style="opacity:.4"' : ''}>Next →</button>
    </div>
    <div class="modal-body">
      ${sessions.map(sess => `
        <div class="pred-form-section">
          <div class="pred-form-section-title">${sess.icon} ${sess.label}</div>
          ${sess.positions.map(pos => {
            const selDid = buf[sess.key]?.[pos] || null;
            return `
              <div class="pred-row">
                <span class="pred-pos-label">${POS_LABEL[pos]}</span>
                <span class="pred-pts-label" style="color:var(--muted)">${sess.pts[pos] || 0}pts</span>
                <select class="fs" id="pred-${sess.key}-${pos}" style="flex:1"
                        onchange="updatePredBuf('${sess.key}','${pos}',this.value)"
                        ${locked ? 'disabled' : ''}>
                  ${driverOptions(selDid)}
                </select>
              </div>
            `;
          }).join('')}
        </div>
      `).join('')}
      <!-- Bonus Predictions -->
      <div class="pred-form-section">
        <div class="pred-form-section-title">⭐ Bonus Predictions</div>
        <div class="pred-row">
          <span class="pred-pos-label" style="width:auto;font-size:11px;color:var(--muted2);min-width:110px">Fastest Lap</span>
          <span class="pred-pts-label" style="color:var(--muted)">${S.scoring.bonus?.fastestLap || 0}pts</span>
          <select class="fs" id="pred-bonus-fastestLap" style="flex:1"
                  onchange="updatePredBuf('bonus','fastestLap',this.value)"
                  ${locked ? 'disabled' : ''}>
            ${driverOptions(buf.bonus?.fastestLap || null)}
          </select>
        </div>
        <div class="pred-row">
          <span class="pred-pos-label" style="width:auto;font-size:11px;color:var(--muted2);min-width:110px">${esc(driverById(S.bonusDriverId)?.name || 'Driver')} Pos</span>
          <span class="pred-pts-label" style="color:var(--muted)">−1pt/pos</span>
          <input type="number" class="fi" id="pred-bonus-driverPlace" min="1" max="22"
                 placeholder="1–22" style="flex:1"
                 value="${buf.bonus?.driverPlace != null ? buf.bonus.driverPlace : ''}"
                 onchange="updatePredBuf('bonus','driverPlace',this.value)"
                 ${locked ? 'disabled' : ''}>
        </div>
        <div class="pred-row">
          <span class="pred-pos-label" style="width:auto;font-size:11px;color:var(--muted2);min-width:110px">Driver of Day</span>
          <span class="pred-pts-label" style="color:var(--muted)">${S.scoring.bonus?.dotd || 0}pts</span>
          <select class="fs" id="pred-bonus-dotd" style="flex:1"
                  onchange="updatePredBuf('bonus','dotd',this.value)"
                  ${locked ? 'disabled' : ''}>
            ${driverOptions(buf.bonus?.dotd || null)}
          </select>
        </div>
      </div>
    </div>
    <div class="modal-foot">
      <div style="font-size:12px;color:var(--muted)">
        ${identityLocked ? `🔒 View only — not your predictions` : locked ? '🔒 Predictions locked — view only' : '✓ Changes saved automatically'}
      </div>
      <div class="modal-foot-right">
        <button class="btn btn-ghost" onclick="closeModal();reRenderActive()">Cancel</button>
        ${!locked ? `
          <button class="btn btn-ghost btn-sm" onclick="copyFromPrevRace()" title="Copy predictions from the previous race">📋 Copy Previous</button>
          <button class="btn btn-danger btn-sm" onclick="clearCurrentPreds()" title="Clear all predictions for this participant">🗑 Clear</button>
          <button class="btn btn-primary" onclick="saveAllPreds()">✓ Done</button>
        ` : ''}
      </div>
    </div>
  `);
}

function updatePredBuf(session, pos, val) {
  const p = S.participants[_pred.idx];
  if (!_pred.buf[p.id]) _pred.buf[p.id] = { race:{}, quali:{}, sprintquali:{}, sprint:{}, bonus:{} };
  _pred.buf[p.id][session][pos] = val ? +val : null;
  checkPredDuplicates();
  // Auto-save immediately
  if (!S.predictions[_pred.raceId]) S.predictions[_pred.raceId] = {};
  S.predictions[_pred.raceId][p.id] = JSON.parse(JSON.stringify(_pred.buf[p.id]));
  save();
}

function collectCurrentForm() {
  const race = raceById(_pred.raceId);
  const p    = S.participants[_pred.idx];
  if (!p) return;

  const sessions = race.sprint ? [
    { key: 'sprintquali', positions: PODIUM_POS },
    { key: 'sprint',      positions: PODIUM_POS },
    { key: 'quali',       positions: PODIUM_POS },
    { key: 'race',        positions: RACE_POS   },
  ] : [
    { key: 'quali',       positions: PODIUM_POS },
    { key: 'race',        positions: RACE_POS   },
  ];

  const buf = { race:{}, quali:{}, sprintquali:{}, sprint:{}, bonus:{} };
  for (const { key, positions } of sessions) {
    for (const pos of positions) {
      const el = document.getElementById(`pred-${key}-${pos}`);
      buf[key][pos] = el?.value ? +el.value : null;
    }
  }
  // Bonus
  const flEl  = document.getElementById('pred-bonus-fastestLap');
  const dpEl  = document.getElementById('pred-bonus-driverPlace');
  const dotdEl= document.getElementById('pred-bonus-dotd');
  buf.bonus = {
    fastestLap:  flEl?.value   ? +flEl.value   : null,
    driverPlace: dpEl?.value   ? +dpEl.value   : null,
    dotd:        dotdEl?.value ? +dotdEl.value : null,
  };
  _pred.buf[p.id] = buf;
}

function clearCurrentPreds() {
  const p = S.participants[_pred.idx];
  const empty = { race:{}, quali:{}, sprintquali:{}, sprint:{}, bonus:{} };
  _pred.buf[p.id] = JSON.parse(JSON.stringify(empty));
  if (!S.predictions[_pred.raceId]) S.predictions[_pred.raceId] = {};
  S.predictions[_pred.raceId][p.id] = JSON.parse(JSON.stringify(empty));
  save();
  renderPredModal();
  toast(`Cleared predictions for ${p.name}`);
}

function copyFromPrevRace() {
  const p = S.participants[_pred.idx];
  collectCurrentForm();
  const prevRace = RACES.slice().reverse().find(r =>
    r.id < _pred.raceId && S.predictions[r.id]?.[p.id]?.race?.p1
  );
  if (!prevRace) { toast('No previous predictions found to copy', 'err'); return; }
  const prev = S.predictions[prevRace.id][p.id];
  _pred.buf[p.id] = {
    race:        Object.assign({}, prev.race        || {}),
    quali:       Object.assign({}, prev.quali       || {}),
    sprintquali: Object.assign({}, prev.sprintquali || {}),
    sprint:      Object.assign({}, prev.sprint      || {}),
    bonus:       Object.assign({}, prev.bonus       || {}),
  };
  renderPredModal();
  toast(`Copied from Rd ${prevRace.id}: ${prevRace.name}`);
}

function predNav(dir) {
  collectCurrentForm();
  // Save the current participant's state before navigating
  const p = S.participants[_pred.idx];
  if (p) {
    if (!S.predictions[_pred.raceId]) S.predictions[_pred.raceId] = {};
    S.predictions[_pred.raceId][p.id] = JSON.parse(JSON.stringify(_pred.buf[p.id]));
    save();
  }
  const newIdx = _pred.idx + dir;
  if (newIdx < 0 || newIdx >= S.participants.length) return;
  _pred.idx = newIdx;
  renderPredModal();
}

function saveAllPreds() {
  collectCurrentForm();

  // Validate: no duplicate drivers within same session for same participant
  for (const p of S.participants) {
    const buf = _pred.buf[p.id];
    if (!buf) continue;
    const race = raceById(_pred.raceId);
    const sessionsToCheck = [
      { key:'race',        positions:RACE_POS   },
      { key:'quali',       positions:PODIUM_POS },
      ...(race.sprint ? [
        { key:'sprintquali', positions:PODIUM_POS },
        { key:'sprint',      positions:PODIUM_POS },
      ] : []),
    ];
    for (const { key, positions } of sessionsToCheck) {
      const vals = positions.map(pos => buf[key]?.[pos]).filter(Boolean);
      if (new Set(vals).size !== vals.length) {
        toast(`${p.name}: duplicate driver in ${key} predictions`, 'err'); return;
      }
    }
  }

  // Final commit of all buffered participants
  if (!S.predictions[_pred.raceId]) S.predictions[_pred.raceId] = {};
  if (!S.predSubmitTime) S.predSubmitTime = {};
  if (!S.predSubmitTime[_pred.raceId]) S.predSubmitTime[_pred.raceId] = {};
  const nowTs = Date.now();
  // Only stamp first-submit time for the identity's own participant (who pressed Done)
  const identity = getIdentity();
  S.participants.forEach(p => {
    S.predictions[_pred.raceId][p.id] = _pred.buf[p.id] || { race:{}, quali:{}, sprintquali:{}, sprint:{}, bonus:{} };
    if (identity && identity.id === p.id && !S.predSubmitTime[_pred.raceId][p.id]) {
      S.predSubmitTime[_pred.raceId][p.id] = nowTs;
    }
  });

  save(); closeModal();
  checkAllPredsSubmitted(_pred.raceId);
  reRenderActive();
}

function saveResults(raceId) {
  const race = raceById(raceId);
  const sessions = race.sprint ? [
    { key: 'sprintquali', positions: PODIUM_POS },
    { key: 'sprint',      positions: PODIUM_POS },
    { key: 'quali',       positions: PODIUM_POS },
    { key: 'race',        positions: RACE_POS   },
  ] : [
    { key: 'quali',       positions: PODIUM_POS },
    { key: 'race',        positions: RACE_POS   },
  ];

  const results = {};
  let hasAny = false;
  let dupErr = null;

  for (const { key, positions } of sessions) {
    results[key] = {};
    const seen = {};
    for (const pos of positions) {
      const el  = document.getElementById(`res-${key}-${pos}`);
      const val = el?.value ? +el.value : null;
      if (val) {
        hasAny = true;
        if (seen[val] && !dupErr) {
          dupErr = `Duplicate driver in ${key.toUpperCase()}: ${driverById(val).abbr} appears twice`;
        }
        seen[val] = pos;
      }
      results[key][pos] = val;
    }
  }

  if (dupErr)   { toast(dupErr, 'err'); return; }
  if (!hasAny)  { toast('Enter at least one result', 'err'); return; }

  // Bonus results
  const flEl   = document.getElementById('res-bonus-fastestLap');
  const dpEl   = document.getElementById('res-bonus-driverPlace');
  const dotdEl = document.getElementById('res-bonus-dotd');
  results.bonus = {
    fastestLap:  flEl?.value   ? +flEl.value   : null,
    driverPlace: dpEl?.value   ? +dpEl.value   : null,
    dotd:        dotdEl?.value ? +dotdEl.value : null,
  };

  const undoSnapshot = S.results[raceId] ? JSON.parse(JSON.stringify(S.results[raceId])) : null;
  _lastResultUndo = { raceId, data: undoSnapshot };
  S.results[raceId] = results;
  save(); closeModal();
  showUndoSnackbar('Results saved — undo?', undoResultSave);
  reRenderActive();
}

function deleteResults(raceId) {
  if (!confirm('Clear all results for this race?')) return;
  delete S.results[raceId];
  save(); closeModal();
  toast('Results cleared');
  reRenderActive();
}

async function fetchAndPopulateResults(raceId) {
  const race = raceById(raceId);
  const BASE = `https://api.jolpi.ca/ergast/f1/${S.seasonYear ?? SEASON_YEAR}/${raceId}`;
  const btn = document.getElementById('fetch-results-btn');
  if (btn) { btn.disabled = true; btn.textContent = '⟳ Fetching…'; }

  const fetches = [
    fetch(`${BASE}/results.json`).then(r => r.json()),
    fetch(`${BASE}/qualifying.json`).then(r => r.json()),
  ];
  if (race.sprint) fetches.push(fetch(`${BASE}/sprint.json`).then(r => r.json()));

  let raceData, qualiData, sprintData;
  try {
    const res = await Promise.all(fetches);
    [raceData, qualiData, sprintData] = res;
  } catch {
    toast('Network error — could not fetch results', 'err');
    if (btn) { btn.disabled = false; btn.textContent = '🔄 Fetch Results'; }
    return;
  }

  const raceResults   = raceData?.MRData?.RaceTable?.Races?.[0]?.Results              || [];
  const qualiResults  = qualiData?.MRData?.RaceTable?.Races?.[0]?.QualifyingResults    || [];
  const sprintResults = sprintData?.MRData?.RaceTable?.Races?.[0]?.SprintResults       || [];

  if (raceResults.length === 0 && qualiResults.length === 0) {
    toast('No results available yet for this race', 'err');
    if (btn) { btn.disabled = false; btn.textContent = '🔄 Fetch Results'; }
    return;
  }

  const unknownCodes = [];
  function setSelect(id, code) {
    if (!code) return;
    const d = driverByCode(code);
    if (!d) { unknownCodes.push(code); return; }
    const el = document.getElementById(id);
    if (el) el.value = String(d.id);
  }

  // Qualifying P1–P3
  qualiResults.slice(0, 3).forEach((e, i) => setSelect(`res-quali-p${i+1}`, e.Driver?.code));

  // Race P1–P5
  raceResults.slice(0, 5).forEach((e, i) => setSelect(`res-race-p${i+1}`, e.Driver?.code));

  // Fastest Lap
  const fl = raceResults.find(r => r.FastestLap?.rank === '1');
  if (fl) setSelect('res-bonus-fastestLap', fl.Driver?.code);

  // Bonus driver finishing position
  const bonusDriver = driverById(S.bonusDriverId);
  if (bonusDriver) {
    const bonusEntry = raceResults.find(r => r.Driver?.code === bonusDriver.abbr);
    if (bonusEntry) {
      const el = document.getElementById('res-bonus-driverPlace');
      if (el) el.value = bonusEntry.position;
    }
  }

  // Sprint Race P1–P3
  if (race.sprint && sprintResults.length > 0)
    sprintResults.slice(0, 3).forEach((e, i) => setSelect(`res-sprint-p${i+1}`, e.Driver?.code));

  if (btn) { btn.disabled = false; btn.textContent = '🔄 Fetch Results'; }

  if (unknownCodes.length > 0)
    toast(`Pre-filled — unknown driver codes: ${[...new Set(unknownCodes)].join(', ')}`, 'err');
  else
    toast('Results pre-filled — review then save ✓');
}

// Auto-fetch: _autoFetchDone = permanently complete, _autoFetchRetryAfter = timestamp to retry
const _autoFetchDone       = new Set();
const _autoFetchRetryAfter = new Map();
const _autoFetchInFlight   = new Set();
const RETRY_MS = 30 * 60 * 1000; // 30 minutes

async function autoFetchAndSave(raceId, trigger) {
  const key = `${raceId}-${trigger}`;
  if (_autoFetchDone.has(key)) return;
  if (_autoFetchInFlight.has(key)) return;
  const retryAt = _autoFetchRetryAfter.get(key);
  if (retryAt && Date.now() < retryAt) return;

  _autoFetchInFlight.add(key);

  const race = raceById(raceId);
  const BASE = `https://api.jolpi.ca/ergast/f1/${S.seasonYear ?? SEASON_YEAR}/${raceId}`;

  let raceData, qualiData, sprintData;
  try {
    const fetches = [
      fetch(`${BASE}/results.json`).then(r => r.json()),
      fetch(`${BASE}/qualifying.json`).then(r => r.json()),
    ];
    if (race.sprint) fetches.push(fetch(`${BASE}/sprint.json`).then(r => r.json()));
    const res = await Promise.all(fetches);
    [raceData, qualiData, sprintData] = res;
  } catch {
    // Network error — retry in 30 min
    _autoFetchRetryAfter.set(key, Date.now() + RETRY_MS);
    _autoFetchInFlight.delete(key);
    return;
  }

  const raceResults   = raceData?.MRData?.RaceTable?.Races?.[0]?.Results           || [];
  const qualiResults  = qualiData?.MRData?.RaceTable?.Races?.[0]?.QualifyingResults || [];
  const sprintResults = sprintData?.MRData?.RaceTable?.Races?.[0]?.SprintResults    || [];

  // Nothing published yet — retry in 30 min
  if (raceResults.length === 0 && qualiResults.length === 0) {
    _autoFetchRetryAfter.set(key, Date.now() + RETRY_MS);
    _autoFetchInFlight.delete(key);
    return;
  }

  const existing = S.results[raceId] || {};
  const merged = {
    race:        { ...existing.race        },
    quali:       { ...existing.quali       },
    sprintquali: { ...existing.sprintquali },
    sprint:      { ...existing.sprint      },
    bonus:       { ...existing.bonus       },
  };

  const set = (obj, pos, code) => {
    if (obj[pos]) return; // don't overwrite manually entered data
    const d = driverByCode(code);
    if (d) obj[pos] = d.id;
  };

  qualiResults.slice(0, 3).forEach((e, i) => set(merged.quali, `p${i+1}`, e.Driver?.code));
  raceResults.slice(0, 5).forEach((e, i)  => set(merged.race,  `p${i+1}`, e.Driver?.code));

  const fl = raceResults.find(r => r.FastestLap?.rank === '1');
  if (fl && !merged.bonus.fastestLap) merged.bonus.fastestLap = driverByCode(fl.Driver?.code)?.id || null;

  const bonusDriver = driverById(S.bonusDriverId);
  if (bonusDriver && !merged.bonus.driverPlace) {
    const be = raceResults.find(r => r.Driver?.code === bonusDriver.abbr);
    if (be) merged.bonus.driverPlace = +be.position;
  }

  // Sprint results — if expected but missing, retry in 30 min
  if (race.sprint) {
    if (sprintResults.length > 0) {
      sprintResults.slice(0, 3).forEach((e, i) => set(merged.sprint, `p${i+1}`, e.Driver?.code));
    } else if (trigger === 'r') {
      // Sprint data not yet published — schedule retry but still save what we have
      _autoFetchRetryAfter.set(`${raceId}-sprint`, Date.now() + RETRY_MS);
    }
  }

  // Only save if something actually changed
  const before = JSON.stringify(S.results[raceId] || {});
  if (JSON.stringify(merged) !== before) {
    S.results[raceId] = merged;
    save();
    reRenderActive();
    toast(`🔄 Auto-fetched results for ${race.name}`);
  }

  // Mark done only when all expected data is present
  const sprintDone = !race.sprint || sprintResults.length > 0;
  if (sprintDone) {
    _autoFetchDone.add(key);
    _autoFetchRetryAfter.delete(key);
  } else {
    _autoFetchRetryAfter.set(key, Date.now() + RETRY_MS);
  }

  _autoFetchInFlight.delete(key);
}

  const entered = document.getElementById('pin-entry')?.value || '';

    window._pinCallback = null;
  } else {
    document.getElementById('pin-err').textContent = 'Incorrect PIN. Try again.';
    document.getElementById('pin-entry').value = '';
    document.getElementById('pin-entry').focus();
  }
}

function toggleParticipantLock(raceId, pid) {
  if (!S.lockedP) S.lockedP = {};

  if (!S.lockedP[raceId][pid]) delete S.lockedP[raceId][pid];
  const p = S.participants.find(p => p.id === pid);
  save();
  toast(S.lockedP[raceId]?.[pid] ? `🔒 ${p?.name || 'Participant'} locked` : `🔓 ${p?.name || 'Participant'} unlocked`);
  renderPredictions(_predRaceId);
}

  };
  if (S.adminPin) {
    requirePin(doLock);
  } else {

}

            <div class="scoring-row">
              <label>${POS_LABEL[pos]}</label>
              <input type="number" class="scoring-input" id="sc-sprintquali-${pos}"
                     value="${S.scoring.sprintquali[pos]}" min="0" max="999">

          `).join('')}

    <div class="card" style="margin-bottom:16px">
      <div class="card-title">Bonus Predictions</div>
      <div class="fg">
        <label class="fl">Specific Driver (for "Where will X finish?")</label>

        </div>
        <div class="scoring-section">
          <div class="scoring-section-title">⭐ Driver of Day</div>
          <div class="scoring-row"><label>Correct</label>
