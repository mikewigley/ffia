function saveSettings() {
  const name = document.getElementById('s-name').value.trim();
  if (!name) { toast('League name cannot be empty', 'err'); return; }

  S.leagueName = name;

  const yearEl = document.getElementById('s-season-year');
  if (yearEl && !S.seasonYearLocked) S.seasonYear = Math.max(2020, Math.min(2099, +yearEl.value || SEASON_YEAR));

  const readScore = (session, positions) => {
    positions.forEach(pos => {
      const el = document.getElementById(`sc-${session}-${pos}`);
      if (el) S.scoring[session][pos] = Math.max(0, +el.value || 0);
    });
  };
  readScore('race',        RACE_POS);
  readScore('quali',       PODIUM_POS);
  readScore('sprint',      PODIUM_POS);
  readScore('sprintquali', PODIUM_POS);

  // Top-N bonus inputs
  ['race', 'sprint'].forEach(key => {
    const el = document.getElementById(`sc-${key}-topN`);
    if (el) S.scoring[key].topN = Math.max(0, +el.value || 0);
  });
  const top2El = document.getElementById('sc-race-top2');
  if (top2El) S.scoring.race.top2 = Math.max(0, +top2El.value || 0);

  // Bonus driver + scoring
  const bd = document.getElementById('s-bonus-driver');
  if (bd?.value) S.bonusDriverId = +bd.value;
  if (!S.scoring.bonus) S.scoring.bonus = {};
  ['fastestLap','driverPlace','dotd'].forEach(k => {
    const el = document.getElementById(`sc-bonus-${k}`);
    if (el) S.scoring.bonus[k] = Math.max(0, +el.value || 0);
  });

  // Clippy
  const clippyWasOff = !S.clippyEnabled;
  S.clippyEnabled = document.getElementById('s-clippy-enabled')?.checked ?? true;
  S.clippyPhrase  = document.getElementById('s-clippy-phrase')?.value.trim() ?? '';
  if (S.clippyEnabled && clippyWasOff) _clippyDismissed = false;

  // Admin PIN
  const pinEl = document.getElementById('s-admin-pin');
  if (pinEl) S.adminPin = pinEl.value.trim();

  // Lock mins before quali
  const lmEl = document.getElementById('s-lock-mins');
  if (lmEl && !S.lockMinsLocked) S.lockMinsBefore = Math.max(0, +lmEl.value || 0);

  // Auto-fetch
  const afEl = document.getElementById('s-auto-fetch');
  if (afEl) S.autoFetchResults = afEl.checked;

  save();
  { const _hn = document.getElementById('hdr-name'); if (_hn) _hn.textContent = S.leagueName; }
  document.title = 'FFIA Fantasy League ' + (S.seasonYear ?? SEASON_YEAR);
  toast('Settings saved');
}

function exportData() {
  const blob = new Blob([JSON.stringify(S, null, 2)], { type: 'application/json' });
  const url  = URL.createObjectURL(blob);
  const a    = document.createElement('a');
  a.href = url; a.download = 'f1-fantasy-2025.json'; a.click();
  URL.revokeObjectURL(url);
  toast('Data exported');
}

function importData(input) {
  const file = input.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = e => {
    try {
      const data = JSON.parse(e.target.result);
      Object.assign(S, data);
      save();
      { const _hn = document.getElementById('hdr-name'); if (_hn) _hn.textContent = S.leagueName; }
      renderTab('dashboard');
      toast('Data imported successfully');
    } catch(_) { toast('Invalid JSON file', 'err'); }
  };
  reader.readAsText(file);
}

function resetAll() {
  if (!confirm('Reset ALL data? Participants, predictions, and results will be permanently deleted.')) return;
  S = Object.assign({}, DEFAULTS, { participants:[], predictions:{}, results:{}, locked:{}, lockedP:{} });
  save();
  { const _hn = document.getElementById('hdr-name'); if (_hn) _hn.textContent = S.leagueName; }
  switchTab('dashboard');
  toast('All data reset');
}

// ═══════════════════════════════════════════════════════════════════
// IDENTITY
// ═══════════════════════════════════════════════════════════════════

// IDENTITY_KEY defined with SEASON_YEAR constants above

function getIdentity() {
  const id = localStorage.getItem(IDENTITY_KEY);
  return id ? S.participants.find(p => p.id === id) || null : null;
}

function setIdentity(pid) {
  localStorage.setItem(IDENTITY_KEY, pid);
  updateIdentityUI();
  document.getElementById('identity-overlay')?.remove();
  reRenderActive();
}

function clearIdentity() {
  localStorage.removeItem(IDENTITY_KEY);
  updateIdentityUI();
  reRenderActive();
}

function updateIdentityUI() {
  const p = getIdentity();
  const btn = document.getElementById('identity-btn');
  if (!btn) return;
  if (S.participants.length === 0) {
    btn.textContent = '';
    btn.style.visibility = 'hidden';
    return;
  }
  btn.style.visibility = '';
  btn.textContent = p ? `👤 ${p.name}` : '👤 Who are you?';
  btn.style.color = p ? pColor(p) : '';
}

function showIdentityPicker(force = false) {
  document.getElementById('identity-overlay')?.remove();
  const overlay = document.createElement('div');
  overlay.id = 'identity-overlay';
  overlay.className = 'identity-overlay';
  const current = getIdentity();
  overlay.innerHTML = `
    <div class="identity-box">
      <div style="font-size:32px;margin-bottom:8px">👤</div>
      <div style="font-size:20px;font-weight:800;margin-bottom:6px">Who are you?</div>
      <div style="font-size:13px;color:var(--muted);margin-bottom:4px">Select your name to manage your own predictions.</div>
      <div class="identity-grid">
        ${S.participants.map(p => `
          <button class="identity-btn" style="${current?.id===p.id?`border-color:${pColor(p)};background:rgba(255,255,255,.05)`:''}color:${pColor(p)}"
                  onclick="setIdentity('${p.id}')">
            ${esc(p.name)}${current?.id===p.id?' ✓':''}
          </button>`).join('')}
      </div>
      ${!force ? `<button class="btn btn-ghost btn-sm" onclick="document.getElementById('identity-overlay').remove()"
              style="margin-top:4px;font-size:12px">Maybe later</button>` : ''}
      ${current ? `<button class="btn btn-ghost btn-sm" onclick="clearIdentity();document.getElementById('identity-overlay').remove()"
              style="margin-top:8px;font-size:12px;color:var(--muted)">Sign out</button>` : ''}
    </div>`;
  document.body.appendChild(overlay);
}

function isOwnPrediction(pid) {
  const identity = getIdentity();
  if (!identity) return true; // no identity set — full access
  return identity.id === pid;
}

// ═══════════════════════════════════════════════════════════════════
// DUPLICATE DRIVER CHECKS
// ═══════════════════════════════════════════════════════════════════

function checkPredDuplicates() {
  const race = raceById(_pred.raceId);
  if (!race) return;
  const sessions = race.sprint
    ? [{ key:'sprintquali', pos:PODIUM_POS },{ key:'sprint', pos:PODIUM_POS },{ key:'quali', pos:PODIUM_POS },{ key:'race', pos:RACE_POS }]
    : [{ key:'quali', pos:PODIUM_POS },{ key:'race', pos:RACE_POS }];
  sessions.forEach(({ key, pos }) => {
    const seen = {};
    pos.forEach(p => { const el = document.getElementById('pred-' + key + '-' + p); if (el) el.style.outline = ''; });
    pos.forEach(p => {
      const el = document.getElementById('pred-' + key + '-' + p);
      if (!el || !el.value) return;
      if (seen[el.value]) {
        el.style.outline = '2px solid var(--red)';
        const prevEl = document.getElementById('pred-' + key + '-' + seen[el.value]);
        if (prevEl) prevEl.style.outline = '2px solid var(--red)';
      } else {
        seen[el.value] = p;
      }
    });
  });
}

function checkResultDuplicates() {
  [{ key:'race', pos:RACE_POS },{ key:'quali', pos:PODIUM_POS },{ key:'sprint', pos:PODIUM_POS },{ key:'sprintquali', pos:PODIUM_POS }]
    .forEach(({ key, pos }) => {
      const seen = {};
      pos.forEach(p => { const el = document.getElementById('res-' + key + '-' + p); if (el) el.style.outline = ''; });
      pos.forEach(p => {
        const el = document.getElementById('res-' + key + '-' + p);
        if (!el || !el.value) return;
        if (seen[el.value]) {
          el.style.outline = '2px solid var(--red)';
          const prevEl = document.getElementById('res-' + key + '-' + seen[el.value]);
          if (prevEl) prevEl.style.outline = '2px solid var(--red)';
        } else {
          seen[el.value] = p;
        }
      });
    });
}

// ═══════════════════════════════════════════════════════════════════
// UNDO LAST RESULT SAVE
// ═══════════════════════════════════════════════════════════════════

let _lastResultUndo = null;
let _undoTimer = null;

function showUndoSnackbar(msg, fn) {
  document.getElementById('undo-snackbar')?.remove();
  clearTimeout(_undoTimer);
  const el = document.createElement('div');
  el.id = 'undo-snackbar';
  el.innerHTML = '<span>' + msg + '</span><button class="toast-undo-btn" onclick="' + fn.name + '()">↩ Undo</button><button class="toast-undo-btn" style="color:var(--muted)" onclick="document.getElementById(\'undo-snackbar\')?.remove()">✕</button>';
  document.body.appendChild(el);
  _undoTimer = setTimeout(() => el.remove(), 8000);
}

function undoResultSave() {
  document.getElementById('undo-snackbar')?.remove();
  if (!_lastResultUndo) return;
  const { raceId, data } = _lastResultUndo;
  _lastResultUndo = null;
  if (data) { S.results[raceId] = data; } else { delete S.results[raceId]; }
  save(); reRenderActive();
  toast('Result undone');
}

// ═══════════════════════════════════════════════════════════════════
// ALL PREDICTIONS SUBMITTED CHECK
// ═══════════════════════════════════════════════════════════════════

const _allPredsNotified = new Set();

function checkAllPredsSubmitted(raceId) {
  if (_allPredsNotified.has(raceId)) return;
  if (!S.participants.length) return;
  const allIn = S.participants.every(p => {
    const pred = S.predictions[raceId]?.[p.id];
    return pred?.race?.p1 != null;
  });
  if (allIn) {
    _allPredsNotified.add(raceId);
    const race = raceById(raceId);
    toast('🎉 All ' + S.participants.length + ' participants have submitted predictions for ' + esc(race.name) + '!');
  }
}

// ═══════════════════════════════════════════════════════════════════
// PREDICTION DEADLINE PUSH NOTIFICATIONS
// ═══════════════════════════════════════════════════════════════════

const _notifScheduled = new Set();

function requestNotifPermission() {
  if (!('Notification' in window)) { toast('Push notifications not supported in this browser', 'err'); return; }
  Notification.requestPermission().then(p => {
    if (p === 'granted') { toast('Notifications enabled ✓'); scheduleDeadlineNotifications(); }
    else toast('Notification permission denied', 'err');
  });
}

function scheduleDeadlineNotifications() {
  if (!('Notification' in window) || Notification.permission !== 'granted') return;
  const now = Date.now();
  RACES.forEach(race => {
    if (S.cancelled?.[race.id] || isPastDeadline(race.id)) return;
    const deadlineMs = raceDeadlineMs(race.id);
    if (!deadlineMs) return;
    [60, 15].forEach(mins => {
      const key = race.id + '-' + mins;
      if (_notifScheduled.has(key)) return;
      const fireAt = deadlineMs - mins * 60000;
      if (fireAt <= now) return;
      _notifScheduled.add(key);
      setTimeout(() => {
        if (Notification.permission === 'granted' && !isPastDeadline(race.id)) {
          new Notification('FFIA — Predictions locking soon', {
            body: mins + ' minutes until predictions lock for ' + race.name + '!',
            icon: 'manifest-icon-192.png',
            tag: 'ffia-deadline-' + race.id,
          });
        }
      }, fireAt - now);
    });
  });
}

function notifPermissionState() {
  if (!('Notification' in window)) return 'unsupported';
  return Notification.permission; // 'default' | 'granted' | 'denied'
}

// ═══════════════════════════════════════════════════════════════════
// SWIPE NAVIGATION
// ═══════════════════════════════════════════════════════════════════

const TABS = ['dashboard','predictions','results','calendar','participants','settings'];

(function initSwipe() {
  let startX = null, startY = null;
  document.querySelector('.main').addEventListener('touchstart', e => {
    startX = e.touches[0].clientX;
    startY = e.touches[0].clientY;
  }, { passive: true });
  document.querySelector('.main').addEventListener('touchend', e => {
    if (startX === null) return;
    const dx = e.changedTouches[0].clientX - startX;
    const dy = e.changedTouches[0].clientY - startY;
    startX = null; startY = null;
    if (Math.abs(dx) < 55 || Math.abs(dx) < Math.abs(dy) * 1.5) return; // too short or too vertical
    if (document.querySelector('.overlay')) return; // modal open — don't swipe
    const cur = document.querySelector('.nav-tab.active')?.dataset.tab;
    const idx = TABS.indexOf(cur);
    if (dx < 0 && idx < TABS.length - 1) switchTab(TABS[idx + 1]);
    if (dx > 0 && idx > 0) switchTab(TABS[idx - 1]);
  }, { passive: true });
})();

// ═══════════════════════════════════════════════════════════════════
// INIT
// ═══════════════════════════════════════════════════════════════════

renderDashboard();
document.title = 'FFIA Fantasy League ' + (S.seasonYear ?? SEASON_YEAR);
startCountdownTimers();
scheduleDeadlineNotifications();
setTimeout(() => {
  updateIdentityUI();
  if (S.participants.length > 0 && !getIdentity()) showIdentityPicker();
}, 100);
